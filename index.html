                                                    <p className="text-[var(--c-muted)]">Còn {p.stock} {p.unit} — SKU {p.id}</p>
                                                </div>
                                            </button>
                                        ))}
                                        {customers.filter(c => c.debt > 0).map(c => (
                                            <button key={c.id} onClick={() => { setShowMobileNotif(false); setMobileTab("customers"); }} className="w-full flex items-center gap-2.5 bg-[#FBF0E1] border border-[#F0DCB8] rounded-xl p-3 text-left">
                                                <span className="h-9 w-9 shrink-0 rounded-full bg-white flex items-center justify-center text-[var(--c-warning)]"><i className="fa-solid fa-hand-holding-dollar"></i></span>
                                                <div className="text-xs">
                                                    <p className="font-bold text-[var(--c-ink)]">{c.name} đang nợ {c.debt.toLocaleString()}đ</p>
                                                    <p className="text-[var(--c-muted)]">{c.phone}</p>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    {/* ============ KẾT THÚC GIAO DIỆN MOBILE ============ */}

                    {/* Ghim MH chính */}
                    {showPwaModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
                            <div className="w-full max-w-sm rounded-xl bg-white p-4 shadow-xl text-xs">
                                <div className="flex items-center justify-between border-b border-[var(--c-line)] pb-2.5">
                                    <h3 className="font-bold text-[var(--c-ink)] text-sm"><i className="fa-solid fa-circle-info text-[var(--c-primary-light)] mr-2"></i>Cài đặt ra màn hình chính</h3>
                                    <button onClick={() => setShowPwaModal(false)} className="text-[var(--c-muted)] hover:text-[var(--c-ink)]">
                                        <i className="fa-solid fa-xmark text-sm"></i>
                                    </button>
                                </div>
                                <div className="mt-2 space-y-2.5">
                                    <p className="text-[var(--c-muted)]">Bạn có thể ghim ứng dụng này trực tiếp ra màn hình nền của điện thoại giống như ứng dụng App Store hoặc CH Play.</p>
                                    <div className="rounded-xl bg-[var(--c-bg)] p-3 border border-[var(--c-line)]">
                                        <p className="font-semibold text-[var(--c-ink)] text-xxs uppercase mb-1.5">Dành cho iPhone (Safari):</p>
                                        <ol className="list-decimal pl-4 space-y-1 text-[var(--c-muted)]">
                                            <li>Bấm vào biểu tượng <strong>Chia sẻ (Share) <i className="fa-solid fa-share-from-square text-[var(--c-primary-light)]"></i></strong> trên thanh công cụ Safari.</li>
                                            <li>Kéo xuống và chọn <strong>Thêm vào MH chính (Add to Home Screen) <i className="fa-regular fa-square-plus text-[var(--c-ink)]"></i></strong>.</li>
                                            <li>Nhấn <strong>Thêm (Add)</strong> để hoàn tất.</li>
                                        </ol>
                                    </div>
                                    <div className="rounded-xl bg-[var(--c-bg)] p-3 border border-[var(--c-line)]">
                                        <p className="font-semibold text-[var(--c-ink)] text-xxs uppercase mb-1.5">Dành cho Android (Chrome):</p>
                                        <ol className="list-decimal pl-4 space-y-1 text-[var(--c-muted)]">
                                            <li>Bấm vào biểu tượng <strong>3 chấm dọc <i className="fa-solid fa-ellipsis-vertical text-[var(--c-ink)]"></i></strong>.</li>
                                            <li>Chọn <strong>Thêm vào màn hình chính (Install App / Add to Home screen)</strong>.</li>
                                        </ol>
                                    </div>
                                </div>
                                <div className="mt-4 flex gap-2.5 justify-end">
                                    <button onClick={handleCopyLink} className="rounded-xl bg-[#EAF2FA] px-4 py-2.5 text-[var(--c-primary-dark)] hover:bg-[#D7E6F3] font-semibold">Copy Link</button>
                                    <button onClick={() => setShowPwaModal(false)} className="rounded-xl bg-[#F1F5F9] px-4 py-2.5 text-[var(--c-muted)] hover:bg-[#E7ECF2]">Đóng</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // GIAO DIỆN MOBILE — TAB "BÁN HÀNG" (Form tạo đơn nhanh + Dòng thời gian đơn hàng kiểu Feed)
        // Tái sử dụng NGUYÊN VẸN <POSTab> và các hàm dữ liệu/Supabase đã có (deleteToTrash, setShippings,
        // dbDeleteOrder, dbUpsertProduct...) — component này CHỈ sắp xếp lại cách hiển thị, không tạo ra
        // luồng nghiệp vụ mới nào ngoài việc gọi lại đúng những hàm đã tồn tại theo đúng cách "Đơn hàng đã
        // bán" và "Quản lý Vận đơn" đang làm.
        // ==========================================
        function MobileSalesTab({ products, setProducts, customers, setCustomers, orders, setOrders, shippings, setShippings, configs, showToast, askConfirm, deleteToTrash, aiOrderDraft, setAiOrderDraft, dbInsertOrder, dbUpsertProduct, dbDeleteOrder }) {
            const [showForm, setShowForm] = useState(true);
            const [openMenuId, setOpenMenuId] = useState(null);
            const [viewingOrder, setViewingOrder] = useState(null);
            const [statusSheetOrder, setStatusSheetOrder] = useState(null);
            const [printOrder, setPrintOrder] = useState(null);

            // Hủy 1 đơn: hoàn kho + đưa vào Thùng Rác + xóa khỏi Supabase — GIỐNG HỆT logic ở "Đơn hàng đã bán"
            const cancelOneOrder = (target) => {
                deleteToTrash("Đơn hàng", target);
                const restoredProducts = products.map(p => {
                    const orderItem = target.items.find(it => it.productId === p.id);
                    if (orderItem) return { ...p, stock: p.stock + orderItem.quantity };
                    return p;
                });
                setProducts(restoredProducts);
                restoredProducts.forEach(p => {
                    const orderItem = target.items.find(it => it.productId === p.id);
                    if (orderItem) dbUpsertProduct(p);
                });
                setOrders(prev => prev.filter(o => o.id !== target.id));
                setShippings(prev => prev.filter(s => s.orderId !== target.id));
                dbDeleteOrder(target.id);
            };

            const handleDeleteOrder = (order) => {
                askConfirm(
                    "XÁC NHẬN HỦY ĐƠN HÀNG",
                    `Bạn có thật sự muốn hủy đơn hàng ${order.id} này? Các mặt hàng sẽ được cộng trả lại vào kho hàng. Bản ghi đơn hàng này sẽ được đưa vào Thùng Rác.`,
                    () => {
                        cancelOneOrder(order);
                        showToast(`Đã hủy hoàn tất đơn hàng ${order.id} & chuyển vào Thùng Rác!`, "success");
                    }
                );
            };

            // Cập nhật trạng thái giao hàng — TÁI SỬ DỤNG NGUYÊN VẸN "setShippings" (App() đã map ngược lại
            // vào orders.trangThai + tự gọi dbUpsertOrder), đúng y hệt cách "Quản lý Vận đơn" đang làm.
            const handleUpdateOrderStatus = (order, nextLabel) => {
                setShippings(prev => prev.map(s => s.orderId === order.id ? { ...s, status: nextLabel } : s));
                showToast(`Cập nhật trạng thái: ${nextLabel}`);
                setStatusSheetOrder(null);
            };

            const sortedOrders = [...orders].reverse();

            return (
                <div className="p-3 space-y-3">
                    {/* Form tạo đơn nhanh (POS) — tái sử dụng nguyên vẹn component gốc */}
                    <div className="bg-white rounded-2xl border border-[var(--c-line)] overflow-hidden">
                        <button onClick={() => setShowForm(v => !v)} className="w-full flex items-center justify-between px-3.5 py-3 bg-[#EAF2FA]">
                            <span className="font-bold text-[var(--c-primary-dark)] text-xxs uppercase">⚡ Tạo đơn nhanh (POS)</span>
                            <i className={`fa-solid fa-chevron-${showForm ? 'up' : 'down'} text-[var(--c-primary)]`}></i>
                        </button>
                        {showForm && (
                            <div className="p-2.5">
                                <POSTab 
                                    products={products} 
                                    setProducts={setProducts}
                                    customers={customers} 
                                    setCustomers={setCustomers}
                                    orders={orders} 
                                    setOrders={setOrders} 
                                    shippings={shippings}
                                    setShippings={setShippings}
                                    configs={configs}
                                    showToast={showToast}
                                    aiOrderDraft={aiOrderDraft}
                                    setAiOrderDraft={setAiOrderDraft}
                                    dbInsertOrder={dbInsertOrder}
                                    dbUpsertProduct={dbUpsertProduct}
                                />
                            </div>
                        )}
                    </div>

                    {/* Dòng thời gian đơn hàng kiểu Feed — mỗi đơn là 1 thẻ độc lập */}
                    <div className="space-y-2.5">
                        <h3 className="font-bold text-[var(--c-ink)] text-xxs uppercase px-1">📝 Dòng thời gian đơn hàng</h3>
                        {sortedOrders.length === 0 && (
                            <div className="bg-white rounded-2xl border border-[var(--c-line)] p-6 text-center text-[var(--c-muted)] text-xxs">Chưa có đơn hàng nào.</div>
                        )}
                        {sortedOrders.map(o => (
                            <div key={o.id} className="bg-white rounded-2xl border border-[var(--c-line)] p-3.5 space-y-2.5 relative text-xxs">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="font-bold text-[var(--c-ink)]">{o.customerName}</p>
                                        <p className="text-[var(--c-muted)]">{o.id} • {o.date}</p>
                                    </div>
                                    <div className="relative">
                                        <button onClick={() => setOpenMenuId(openMenuId === o.id ? null : o.id)} className="text-[var(--c-muted)] h-7 w-7 flex items-center justify-center rounded-lg hover:bg-[#F1F5F9]">
                                            <i className="fa-solid fa-ellipsis-vertical"></i>
                                        </button>
                                        {openMenuId === o.id && (
                                            <div className="absolute right-0 top-8 z-20 bg-white border border-[var(--c-line)] rounded-xl shadow-lg overflow-hidden w-36">
                                                <button onClick={() => { setViewingOrder(o); setOpenMenuId(null); }} className="w-full text-left px-3 py-2.5 hover:bg-[#F1F5F9]">👁️ Xem chi tiết</button>
                                                <button onClick={() => { handleDeleteOrder(o); setOpenMenuId(null); }} className="w-full text-left px-3 py-2.5 hover:bg-[#FDEDED] text-[var(--c-danger)]">🗑️ Xóa đơn</button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {o.isShipping && (
                                    <span className="inline-block bg-[#FBF0E1] text-[var(--c-warning)] rounded-xl font-bold px-2 py-0.5">
                                        🚚 {STATUS_TO_SHIP_LABEL[o.trangThai] || "Chờ lấy hàng"}
                                    </span>
                                )}

                                <div className="border-t border-dashed border-[var(--c-line)] pt-2 space-y-1">
                                    {o.items.map(it => (
                                        <div key={it.productId} className="flex justify-between">
                                            <span className="text-[var(--c-ink)]">{it.name} <span className="text-[var(--c-muted)]">x{it.quantity}</span></span>
                                            <span className="font-semibold">{(it.price * it.quantity).toLocaleString()}đ</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex justify-between items-center border-t border-[var(--c-line)] pt-2">
                                    <span className="text-[var(--c-muted)]">Lợi nhuận: <b className="text-[var(--c-accent)]">+{o.profit.toLocaleString()}đ</b></span>
                                    <span className="font-bold text-[var(--c-primary)] text-sm">{o.finalTotal.toLocaleString()}đ</span>
                                </div>

                                <div className="grid grid-cols-2 gap-2 pt-1">
                                    <button 
                                        onClick={() => o.isShipping ? setStatusSheetOrder(o) : showToast("Đơn bán tại quầy đã hoàn tất, không cần cập nhật trạng thái ship.")}
                                        className="bg-[#EAF2FA] hover:bg-[#DCEAF7] text-[var(--c-primary)] font-bold py-2.5 rounded-xl"
                                    >
                                        🔄 Cập nhật trạng thái
                                    </button>
                                    <button onClick={() => setPrintOrder(o)} className="bg-[var(--c-primary-dark)] hover:bg-[#072B4A] text-white font-bold py-2.5 rounded-xl">
                                        🖨️ In đơn
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Modal xem chi tiết đơn */}
                    {viewingOrder && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black bg-opacity-50 p-0 sm:p-4" onClick={() => setViewingOrder(null)}>
                            <div className="w-full sm:max-w-sm bg-white rounded-t-2xl sm:rounded-2xl p-4 space-y-2.5 text-xxs max-h-[85vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b pb-2">
                                    <span className="font-bold text-sm">Chi tiết đơn {viewingOrder.id}</span>
                                    <button onClick={() => setViewingOrder(null)} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <p><strong>Khách:</strong> {viewingOrder.customerName}</p>
                                <p><strong>Ngày:</strong> {viewingOrder.date}</p>
                                <p><strong>Thanh toán:</strong> {viewingOrder.paymentMethod}</p>
                                {viewingOrder.isShipping && (
                                    <div className="bg-[#FBF0E1]/50 border border-[#F0DCB8] rounded-xl p-2.5 space-y-1">
                                        <p><strong>Người nhận:</strong> {viewingOrder.receiverName} - {viewingOrder.receiverPhone}</p>
                                        <p><strong>Địa chỉ:</strong> {viewingOrder.receiverAddress}</p>
                                        <p><strong>COD:</strong> {(viewingOrder.codAmount || 0).toLocaleString()}đ</p>
                                        <p className="font-mono">{viewingOrder.trackingCode}</p>
                                    </div>
                                )}
                                <div className="border-t pt-2 space-y-1">
                                    {viewingOrder.items.map(it => (
                                        <div key={it.productId} className="flex justify-between">
                                            <span>{it.name} x{it.quantity}</span>
                                            <span className="font-semibold">{(it.price * it.quantity).toLocaleString()}đ</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-right font-bold text-[var(--c-primary)] text-sm border-t pt-2">Tổng: {viewingOrder.finalTotal.toLocaleString()}đ</div>
                            </div>
                        </div>
                    )}

                    {/* Bottom sheet cập nhật trạng thái */}
                    {statusSheetOrder && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black bg-opacity-50" onClick={() => setStatusSheetOrder(null)}>
                            <div className="w-full bg-white rounded-t-2xl p-4 space-y-2 text-xxs" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b pb-2 mb-1">
                                    <span className="font-bold text-sm">Cập nhật trạng thái — {statusSheetOrder.id}</span>
                                    <button onClick={() => setStatusSheetOrder(null)} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                {["Chờ lấy hàng", "Đang giao hàng", "Đã giao hàng", "Hủy/Hoàn trả"].map(label => (
                                    <button 
                                        key={label}
                                        onClick={() => handleUpdateOrderStatus(statusSheetOrder, label)}
                                        className={`w-full text-left px-3.5 py-3 rounded-xl font-semibold ${(STATUS_TO_SHIP_LABEL[statusSheetOrder.trangThai] || "Chờ lấy hàng") === label ? 'bg-[var(--c-primary-dark)] text-white' : 'bg-[#F1F5F9] text-[var(--c-ink)]'}`}
                                    >
                                        {label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Xem trước phiếu in */}
                    {printOrder && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-65 p-4 overflow-y-auto">
                            <div className="w-full max-w-sm bg-white rounded-xl p-4 shadow-2xl space-y-3 text-xxs">
                                <div className="flex justify-between items-center border-b pb-2">
                                    <span className="font-bold">🖨️ Xem trước phiếu in</span>
                                    <button onClick={() => setPrintOrder(null)} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark text-sm"></i></button>
                                </div>
                                <div className="border border-[var(--c-line)] rounded-xl p-3 bg-[var(--c-bg)] space-y-2.5 text-sm" id="invoice-print-mobile">
                                    <div className="text-center border-b pb-2">
                                        <h4 className="font-bold text-xs">LINHKIENPRO</h4>
                                        <p>ĐC: {configs.shopAddress}</p>
                                        <p>SĐT: {configs.shopPhone}</p>
                                        <h5 className="font-bold mt-1.5 uppercase text-sm">HÓA ĐƠN GIAO DỊCH</h5>
                                        <p className="text-[var(--c-muted)]">Mã: {printOrder.id} | Ngày: {printOrder.date}</p>
                                    </div>
                                    <div>
                                        <p><strong>Khách nhận:</strong> {printOrder.customerName}</p>
                                        <p><strong>Hình thức:</strong> {printOrder.paymentMethod}</p>
                                    </div>
                                    <table className="w-full border-y py-2">
                                        <thead>
                                            <tr className="font-bold">
                                                <th>Linh kiện</th>
                                                <th className="text-center">SL</th>
                                                <th className="text-right">T.Tiền</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {printOrder.items.map(it => (
                                                <tr key={it.productId} className="border-b border-dashed">
                                                    <td>{it.name}</td>
                                                    <td className="text-center">{it.quantity}</td>
                                                    <td className="text-right">{(it.price * it.quantity).toLocaleString()}đ</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <div className="text-right space-y-1">
                                        <p>Cộng tiền: {printOrder.total.toLocaleString()}đ</p>
                                        <p>Giảm giá: -{printOrder.discount.toLocaleString()}đ</p>
                                        <p className="font-bold text-[var(--c-ink)]">Tổng thanh toán: {printOrder.finalTotal.toLocaleString()}đ</p>
                                    </div>
                                </div>
                                {printOrder.isShipping && (
                                    <div className="border-2 border-[var(--c-primary-dark)] rounded-xl p-2.5 bg-[#FBF0E1]/50 space-y-1.5 text-sm">
                                        <div className="flex justify-between items-center border-b border-[var(--c-primary-dark)] pb-0.5">
                                            <span className="font-bold">PHẦN THÔNG TIN SHIP</span>
                                            <span className="bg-[var(--c-primary-dark)] text-white font-bold px-2 rounded-xl text-xs">{printOrder.carrier}</span>
                                        </div>
                                        <p><strong>Người nhận:</strong> {printOrder.receiverName} - {printOrder.receiverPhone}</p>
                                        <p className="line-clamp-1"><strong>ĐC giao:</strong> {printOrder.receiverAddress}</p>
                                        <p className="font-bold text-[var(--c-danger)]">COD cần thu: {(printOrder.codAmount || 0).toLocaleString()}đ</p>
                                        <p className="font-mono text-center bg-white border border-[var(--c-line)] mt-1.5">{printOrder.trackingCode}</p>
                                    </div>
                                )}
                                <div className="flex gap-2">
                                    <button onClick={() => window.print()} className="flex-1 rounded-xl py-2.5 bg-[var(--c-primary-dark)] hover:bg-[#072B4A] text-white font-bold text-center">In hóa đơn</button>
                                    <button onClick={() => setPrintOrder(null)} className="flex-1 rounded-xl py-2.5 bg-[var(--c-primary)] hover:bg-[var(--c-primary-dark)] text-white font-bold text-center">Đóng</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // GIAO DIỆN MOBILE — TAB "MENU" (gom toàn bộ phần còn lại: Cấu hình API, Messenger AI, Vận đơn,
        // Lịch sử hoạt động, Thùng rác, Sao lưu dữ liệu, Đăng xuất)
        // ==========================================
        function MobileMenuGrid({ onSelect, onTrash, onBackup, onPwa, onShare, onLogout, currentUser }) {
            const items = [
                { key: "configs", icon: "fa-gears", label: "Cấu hình kết nối API", color: "text-[var(--c-primary)]" },
                { key: "messenger", icon: "fa-message", label: "Trợ lý Messenger AI", color: "text-[var(--c-ai)]" },
                { key: "shipping", icon: "fa-truck-fast", label: "Quản lý Vận đơn", color: "text-[var(--c-warning)]" },
                { key: "history", icon: "fa-clock-rotate-left", label: "Lịch sử hoạt động", color: "text-[var(--c-primary)]" },
            ];
            return (
                <div className="p-3 space-y-3">
                    <div className="bg-white rounded-2xl border border-[var(--c-line)] divide-y divide-[var(--c-line)] overflow-hidden">
                        {items.map(it => (
                            <button key={it.key} onClick={() => onSelect(it.key)} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-[#F1F5F9] text-left">
                                <span className="flex items-center gap-3 font-semibold text-[var(--c-ink)] text-xxs">
                                    <i className={`fa-solid ${it.icon} ${it.color} text-base w-5 text-center`}></i>
                                    {it.label}
                                </span>
                                <i className="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                            </button>
                        ))}
                    </div>

                    <div className="bg-white rounded-2xl border border-[var(--c-line)] divide-y divide-[var(--c-line)] overflow-hidden">
                        <button onClick={onTrash} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-[#F1F5F9] text-left">
                            <span className="flex items-center gap-3 font-semibold text-[var(--c-ink)] text-xxs">
                                <i className="fa-solid fa-trash-can text-[var(--c-danger)] text-base w-5 text-center"></i>
                                Thùng rác hệ thống
                            </span>
                            <i className="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                        </button>
                        <button onClick={onBackup} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-[#F1F5F9] text-left">
                            <span className="flex items-center gap-3 font-semibold text-[var(--c-ink)] text-xxs">
                                <i className="fa-solid fa-cloud-arrow-down text-[var(--c-accent)] text-base w-5 text-center"></i>
                                Sao lưu dữ liệu
                            </span>
                            <i className="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                        </button>
                        <button onClick={onShare} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-[#F1F5F9] text-left">
                            <span className="flex items-center gap-3 font-semibold text-[var(--c-ink)] text-xxs">
                                <i className="fa-solid fa-share-nodes text-[var(--c-primary)] text-base w-5 text-center"></i>
                                Chia sẻ App
                            </span>
                            <i className="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                        </button>
                        <button onClick={onPwa} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-[#F1F5F9] text-left">
                            <span className="flex items-center gap-3 font-semibold text-[var(--c-ink)] text-xxs">
                                <i className="fa-solid fa-mobile-screen-button text-[var(--c-primary)] text-base w-5 text-center"></i>
                                Ghim ra Màn Hình
                            </span>
                            <i className="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                        </button>
                    </div>

                    <div className="bg-white rounded-2xl border border-[var(--c-line)] p-3.5 flex items-center gap-2.5">
                        <i className="fa-solid fa-circle-user text-[var(--c-muted)] text-lg"></i>
                        <p className="font-bold text-[var(--c-ink)] text-xxs truncate">{currentUser?.fullName || currentUser?.full_name || currentUser?.username}</p>
                    </div>

                    <button onClick={onLogout} className="w-full bg-[var(--c-danger)] hover:bg-[#B23A3A] text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2">
                        <i className="fa-solid fa-right-from-bracket"></i> Đăng xuất
                    </button>
                </div>
            );
        }

        // ==========================================
        // GIAO DIỆN MOBILE — TAB "KHO HÀNG" (thẻ + pill danh mục kiểu mockup)
        // TÁI SỬ DỤNG NGUYÊN VẸN cách lưu (setProducts + dbUpsertProduct/dbDeleteProduct + deleteToTrash),
        // đúng y hệt định dạng dữ liệu mà <ProductsTab> gốc đang dùng (id viết hoa, giữ dbId khi sửa...).
        // Component này CHỈ là 1 lớp hiển thị khác, không tạo ra quy tắc lưu trữ mới nào.
        // ==========================================
        function MobileProductsTab({ products, setProducts, configs, showToast, askConfirm, deleteToTrash, dbUpsertProduct, dbDeleteProduct, categories }) {
            const [search, setSearch] = useState("");
            const [filterCat, setFilterCat] = useState("Tất cả");
            const [showLowStockAll, setShowLowStockAll] = useState(false);
            const [formOpen, setFormOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [openCardMenuId, setOpenCardMenuId] = useState(null);

            // Form state
            const [id, setId] = useState("");
            const [name, setName] = useState("");
            const [category, setCategory] = useState(() => (categories[0] && categories[0].name) || "Khác");
            const [costPrice, setCostPrice] = useState(0);
            const [sellPrice, setSellPrice] = useState(0);
            const [stock, setStock] = useState(0);
            const [unit, setUnit] = useState("Cái");

            const resetForm = () => {
                setEditingProduct(null);
                setId(""); setName(""); setCategory((categories[0] && categories[0].name) || "Khác");
                setCostPrice(0); setSellPrice(0); setStock(0); setUnit("Cái");
            };

            const filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.id.toLowerCase().includes(search.toLowerCase());
                const matchCat = filterCat === "Tất cả" || p.category === filterCat;
                return matchSearch && matchCat;
            });
            const lowStockList = products.filter(p => p.stock < 5);

            const openAddForm = () => { resetForm(); setFormOpen(true); };
            const openEditForm = (p) => {
                setEditingProduct(p);
                setId(p.id); setName(p.name); setCategory(p.category);
                setCostPrice(p.costPrice); setSellPrice(p.sellPrice); setStock(p.stock); setUnit(p.unit);
                setFormOpen(true);
                setOpenCardMenuId(null);
            };

            // Lưu linh kiện — GIỐNG HỆT logic handleSave() ở <ProductsTab> gốc (không đổi 1 quy tắc nào)
            const handleSave = (e) => {
                e.preventDefault();
                if (!id || !name || costPrice <= 0 || sellPrice <= 0) {
                    showToast("Vui lòng nhập đầy đủ giá và thông tin linh kiện!", "error");
                    return;
                }
                const updated = {
                    id: id.trim().toUpperCase(),
                    name: name.trim(),
                    category,
                    costPrice: Number(costPrice),
                    sellPrice: Number(sellPrice),
                    stock: Number(stock),
                    unit,
                    dbId: editingProduct ? editingProduct.dbId : undefined
                };
                if (editingProduct) {
                    setProducts(prev => prev.map(p => p.id === editingProduct.id ? updated : p));
                    dbUpsertProduct(updated);
                    showToast(`Đã lưu thay đổi linh kiện: ${name}`);
                } else {
                    if (products.some(p => p.id === updated.id)) {
                        showToast("Mã SKU này đã tồn tại trong hệ thống!", "error");
                        return;
                    }
                    setProducts(prev => [...prev, updated]);
                    dbUpsertProduct(updated);
                    showToast(`Đã thêm linh kiện: ${name}`);
                }
                resetForm();
                setFormOpen(false);
            };

            // Xóa linh kiện — GIỐNG HỆT logic handleDelete() ở <ProductsTab> gốc
            const handleDelete = (prodId) => {
                const target = products.find(p => p.id === prodId);
                setOpenCardMenuId(null);
                askConfirm(
                    "XÁC NHẬN XÓA",
                    `Bạn có chắc chắn muốn xóa linh kiện mã [${prodId}] khỏi kho? Sản phẩm này sẽ được đưa vào Thùng Rác để khôi phục khi cần.`,
                    () => {
                        if (target) deleteToTrash("Sản phẩm", target);
                        setProducts(prev => prev.filter(p => p.id !== prodId));
                        if (target && target.dbId) dbDeleteProduct(target.dbId);
                        showToast("Đã xóa linh kiện (Chuyển vào Thùng Rác)!");
                    }
                );
            };

            return (
                <div className="space-y-3 pb-16">
                    <h2 className="font-bold text-[var(--c-ink)] text-base px-0.5">Quản lý kho hàng</h2>

                    {/* Ô tìm kiếm */}
                    <div className="relative">
                        <i className="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--c-muted)]"></i>
                        <input 
                            type="text" 
                            value={search} 
                            onChange={(e) => setSearch(e.target.value)} 
                            placeholder="Tìm kiếm linh kiện, mã, tên..." 
                            className="w-full bg-white border border-[var(--c-line)] rounded-2xl pl-10 pr-3.5 py-3 text-xs shadow-sm focus:outline-none"
                        />
                    </div>

                    {/* Pill danh mục */}
                    <div className="flex gap-2 overflow-x-auto pb-1 -mx-0.5 px-0.5">
                        {["Tất cả", ...categories.map(c => c.name)].map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setFilterCat(cat)}
                                className={`shrink-0 px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap ${filterCat === cat ? 'bg-[var(--c-primary)] text-white' : 'bg-white border border-[var(--c-line)] text-[var(--c-muted)]'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    {/* Tồn kho thấp */}
                    {lowStockList.length > 0 && (
                        <div className="bg-white rounded-2xl border border-[var(--c-line)] p-3.5 space-y-2">
                            <div className="flex justify-between items-center">
                                <span className="font-bold text-[var(--c-danger)] text-xxs uppercase">⚠️ Tồn kho thấp</span>
                                <button onClick={() => setShowLowStockAll(v => !v)} className="text-[var(--c-primary)] font-bold text-xs">
                                    {showLowStockAll ? "Thu gọn" : "Xem tất cả"}
                                </button>
                            </div>
                            <div className="space-y-1.5">
                                {(showLowStockAll ? lowStockList : lowStockList.slice(0, 3)).map(p => (
                                    <div key={p.id} className="flex items-center gap-2.5">
                                        <span className="h-9 w-9 shrink-0 rounded-xl bg-[#FDEDED] flex items-center justify-center text-[var(--c-danger)]"><i className="fa-solid fa-microchip"></i></span>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold text-[var(--c-ink)] text-xs truncate">{p.name}</p>
                                            <p className="text-[var(--c-muted)] text-xs">SKU: {p.id}</p>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <p className="font-bold text-[var(--c-danger)] text-xs">Tồn: {p.stock}</p>
                                            <p className="text-[var(--c-muted)] text-xs">Mức tối thiểu: 5</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Danh sách linh kiện */}
                    <div className="space-y-2">
                        <h3 className="font-bold text-[var(--c-ink)] text-xxs uppercase px-1">Danh sách linh kiện</h3>
                        {filtered.length === 0 && (
                            <div className="bg-white rounded-2xl border border-[var(--c-line)] p-6 text-center text-[var(--c-muted)] text-xxs">Không tìm thấy linh kiện nào.</div>
                        )}
                        {filtered.map(p => (
                            <div key={p.id} className="bg-white rounded-2xl border border-[var(--c-line)] p-3.5 flex items-center gap-2.5 relative">
                                <span className="h-11 w-11 shrink-0 rounded-xl bg-[#EAF2FA] flex items-center justify-center text-[var(--c-primary)] text-lg"><i className="fa-solid fa-microchip"></i></span>
                                <div className="flex-1 min-w-0">
                                    <p className="font-bold text-[var(--c-ink)] text-xs truncate">{p.name}</p>
                                    <p className="text-[var(--c-muted)] text-xs">SL: {p.stock} {p.unit} • Giá vốn: {p.costPrice.toLocaleString()}đ</p>
                                </div>
                                <div className="text-right shrink-0">
                                    <p className="font-bold text-[var(--c-primary)] text-sm">{p.sellPrice.toLocaleString()}đ</p>
                                </div>
                                <div className="relative shrink-0">
                                    <button onClick={() => setOpenCardMenuId(openCardMenuId === p.id ? null : p.id)} className="h-8 w-8 flex items-center justify-center text-[var(--c-muted)]">
                                        <i className="fa-solid fa-ellipsis-vertical"></i>
                                    </button>
                                    {openCardMenuId === p.id && (
                                        <div className="absolute right-0 top-8 z-20 bg-white border border-[var(--c-line)] rounded-xl shadow-lg overflow-hidden w-32 text-xs">
                                            <button onClick={() => openEditForm(p)} className="w-full text-left px-3 py-2.5 hover:bg-[#F1F5F9]">✏️ Sửa</button>
                                            <button onClick={() => handleDelete(p.id)} className="w-full text-left px-3 py-2.5 hover:bg-[#FDEDED] text-[var(--c-danger)]">🗑️ Xóa</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Nút tròn nổi (+) thêm linh kiện mới */}
                    <button 
                        onClick={openAddForm}
                        className="fixed bottom-24 right-4 z-30 h-14 w-14 rounded-full bg-[var(--c-primary)] hover:bg-[var(--c-primary-dark)] text-white text-2xl shadow-lg flex items-center justify-center"
                    >
                        <i className="fa-solid fa-plus"></i>
                    </button>

                    {/* Bottom sheet Thêm/Sửa linh kiện */}
                    {formOpen && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black bg-opacity-50" onClick={() => { setFormOpen(false); resetForm(); }}>
                            <form onSubmit={handleSave} className="w-full bg-white rounded-t-2xl p-4 space-y-2.5 max-h-[88vh] overflow-y-auto text-xxs" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b pb-2">
                                    <span className="font-bold text-sm">{editingProduct ? "✏️ Sửa linh kiện" : "➕ Thêm linh kiện mới"}</span>
                                    <button type="button" onClick={() => { setFormOpen(false); resetForm(); }} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Mã SKU *</label>
                                        <input type="text" value={id} onChange={(e) => setId(e.target.value)} disabled={!!editingProduct} placeholder="VD: SP001" className="w-full border rounded-xl p-2.5 font-bold disabled:bg-[#F1F5F9]" required />
                                    </div>
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Danh mục</label>
                                        <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full border rounded-xl p-2.5">
                                            {categories.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[var(--c-muted)] mb-1">Tên hiển thị *</label>
                                    <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Ví dụ: Màn hình iPhone 11 Pro" className="w-full border rounded-xl p-2.5 font-bold" required />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Giá vốn (đ)</label>
                                        <input type="number" value={costPrice} onChange={(e) => setCostPrice(Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full border rounded-xl p-2.5 font-bold" required />
                                    </div>
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Giá bán (đ)</label>
                                        <input type="number" value={sellPrice} onChange={(e) => setSellPrice(Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full border rounded-xl p-2.5 font-bold text-[var(--c-primary)]" required />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Số lượng tồn</label>
                                        <input type="number" value={stock} onChange={(e) => setStock(Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full border rounded-xl p-2.5 font-bold text-[var(--c-danger)]" />
                                    </div>
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Đơn vị tính</label>
                                        <input type="text" value={unit} onChange={(e) => setUnit(e.target.value)} className="w-full border rounded-xl p-2.5" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-[var(--c-primary-dark)] hover:bg-[#072B4A] text-white font-bold py-3 rounded-xl">
                                    {editingProduct ? "💾 Lưu thay đổi" : "➕ Thêm vào kho hàng"}
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // GIAO DIỆN MOBILE — TAB "KHÁCH HÀNG" (thẻ kèm avatar màu kiểu mockup)
        // TÁI SỬ DỤNG NGUYÊN VẸN cách lưu (setCustomers giống hệt <CustomersTab> gốc, "Tổng mua" chỉ là
        // số liệu tính toán từ orders sẵn có, không tạo bảng/dữ liệu mới nào).
        // ==========================================
        function MobileCustomersTab({ customers, setCustomers, orders, configs, showToast, askConfirm, deleteToTrash }) {
            const [search, setSearch] = useState("");
            const [formOpen, setFormOpen] = useState(false);
            const [editingCust, setEditingCust] = useState(null);
            const [openCardMenuId, setOpenCardMenuId] = useState(null);

            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [address, setAddress] = useState("");
            const [debt, setDebt] = useState(0);
            const [notes, setNotes] = useState("");

            const avatarColors = ["#3B82F6", "#EF4444", "#10B981", "#8B5CF6", "#F59E0B", "#EC4899"];
            const colorFor = (id) => avatarColors[Math.abs([...id].reduce((a, c) => a + c.charCodeAt(0), 0)) % avatarColors.length];

            const resetForm = () => {
                setEditingCust(null);
                setName(""); setPhone(""); setAddress(""); setDebt(0); setNotes("");
            };

            const filtered = customers.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search));

            // Tổng mua = tổng finalTotal các đơn "Thành công" của khách này — chỉ ĐỌC từ orders sẵn có
            const totalSpentOf = (cust) => orders.filter(o => o.customerId === cust.id && o.status === "Thành công").reduce((sum, o) => sum + o.finalTotal, 0);

            const openAddForm = () => { resetForm(); setFormOpen(true); };
            const openEditForm = (c) => {
                setEditingCust(c);
                setName(c.name); setPhone(c.phone); setAddress(c.address); setDebt(c.debt); setNotes(c.notes);
                setFormOpen(true);
                setOpenCardMenuId(null);
            };

            // Lưu khách hàng — GIỐNG HỆT logic handleSave() ở <CustomersTab> gốc
            const handleSave = (e) => {
                e.preventDefault();
                if (!name || !phone) {
                    showToast("Điền đầy đủ tên và sđt!", "error");
                    return;
                }
                const updated = {
                    id: editingCust ? editingCust.id : "KH" + (1001 + customers.length),
                    name: name.trim(),
                    phone: phone.trim(),
                    address: address.trim(),
                    debt: Number(debt),
                    notes: notes.trim()
                };
                if (editingCust) {
                    setCustomers(prev => prev.map(c => c.id === editingCust.id ? updated : c));
                    showToast("Đã lưu chỉnh sửa đối tác!");
                } else {
                    setCustomers(prev => [...prev, updated]);
                    showToast("Đã thêm khách hàng mới thành công!");
                }
                resetForm();
                setFormOpen(false);
            };

            // Xóa khách hàng — GIỐNG HỆT logic handleDelete() ở <CustomersTab> gốc
            const handleDelete = (id) => {
                const target = customers.find(c => c.id === id);
                setOpenCardMenuId(null);
                askConfirm(
                    "XÁC NHẬN XÓA KHÁCH HÀNG",
                    "Bạn có thật sự muốn xóa hồ sơ khách hàng này? Hồ sơ sẽ được chuyển vào Thùng Rác để có thể khôi phục.",
                    () => {
                        if (target) deleteToTrash("Khách hàng", target);
                        setCustomers(prev => prev.filter(c => c.id !== id));
                        showToast("Đã xóa hồ sơ khách (Chuyển vào Thùng Rác)!");
                    }
                );
            };

            return (
                <div className="space-y-3 pb-16">
                    <h2 className="font-bold text-[var(--c-ink)] text-base px-0.5">Danh sách khách hàng</h2>

                    <div className="relative">
                        <i className="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--c-muted)]"></i>
                        <input 
                            type="text" 
                            value={search} 
                            onChange={(e) => setSearch(e.target.value)} 
                            placeholder="Tìm tên, SĐT, mã khách..." 
                            className="w-full bg-white border border-[var(--c-line)] rounded-2xl pl-10 pr-3.5 py-3 text-xs shadow-sm focus:outline-none"
                        />
                    </div>

                    <div className="space-y-2">
                        {filtered.length === 0 && (
                            <div className="bg-white rounded-2xl border border-[var(--c-line)] p-6 text-center text-[var(--c-muted)] text-xxs">Không tìm thấy khách hàng nào.</div>
                        )}
                        {filtered.map(c => {
                            const spent = totalSpentOf(c);
                            return (
                                <div key={c.id} className="bg-white rounded-2xl border border-[var(--c-line)] p-3.5 flex items-center gap-2.5 relative">
                                    <span className="h-11 w-11 shrink-0 rounded-full flex items-center justify-center text-white font-bold text-sm" style={{ backgroundColor: colorFor(c.id) }}>
                                        {c.name.trim().charAt(0).toUpperCase()}
                                    </span>
                                    <div className="flex-1 min-w-0">
                                        <p className="font-bold text-[var(--c-ink)] text-xs truncate">{c.name}</p>
                                        <p className="text-[var(--c-muted)] text-xs">{c.phone}</p>
                                        <p className="text-[var(--c-muted)] text-xs">Tổng mua: {spent.toLocaleString()}đ</p>
                                    </div>
                                    <div className="text-right shrink-0">
                                        <p className="text-[var(--c-muted)] text-xs">Công nợ</p>
                                        <p className={`font-bold text-xs ${c.debt > 0 ? 'text-[var(--c-danger)]' : 'text-[var(--c-ink)]'}`}>{c.debt.toLocaleString()}đ</p>
                                    </div>
                                    <div className="relative shrink-0">
                                        <button onClick={() => setOpenCardMenuId(openCardMenuId === c.id ? null : c.id)} className="h-8 w-8 flex items-center justify-center text-[var(--c-muted)]">
                                            <i className="fa-solid fa-ellipsis-vertical"></i>
                                        </button>
                                        {openCardMenuId === c.id && (
                                            <div className="absolute right-0 top-8 z-20 bg-white border border-[var(--c-line)] rounded-xl shadow-lg overflow-hidden w-32 text-xs">
                                                <button onClick={() => openEditForm(c)} className="w-full text-left px-3 py-2.5 hover:bg-[#F1F5F9]">✏️ Sửa</button>
                                                <button onClick={() => handleDelete(c.id)} className="w-full text-left px-3 py-2.5 hover:bg-[#FDEDED] text-[var(--c-danger)]">🗑️ Xóa</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Nút tròn nổi (+) thêm khách hàng mới */}
                    <button 
                        onClick={openAddForm}
                        className="fixed bottom-24 right-4 z-30 h-14 w-14 rounded-full bg-[var(--c-primary)] hover:bg-[var(--c-primary-dark)] text-white text-2xl shadow-lg flex items-center justify-center"
                    >
                        <i className="fa-solid fa-plus"></i>
                    </button>

                    {/* Bottom sheet Thêm/Sửa khách hàng */}
                    {formOpen && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black bg-opacity-50" onClick={() => { setFormOpen(false); resetForm(); }}>
                            <form onSubmit={handleSave} className="w-full bg-white rounded-t-2xl p-4 space-y-2.5 max-h-[88vh] overflow-y-auto text-xxs" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b pb-2">
                                    <span className="font-bold text-sm">{editingCust ? "✏️ Sửa hồ sơ khách hàng" : "➕ Thêm đối tác khách hàng"}</span>
                                    <button type="button" onClick={() => { setFormOpen(false); resetForm(); }} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div>
                                    <label className="block text-[var(--c-muted)] mb-1">Họ tên đối tác *</label>
                                    <input type="text" value={name} onChange={(e) => setName(e.target.value)} className="w-full border rounded-xl p-2.5 font-bold" required />
                                </div>
                                <div>
                                    <label className="block text-[var(--c-muted)] mb-1">Số điện thoại *</label>
                                    <input type="text" value={phone} onChange={(e) => setPhone(e.target.value)} className="w-full border rounded-xl p-2.5 font-bold" required />
                                </div>
                                <div>
                                    <label className="block text-[var(--c-muted)] mb-1">Địa chỉ</label>
                                    <input type="text" value={address} onChange={(e) => setAddress(e.target.value)} className="w-full border rounded-xl p-2.5" />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Dư nợ ban đầu (đ)</label>
                                        <input type="number" value={debt} onChange={(e) => setDebt(Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full border rounded-xl p-2.5 font-bold text-[var(--c-danger)]" />
                                    </div>
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Ghi chú</label>
                                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full border rounded-xl p-2.5" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-[var(--c-primary-dark)] hover:bg-[#072B4A] text-white font-bold py-3 rounded-xl">
                                    {editingCust ? "💾 Lưu thay đổi" : "➕ Lưu hồ sơ đối tác"}
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // TAB 1: DASHBOARD (TỔNG QUAN & AI APP MANAGER)
        // ==========================================
        function DashboardTab({ products, setProducts, customers, setCustomers, orders, setOrders, shippings, configs, showToast, askConfirm, resetDatabase, setShowTrashModal, trashBin, dbUpsertProduct, dbInsertAiLog, aiManagerLogs, currentUser, isMobile = false }) {
            const [aiAdvice, setAiAdvice] = useState(() => getLocalStorage("lk_ai_advice", "Chưa có lời khuyên tài chính nào từ trợ lý AI. Vui lòng cấu hình Gemini API Key và bấm 'Yêu cầu AI phân tích' phía dưới để tiến hành rà soát."));
            const [loadingAI, setLoadingAI] = useState(false);

            // 2 state UI THUẦN HIỂN THỊ (đóng/mở modal) — chỉ dùng cho bản Mobile thu gọn, không ảnh hưởng
            // gì tới dữ liệu/logic gốc.
            const [showAiAdviceModal, setShowAiAdviceModal] = useState(false);
            const [showAiManagerModal, setShowAiManagerModal] = useState(false);

            // Mỗi tài khoản nhân viên có 1 định danh RIÊNG (tai_khoan) để lịch sử chat với AI Manager của người
            // này KHÔNG bao giờ trộn lẫn/đè lên người khác. Giờ lưu ở bảng ai_manager_logs RIÊNG BIỆT hẳn
            // (KHÔNG còn dùng chung/lẫn vào bảng chat_history của tin nhắn khách hàng nữa).
            const mySessionId = currentUser?.tai_khoan || "chung";
            // Chỉ lấy đúng các dòng thuộc về tài khoản ĐANG ĐĂNG NHẬP
            const myAiManagerLogs = useMemo(() => (aiManagerLogs || []).filter(l => l.rawSender === mySessionId), [aiManagerLogs, mySessionId]);

            // STATE CHO TRỢ LÝ TOÀN NĂNG AI (APP MANAGER)
            // Khởi tạo từ lịch sử đã lưu trên Supabase (myAiManagerLogs) — mỗi lần vào lại tab Dashboard sẽ thấy
            // lại đúng đoạn hội thoại cũ CỦA CHÍNH TÀI KHOẢN NÀY, không bị mất và không lẫn với người khác.
            const [aiCommand, setAiCommand] = useState("");
            const [aiLogs, setAiLogs] = useState(() => myAiManagerLogs || []);
            const [pendingAction, setPendingAction] = useState(null); // Lưu trữ lệnh chưa xác nhận (do thiếu thông tin)
            const [loadingCmd, setLoadingCmd] = useState(false);

            // Ghi 1 dòng chat (user hoặc assistant) vào bảng Supabase RIÊNG "ai_manager_logs", gắn đúng tài khoản
            // đang đăng nhập (mySessionId) — hoàn toàn tách biệt khỏi tin nhắn khách hàng / hồ sơ khách trong chat_history.
            const persistAiLog = (role, text) => {
                dbInsertAiLog(mySessionId, role, text);
            };

            const stats = useMemo(() => {
                let revenue = 0;
                let cost = 0;
                let profit = 0;
                orders.forEach(o => {
                    if (o.status === "Thành công") {
                        revenue += o.finalTotal;
                        profit += o.profit;
                        o.items.forEach(i => { cost += (i.cost * i.quantity); });
                    }
                });

                const totalInStock = products.reduce((acc, p) => acc + p.stock, 0);
                const lowStockCount = products.filter(p => p.stock < 5).length;
                const totalDebt = customers.reduce((acc, c) => acc + c.debt, 0);

                return { revenue, cost, profit, totalInStock, lowStockCount, totalDebt };
            }, [products, customers, orders]);

            // Doanh thu/lợi nhuận HÔM NAY so với HÔM QUA — chỉ dùng cho 2 thẻ đầu tiên ở bản Mobile, tính
            // trực tiếp từ trường "date" có sẵn trong orders (KHÔNG bịa số liệu, không thêm bảng/dữ liệu mới).
            const mobileStats = useMemo(() => {
                const todayStr = new Date().toISOString().slice(0, 10);
                const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                let revToday = 0, profitToday = 0, revYesterday = 0, profitYesterday = 0;
                orders.forEach(o => {
                    if (o.status !== "Thành công") return;
                    const d = (o.date || "").slice(0, 10);
                    if (d === todayStr) { revToday += o.finalTotal; profitToday += o.profit; }
                    else if (d === yesterdayStr) { revYesterday += o.finalTotal; profitYesterday += o.profit; }
                });
                const pctChange = (today, yest) => yest > 0 ? ((today - yest) / yest * 100) : (today > 0 ? 100 : 0);
                return {
                    revToday, profitToday,
                    revChangePct: pctChange(revToday, revYesterday),
                    profitChangePct: pctChange(profitToday, profitYesterday)
                };
            }, [orders]);

            const triggerGeminiDashboard = async () => {
                if (!configs.geminiApiKey) {
                    showToast("Vui lòng vào tab 'Cấu hình kết nối API' điền Gemini API Key để rà soát!", "error");
                    return;
                }
                setLoadingAI(true);
                try {
                    const prompt = `Dựa trên dữ liệu tài chính của cửa hàng linh kiện điện thoại LinhKienPRO:
                    - Doanh thu thực tế: ${stats.revenue.toLocaleString()} VNĐ.
                    - Lợi nhuận gộp: ${stats.profit.toLocaleString()} VNĐ.
                    - Tổng linh kiện tồn kho: ${stats.totalInStock} sản phẩm.
                    - Số loại linh kiện tồn kho ở mức thấp cảnh báo (<5 cái): ${stats.lowStockCount} loại.
                    - Tổng công nợ thu hồi từ đối tác: ${stats.totalDebt.toLocaleString()} VNĐ.
                    
                    Hãy viết 3 phân tích tài chính/hành động thật cụ thể giúp nâng cao tối đa dòng tiền. Viết dưới dạng Markdown danh sách gọn gàng.`;

                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    const data = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi từ AI.";
                    setAiAdvice(text);
                    setLocalStorage("lk_ai_advice", text);
                    showToast("Đã phân tích xong báo cáo tài chính bằng AI!", "success");
                } catch (e) {
                    showToast("Không kết nối được Gemini API. Vui lòng rà soát lại kết nối mạng.", "error");
                } finally {
                    setLoadingAI(false);
                }
            };

            const handleExecuteAICommand = async (e) => {
                e.preventDefault();
                if (!aiCommand.trim()) return;
                if (!configs.geminiApiKey) {
                    showToast("Vui lòng điền Gemini API Key tại tab 'Cấu hình kết nối API' để sử dụng siêu trợ lý AI!", "error");
                    return;
                }

                setLoadingCmd(true);
                const userMsg = aiCommand.trim();
                setAiCommand("");
                setAiLogs(prev => [...prev, { sender: "user", text: userMsg }]);
                persistAiLog("user", userMsg);

                try {
                    const existingProductsText = products.map(p => `SKU: ${p.id}, Tên: ${p.name}, Giá vốn: ${p.costPrice}đ, Giá bán: ${p.sellPrice}đ, Tồn: ${p.stock}, Đơn vị: ${p.unit}, Danh mục: ${p.category}`).join("\n");
                    const prompt = `Bạn là Trợ lý Quản trị Hệ thống Siêu Việt của ứng dụng LinhKienPRO. Nhiệm vụ của bạn là đọc và phân tích câu lệnh tự nhiên từ admin, đối chiếu với dữ liệu kho hiện có, và trả về cấu trúc hành động tương ứng.

                    Danh sách kho linh kiện hiện tại:
                    ${existingProductsText}

                    Câu lệnh từ admin: "${userMsg}"

                    Yêu cầu:
                    Phân tích xem câu lệnh có thuộc các hành động sau:
                    1. "ADD_PRODUCT" (Thêm sản phẩm mới)
                    2. "UPDATE_STOCK" (Tăng/giảm hoặc sửa số lượng tồn kho)
                    3. "NONE" (Chỉ là câu nói giao tiếp hoặc hành động không hỗ trợ)

                    Bạn BẮT BUỘC phải phản hồi bằng một chuỗi JSON duy nhất, dạng phẳng như sau:
                    {
                      "action": "ADD_PRODUCT" hoặc "UPDATE_STOCK" hoặc "NONE",
                      "data": {
                         "id": "Mã SKU tự sinh tăng dần như SP006, SP007... nếu là sản phẩm mới",
                         "name": "Tên linh kiện chuẩn hóa",
                         "category": "Danh mục (chọn 1 trong: Màn hình, Pin, Kính lưng, Phụ kiện, Camera, Dụng cụ)",
                         "costPrice": "Giá vốn dạng số, để null nếu không được nhắc đến",
                         "sellPrice": "Giá bán dạng số, để null nếu không được nhắc đến",
                         "stock": "Số lượng tồn kho ban đầu dạng số, để null nếu không được nhắc đến",
                         "unit": "Đơn vị tính (Cái, Cục, Sợi...) hoặc mặc định 'Cái'"
                      },
                      "missingFields": ["costPrice", "category", etc...], // Mảng danh sách các trường thuộc tính còn thiếu cốt lõi để tạo sản phẩm mà admin không nói trong câu lệnh
                      "message": "Lời phản hồi/câu hỏi khéo léo của bạn gửi lại cho admin. Ví dụ: 'Tôi đã chuẩn bị thêm mặt hàng Vỏ iPhone 11 với giá bán 150,000đ. Tuy nhiên, thông tin còn thiếu giá vốn nhập kho và danh mục. Bạn muốn thiết lập thế nào?'"
                    }`;

                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    const response = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const jsonText = response.candidates?.[0]?.content?.parts?.[0]?.text;
                    const result = JSON.parse(jsonText);

                    if (result.action === "NONE") {
                        const replyText = result.message || "Tôi không hiểu rõ yêu cầu quản trị này. Bạn có thể thử các câu lệnh như: 'Thêm linh kiện vỏ ip 11 giá bán 150k vào kho'";
                        setAiLogs(prev => [...prev, { sender: "ai", text: replyText }]);
                        persistAiLog("assistant", replyText);
                    } else if (result.action === "ADD_PRODUCT") {
                        // Lưu vết hành động chờ xác nhận
                        setPendingAction({
                            type: "ADD_PRODUCT",
                            missingFields: result.missingFields || [],
                            data: {
                                id: result.data.id || "SP" + (1000 + products.length + 1),
                                name: result.data.name || "",
                                category: result.data.category || "Kính lưng",
                                costPrice: result.data.costPrice || "",
                                sellPrice: result.data.sellPrice || "",
                                stock: result.data.stock || 1,
                                unit: result.data.unit || "Cái"
                            }
                        });
                        setAiLogs(prev => [...prev, { sender: "ai", text: result.message }]);
                        persistAiLog("assistant", result.message);
                    } else if (result.action === "UPDATE_STOCK") {
                        // Sửa số lượng kho hàng trực tiếp từ AI
                        const skuMatch = userMsg.match(/SP\d+/i);
                        let matchedProd = null;
                        if (skuMatch) {
                            matchedProd = products.find(p => p.id.toUpperCase() === skuMatch[0].toUpperCase());
                        } else {
                            // Tìm theo tên tương đồng
                            matchedProd = products.find(p => p.name.toLowerCase().includes(result.data.name.toLowerCase()));
                        }

                        if (matchedProd) {
                            let changeStock = result.data.stock || 1;
                            // Check xem là tăng hay giảm
                            const isSubtract = userMsg.includes("giảm") || userMsg.includes("bớt") || userMsg.includes("-");
                            const newStock = isSubtract ? Math.max(0, matchedProd.stock - changeStock) : (matchedProd.stock + changeStock);
                            const updatedProd = { ...matchedProd, stock: newStock };

                            setProducts(prev => prev.map(p => p.id === matchedProd.id ? updatedProd : p));
                            dbUpsertProduct(updatedProd); // Đồng bộ tồn kho mới lên Supabase (trước đây chỉ đổi cục bộ)
                            const replyText = `Đã cập nhật số lượng của linh kiện [${matchedProd.id}] ${matchedProd.name} từ ${matchedProd.stock} thành ${newStock}!`;
                            setAiLogs(prev => [...prev, { sender: "ai", text: replyText }]);
                            persistAiLog("assistant", replyText);
                            showToast("Đã điều chỉnh kho hàng qua AI!", "success");
                        } else {
                            const replyText = `Tôi không tìm thấy mã linh kiện phù hợp với tên '${result.data.name}' để cập nhật tồn kho.`;
                            setAiLogs(prev => [...prev, { sender: "ai", text: replyText }]);
                            persistAiLog("assistant", replyText);
                        }
                    }
                } catch (e) {
                    const replyText = "Gặp lỗi xử lý câu lệnh. Vui lòng kiểm tra lại API Key hoặc mạng kết nối.";
                    setAiLogs(prev => [...prev, { sender: "ai", text: replyText }]);
                    persistAiLog("assistant", replyText);
                } finally {
                    setLoadingCmd(false);
                }

                if (!pendingAction) return;

                    id: pendingAction.data.id,
                    name: pendingAction.data.name,
                    category: pendingAction.data.category,
                    costPrice: Number(pendingAction.data.costPrice || 0),
                    sellPrice: Number(pendingAction.data.sellPrice || 0),
                    stock: Number(pendingAction.data.stock || 1),
                    unit: pendingAction.data.unit

                    showToast("Vui lòng điền đúng và đủ thông tin giá cả trước khi lưu!", "error");
                    return;
                }

                if (products.some(p => p.id === finalData.id)) {

                    return;

                                    className="flex-1 rounded-xl border border-[var(--c-line)] px-3 py-2.5 font-bold focus:outline-none focus:border-[var(--c-ai)]"

                                <button type="submit" className="bg-[var(--c-ai)] hover:bg-[var(--c-ai-dark)] text-white font-bold px-4 py-2.5 rounded-xl">

                                </button>
