                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // TAB 7: MESSENGER AI (MÔ PHỎNG & BÓC TÁCH)
        // ==========================================
        function MessengerTab({ messages, setMessages, products, setProducts, customers, setCustomers, orders, setOrders, configs, setConfigs, showToast, setActiveTab, setAiOrderDraft, dbInsertMessage, dbInsertOrder, dbUpsertProduct }) {
            const [selectedMsg, setSelectedMsg] = useState(null);
            const [aiReply, setAiReply] = useState("");
            const [loadingAI, setLoadingAI] = useState(false);
            const [loadingParse, setLoadingParse] = useState(false);
            const [lastCreatedOrder, setLastCreatedOrder] = useState(null);

            // Cửa sổ xác nhận lên đơn — sổ ra MỖI KHI AI đọc xong 1 tin nhắn, luôn chờ người dùng xác nhận /
            // bổ sung thông tin trước khi tạo đơn thật (KHÔNG bao giờ tự âm thầm lên đơn phía sau lưng).
            const [orderModal, setOrderModal] = useState(null);
            const [savingOrder, setSavingOrder] = useState(false);

            // Mô phỏng viết thêm tin nhắn chat
            const [customSender, setCustomSender] = useState("");
            const [customText, setCustomText] = useState("");

            // ============ CÁC HÀM DÒ THÔNG TIN TỪ VĂN BẢN TIN NHẮN (dùng khi KHÔNG có Gemini API Key,
            // hoặc lúc AI lỗi) — dò SĐT bằng regex, dò linh kiện bằng cách so khớp từ trong tên sản phẩm ============
            const extractPhoneFromText = (text) => {
                const m = text.match(/0\d{9,10}/);
                return m ? m[0] : "";
            };

            const extractAddressFromText = (text, phone) => {
                let addr = text;
                const lower = text.toLowerCase();
                const markers = ["ship về", "giao về", "giao đến", "gửi về", " về ", "địa chỉ"];
                for (const mk of markers) {
                    const idx = lower.indexOf(mk);
                    if (idx !== -1) { addr = text.slice(idx + mk.length); break; }
                }
                if (phone) addr = addr.replace(phone, "");
                addr = addr.replace(/sđt|sdt|số điện thoại|nhé|nha|nhá|ạ\b/gi, "").trim();
                return addr;
            };

            const extractQtyFromText = (text) => {
                const m = text.match(/(\d+)\s*(cái|chiếc|cục|bộ|hộp)/i);
                if (m) return Math.max(1, parseInt(m[1], 10));
                return 1;
            };

            // Dò linh kiện trong kho khớp nhất với 1 đoạn văn bản bất kỳ (chấm điểm theo tỉ lệ từ trùng khớp
            // trên tổng số từ có nghĩa trong tên sản phẩm; khớp thẳng theo mã SKU nếu có nhắc tới trong tin nhắn)
            const matchProductFromText = (text) => {
                if (!text) return null;
                const lower = text.toLowerCase();
                const bySku = products.find(p => lower.includes(p.id.toLowerCase()));
                if (bySku) return bySku;
                let best = null, bestRatio = 0, bestScore = 0;
                products.forEach(p => {
                    const words = p.name.toLowerCase().split(/\s+/).filter(w => w.length > 1);
                    if (words.length === 0) return;
                    let score = 0;
                    words.forEach(w => { if (lower.includes(w)) score++; });
                    const ratio = score / words.length;
                    if (score > 0 && (ratio > bestRatio || (ratio === bestRatio && score > bestScore))) {
                        bestRatio = ratio; bestScore = score; best = p;
                    }
                });
                return (bestRatio >= 0.5 && bestScore >= 1) ? best : null;
            };

            // Bỏ từ xưng hô đầu câu (anh/chị/em/cô/chú...) để so khớp tên khách chính xác hơn
            const normalizeName = (name) => (name || "").toLowerCase().replace(/^(anh|chị|chi|em|cô|co|chú|chu|bạn|ban)\s+/, "").trim();

            // Dò trong DANH SÁCH KHÁCH HÀNG hiện có xem đã có ai trùng tên hoặc trùng SĐT chưa
            const findMatchingCustomer = (name, phone) => {
                if (phone) {
                    const byPhone = customers.find(c => c.phone === phone);
                    if (byPhone) return byPhone;
                }
                const norm = normalizeName(name);
                if (norm) {
                    const byName = customers.find(c => {
                        const cn = normalizeName(c.name);
                        return cn && (cn === norm || cn.includes(norm) || norm.includes(cn));
                    });
                    if (byName) return byName;
                }
                return null;
            };

            // ============ AI ĐỌC TIN NHẮN -> SỔ CỬA SỔ XÁC NHẬN LÊN ĐƠN ============
            // Không bao giờ tự tạo đơn ngầm — luôn dừng lại ở đây để người dùng xem/bổ sung SĐT, địa chỉ,
            // chọn có lưu khách mới vào Danh sách Khách hàng hay không, và chọn lên đơn ship hay tại quầy.
            const openOrderModalFromMessage = async (msg) => {
                setLoadingParse(true);
                let ai = null;

                if (configs.geminiApiKey) {
                    try {
                        const prompt = `Đọc tin nhắn này: "${msg.text}"\nTrả về duy nhất JSON phẳng chứa:\n{\n  "name": "Tên người mua (bỏ từ xưng hô như anh/chị nếu có)",\n  "phone": "Số điện thoại, để chuỗi rỗng nếu tin nhắn không nhắc tới",\n  "address": "Địa chỉ giao hàng chi tiết, để chuỗi rỗng nếu tin nhắn không nhắc tới",\n  "requestedItem": "Từ khóa linh kiện khách cần lấy",\n  "quantity": "Số lượng khách cần lấy, số nguyên, mặc định là 1"\n}`;
                        const payload = {
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        };
                        const data = await fetchGeminiAPI(payload, configs.geminiApiKey);
                        const jsonStr = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        ai = JSON.parse(jsonStr);
                    } catch (e) {
                        ai = null; // AI lỗi -> rơi xuống dò bằng quy tắc bên dưới
                    }
                }

                const phone = (ai && ai.phone) || extractPhoneFromText(msg.text);
                const name = (ai && ai.name) || msg.sender;
                const address = (ai && ai.address) || extractAddressFromText(msg.text, phone);
                const qty = (ai && Number(ai.quantity)) || extractQtyFromText(msg.text);
                const itemKw = ai && ai.requestedItem;
                const product = (itemKw && products.find(p => p.name.toLowerCase().includes(itemKw.toLowerCase()))) || matchProductFromText(msg.text);

                // Cốt lõi theo đúng yêu cầu: LỌC trong Danh sách Khách hàng xem có ai tên/SĐT như vậy chưa
                const matchedCust = findMatchingCustomer(name, phone);

                setOrderModal({
                    sourceMsgId: msg.id,
                    name: matchedCust ? matchedCust.name : (name || ""),
                    phone: matchedCust ? matchedCust.phone : (phone || ""),
                    address: matchedCust ? matchedCust.address : (address || ""),
                    productId: product ? product.id : "",
                    qty: qty || 1,
                    matchedCustomer: matchedCust,
                    saveNewCustomer: !matchedCust,
                    shipMode: (matchedCust ? matchedCust.address : address) ? "ship" : "counter"
                });

                setLoadingParse(false);
            };

            const handleSendCustomMessage = async (e) => {
                e.preventDefault();
                if (!customSender || !customText) return;
                const newM = {
                    id: Date.now(),
                    sender: customSender,
                    text: customText,
                    time: new Date().toLocaleTimeString().substring(0, 5)
                };
                setMessages(prev => [...prev, newM]);
                dbInsertMessage(newM);
                setCustomSender("");
                setCustomText("");
                setSelectedMsg(newM);
                setAiReply("");
                setLastCreatedOrder(null);
                // Ngay khi có tin nhắn mới -> AI đọc luôn và sổ cửa sổ hỏi thông tin/lên đơn
                await openOrderModalFromMessage(newM);
            };

            const triggerAutoReplyAI = async (msg) => {
                if (!configs.geminiApiKey) {
                    showToast("Điền Gemini API Key ở tab Cấu hình trước!", "error");
                    return;
                }
                setLoadingAI(true);
                setAiReply("Đang quét tồn kho LinhKienPRO thực tế để soạn báo giá...");

                try {
                    const inventoryStr = products.map(p => `Mã SKU: ${p.id}, Linh kiện: ${p.name}, Giá: ${p.sellPrice.toLocaleString()}đ, Tồn: ${p.stock}`).join("\n");
                    const prompt = `Danh sách kho hàng:\n${inventoryStr}\n\nTin nhắn khách: "${msg.text}"\nHãy viết câu trả lời nhanh chóng, lịch sự, kiểm tra mã hàng còn tồn hay không và báo giá chuẩn xác.`;

                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    const data = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi.";
                    setAiReply(text);
                    showToast("Đã tạo câu trả lời tự động bằng AI!", "success");
                } catch (e) {
                    showToast("Lỗi kết nối Gemini API. Vui lòng rà soát lại kết nối mạng.", "error");
                } finally {
                    setLoadingAI(false);
                }
            };

            // ============ XÁC NHẬN Ở CỬA SỔ -> TẠO ĐƠN THẬT ============
            const handleConfirmOrderModal = () => {
                const m = orderModal;
                if (!m.name.trim()) { showToast("Cần nhập tên khách hàng!", "error"); return; }
                const product = products.find(p => p.id === m.productId);
                if (!product) { showToast("Chọn linh kiện cần bán cho đơn này!", "error"); return; }
                const qty = Math.max(1, Number(m.qty) || 1);
                if (product.stock < qty) { showToast(`Linh kiện [${product.name}] chỉ còn tồn ${product.stock}, không đủ ${qty}!`, "error"); return; }
                const isShip = m.shipMode === "ship";
                if (isShip && !m.phone.trim()) { showToast("Đơn giao hàng cần có SĐT người nhận!", "error"); return; }
                if (isShip && !m.address.trim()) { showToast("Đơn giao hàng cần có địa chỉ giao hàng!", "error"); return; }

                setSavingOrder(true);

                // Khách hàng: dùng lại hồ sơ đã khớp sẵn trong Danh sách Khách hàng, hoặc tự tạo hồ sơ mới
                // NẾU người dùng đồng ý lưu (checkbox "Lưu khách hàng này vào Danh sách Khách hàng")
                let customer = m.matchedCustomer;
                if (!customer && m.saveNewCustomer) {
                    customer = {
                        id: "KH" + (1001 + customers.length),
                        name: m.name,
                        phone: m.phone || "0900000000",
                        address: m.address || "",
                        debt: 0,
                        notes: "Tự động tạo từ Messenger AI"
                    };
                    setCustomers(prev => [...prev, customer]);
                }

                const cartItem = { productId: product.id, name: product.name, price: product.sellPrice, cost: product.costPrice, quantity: qty };
                const total = cartItem.price * qty;
                const profit = (cartItem.price - cartItem.cost) * qty;
                const orderId = "HD" + Date.now();
                const orderDate = new Date().toISOString().replace('T', ' ').substring(0, 16);
                const randomTracking = isShip ? `SPX-VN-${Math.floor(1000000 + Math.random() * 9000000)}` : "";

                const newOrder = {
                    id: orderId,
                    date: orderDate,
                    customerId: customer ? customer.id : "KH_LE",
                    customerName: customer ? customer.name : m.name,
                    customerPhone: customer ? customer.phone : (m.phone || ""),
                    items: [cartItem],
                    total: total,
                    discount: 0,
                    finalTotal: total,
                    profit: profit,
                    paymentMethod: isShip ? "COD" : "Tiền mặt",
                    status: "Thành công",
                    note: "Tạo từ tin nhắn Messenger (đã xác nhận)",
                    trangThai: isShip ? ORDER_STATUS.CHO_LAY_HANG : ORDER_STATUS.HOAN_THANH,
                    isShipping: isShip,
                    carrier: isShip ? "SPX" : "",
                    trackingCode: randomTracking,
                    receiverName: isShip ? m.name : "",
                    receiverPhone: isShip ? m.phone : "",
                    receiverAddress: isShip ? m.address : "",
                    codAmount: isShip ? total : 0,
                    shippingFee: isShip ? 30000 : 0,
                    shipNote: isShip ? "Đơn tạo từ Messenger AI" : ""
                };

                const updatedProducts = products.map(p => p.id === product.id ? { ...p, stock: p.stock - qty } : p);
                setProducts(updatedProducts);
                setOrders(prev => [...prev, newOrder]);
                dbInsertOrder(newOrder);
                dbUpsertProduct(updatedProducts.find(p => p.id === product.id));

                setLastCreatedOrder(newOrder);
                setSavingOrder(false);
                setOrderModal(null);
                showToast(`Đã lên đơn ${orderId}!`, "success");
            };

            // Mở màn Bán hàng (POS) thủ công với thông tin đã có trong cửa sổ — dùng khi cần chọn thêm nhiều
            // linh kiện khác nhau trong 1 đơn, hoặc cần chỉnh sửa kỹ hơn ngoài phạm vi cửa sổ xác nhận nhanh.
            const handleOpenInPos = () => {
                const product = products.find(p => p.id === orderModal.productId);
                setAiOrderDraft({
                    name: orderModal.name,
                    phone: orderModal.phone,
                    address: orderModal.address,
                    requestedItem: product ? product.name : ""
                });
                setOrderModal(null);
                setActiveTab("pos");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 text-xxs">
                    {/* Inbox */}
                    <div className="lg:col-span-4 bg-white p-3.5 rounded-xl border border-[var(--c-line)] flex flex-col space-y-3">
                        <h3 className="font-bold text-[var(--c-ink)] border-b pb-2 text-sm uppercase"><i className="fa-brands fa-facebook-messenger text-[var(--c-ai)]"></i> Hộp thư Messenger</h3>
                        
                        {/* Simulation writer */}
                        <form onSubmit={handleSendCustomMessage} className="bg-[var(--c-bg)] border p-2.5 rounded-xl space-y-1.5">
                            <p className="font-bold text-xs uppercase text-[var(--c-muted)]">Tự gõ thử tin nhắn để test AI:</p>
                            <div className="grid grid-cols-2 gap-2">
                                <input type="text" placeholder="Họ tên khách" required value={customSender} onChange={(e) => setCustomSender(e.target.value)} className="rounded-xl border p-2" />
                                <button type="submit" className="bg-[var(--c-primary-dark)] text-white font-bold rounded-xl">Gửi thử</button>
                            </div>
                            <textarea placeholder="Ví dụ: Lấy cho anh 1 pin 12 pro ship về 24 Lý Thường Kiệt HN sđt 0981234567 nhé..." required value={customText} onChange={(e) => setCustomText(e.target.value)} className="w-full rounded-xl border p-2 h-16" />
                        </form>

                        <div className="space-y-1.5 overflow-y-auto max-h-56">
                            {messages.map(msg => (
                                <div 
                                    key={msg.id}
                                    onClick={() => { setSelectedMsg(msg); setAiReply(""); setLastCreatedOrder(null); openOrderModalFromMessage(msg); }}
                                    className={`p-3 border rounded-xl cursor-pointer transition-all ${selectedMsg?.id === msg.id ? 'bg-[#EAF2FA]/50 border-[var(--c-primary-light)]' : 'bg-[var(--c-bg)] border-[var(--c-line)]'}`}
                                >
                                    <div className="flex justify-between font-bold">
                                        <span>{msg.sender}</span>
                                        <span className="text-xs text-[var(--c-muted)]">{msg.time}</span>
                                    </div>
                                    <p className="text-[var(--c-muted)] line-clamp-2 mt-1">{msg.text}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* AI Workspace */}
                    <div className="lg:col-span-8 bg-white p-3.5 rounded-xl border border-[var(--c-line)] flex flex-col space-y-3">
                        {selectedMsg ? (
                            <div className="space-y-3 flex-1">
                                <h4 className="font-bold text-xs">💬 Đang rà soát chat: <span className="text-[var(--c-primary)]">{selectedMsg.sender}</span></h4>
                                
                                <div className="p-3 bg-[#F1F5F9] rounded-xl border italic">
                                    "{selectedMsg.text}"
                                </div>

                                {/* Reply AI */}
                                <div className="space-y-1.5 border-t pt-2.5">
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-[var(--c-muted)] uppercase">Tư vấn báo giá (AI Gemini):</span>
                                        <button 
                                            onClick={() => triggerAutoReplyAI(selectedMsg)}
                                            disabled={loadingAI}
                                            className="bg-[var(--c-ai)] hover:bg-[var(--c-ai-dark)] text-white font-bold px-3 py-1 rounded-xl"
                                        >
                                            {loadingAI ? "Đang quét..." : "AI Tự Động Soạn Giá"}
                                        </button>
                                    </div>
                                    {aiReply && <div className="p-3 bg-[#EFEBFB]/50 border border-[#DCD3F4] rounded-xl whitespace-pre-wrap">{aiReply}</div>}
                                </div>

                                {/* Lên đơn từ tin nhắn */}
                                <div className="space-y-1.5 border-t pt-2.5">
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-[var(--c-muted)] uppercase">Lên đơn từ tin nhắn (AI Gemini):</span>
                                        <button 
                                            onClick={() => openOrderModalFromMessage(selectedMsg)}
                                            disabled={loadingParse}
                                            className="bg-[var(--c-warning)] hover:bg-[#A6650D] text-white font-bold px-3 py-1 rounded-xl"
                                        >
                                            {loadingParse ? "Đang đọc tin nhắn..." : "🔍 AI Đọc Lại & Mở Cửa Sổ Lên Đơn"}
                                        </button>
                                    </div>
                                    {lastCreatedOrder && (
                                        <div className="p-2.5 bg-[#EAF2FA] border border-[var(--c-primary-light)] rounded-xl">
                                            <span className="font-bold text-[var(--c-primary)]">🎉 Đã lên đơn {lastCreatedOrder.id}</span>
                                            <span className="text-[var(--c-muted)] block">Vào tab "Quản lý Vận đơn" hoặc "Đơn hàng đã bán" để xem & xử lý tiếp đơn này.</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <p className="text-center py-16 text-[var(--c-muted)]">Chọn tin nhắn ở bên trái để kích hoạt trợ lý robot AI phân tích.</p>
                        )}
                    </div>

                    {/* ============ CỬA SỔ AI XÁC NHẬN THÔNG TIN TRƯỚC KHI LÊN ĐƠN ============ */}
                    {orderModal && (
                        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-lg p-5 space-y-3 text-xxs max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center border-b pb-2">
                                    <h3 className="font-bold text-sm uppercase"><i className="fa-solid fa-robot text-[var(--c-ai)]"></i> AI đọc tin nhắn — xác nhận trước khi lên đơn</h3>
                                    <button onClick={() => setOrderModal(null)} className="text-[var(--c-muted)] hover:text-[var(--c-danger)]"><i className="fa-solid fa-xmark"></i></button>
                                </div>

                                {orderModal.matchedCustomer ? (
                                    <div className="p-2.5 bg-[#EAF2FA] border border-[var(--c-primary-light)] rounded-xl">
                                        ✅ Đã tìm thấy khách hàng này trong <b>Danh sách Khách hàng</b>: <b>{orderModal.matchedCustomer.name}</b> — {orderModal.matchedCustomer.phone}. Thông tin SĐT/địa chỉ đã tự điền theo hồ sơ cũ.
                                    </div>
                                ) : (
                                    <div className="p-2.5 bg-[#FBF0E1] border border-[#F0DCB8] rounded-xl">
                                        ⚠️ Chưa thấy khách này trong Danh sách Khách hàng. Vui lòng bổ sung SĐT/địa chỉ nếu tin nhắn chưa có đủ.
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-2.5">
                                    <div>
                                        <span className="block text-[var(--c-muted)] mb-1">Tên khách hàng *</span>
                                        <input type="text" value={orderModal.name} onChange={(e) => setOrderModal({ ...orderModal, name: e.target.value })} className="w-full rounded-xl border p-2 font-semibold" />
                                    </div>
                                    <div>
                                        <span className="block text-[var(--c-muted)] mb-1">SĐT {orderModal.shipMode === "ship" && "*"}</span>
                                        <input type="text" value={orderModal.phone} onChange={(e) => setOrderModal({ ...orderModal, phone: e.target.value })} className="w-full rounded-xl border p-2" placeholder="Chưa có, điền vào đây..." />
                                    </div>
                                </div>

                                <div>
                                    <span className="block text-[var(--c-muted)] mb-1">Địa chỉ giao hàng {orderModal.shipMode === "ship" && "*"}</span>
                                    <input type="text" value={orderModal.address} onChange={(e) => setOrderModal({ ...orderModal, address: e.target.value })} className="w-full rounded-xl border p-2" placeholder="Chưa có, điền vào đây..." />
                                </div>

                                <div className="grid grid-cols-2 gap-2.5">
                                    <div>
                                        <span className="block text-[var(--c-muted)] mb-1">Linh kiện *</span>
                                        <select value={orderModal.productId} onChange={(e) => setOrderModal({ ...orderModal, productId: e.target.value })} className="w-full rounded-xl border p-2">
                                            <option value="">-- Chọn linh kiện trong kho --</option>
                                            {products.map(p => <option key={p.id} value={p.id}>{p.name} (còn {p.stock})</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <span className="block text-[var(--c-muted)] mb-1">Số lượng</span>
                                        <input type="number" min="1" value={orderModal.qty} onChange={(e) => setOrderModal({ ...orderModal, qty: e.target.value })} onFocus={(e) => e.target.select()} className="w-full rounded-xl border p-2 font-bold" />
                                    </div>
                                </div>

                                <div>
                                    <span className="block text-[var(--c-muted)] mb-1 font-bold">Hình thức lên đơn:</span>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setOrderModal({ ...orderModal, shipMode: "ship" })} className={`flex-1 py-2 rounded-xl font-bold border ${orderModal.shipMode === "ship" ? "bg-[var(--c-primary-dark)] text-white border-[var(--c-primary-dark)]" : "bg-[#F1F5F9] text-[var(--c-ink)] border-[var(--c-line)]"}`}>
                                            🚚 Đẩy sang vận chuyển (ship)
                                        </button>
                                        <button type="button" onClick={() => setOrderModal({ ...orderModal, shipMode: "counter" })} className={`flex-1 py-2 rounded-xl font-bold border ${orderModal.shipMode === "counter" ? "bg-[var(--c-primary-dark)] text-white border-[var(--c-primary-dark)]" : "bg-[#F1F5F9] text-[var(--c-ink)] border-[var(--c-line)]"}`}>
                                            🏬 Lên đơn tại quầy
                                        </button>
                                    </div>
                                </div>

                                {!orderModal.matchedCustomer && (
                                    <label className="flex items-center gap-2 cursor-pointer select-none">
                                        <input type="checkbox" checked={orderModal.saveNewCustomer} onChange={(e) => setOrderModal({ ...orderModal, saveNewCustomer: e.target.checked })} className="h-3.5 w-3.5 rounded-xl" />
                                        <span className="font-semibold">Lưu khách hàng này vào Danh sách Khách hàng</span>
                                    </label>
                                )}

                                <div className="grid grid-cols-3 gap-2 pt-2 border-t">
                                    <button onClick={() => setOrderModal(null)} className="w-full bg-[#F1F5F9] hover:bg-[#E7ECF2] text-[var(--c-ink)] font-bold py-2.5 rounded-xl">Hủy</button>
                                    <button onClick={handleOpenInPos} className="w-full bg-[#EAF2FA] hover:bg-[#DCEAF7] text-[var(--c-primary)] font-bold py-2.5 rounded-xl">Mở ở POS</button>
                                    <button onClick={handleConfirmOrderModal} disabled={savingOrder} className="w-full bg-[var(--c-accent)] hover:bg-[var(--c-accent-dark)] disabled:opacity-50 text-white font-bold py-2.5 rounded-xl">
                                        {savingOrder ? "Đang lưu..." : "✅ Xác nhận"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // TAB 8: THIẾT LẬP CẤU HÌNH API
        // ==========================================
        function ConfigsTab({ configs, setConfigs, dbSaveConfigs, showToast, askConfirm, resetDatabase, setShowTrashModal, trashBin }) {
            const [geminiApiKey, setGeminiApiKey] = useState(configs.geminiApiKey || "");
            const [ghnToken, setGhnToken] = useState(configs.ghnToken || "");
            const [ghnShopId, setGhnShopId] = useState(configs.ghnShopId || "");
            const [spxToken, setSpxToken] = useState(configs.spxToken || "");
            const [shopAddress, setShopAddress] = useState(configs.shopAddress || "");
            const [shopPhone, setShopPhone] = useState(configs.shopPhone || "");

            const handleSave = (e) => {
                e.preventDefault();
                const newConfigs = {
                    geminiApiKey: geminiApiKey.trim(),
                    ghnToken: ghnToken.trim(),
                    ghnShopId: ghnShopId.trim(),
                    spxToken: spxToken.trim(),
                    shopAddress: shopAddress.trim(),
                    shopPhone: shopPhone.trim()
                };
                setConfigs(newConfigs);
                dbSaveConfigs(newConfigs); // Đồng bộ cấu hình lên Supabase (bảng cau_hinh_he_thong), lưu riêng cho tài khoản này, dùng chung mọi thiết bị đăng nhập cùng tài khoản
                showToast("Đã cập nhật cấu hình API của cửa hàng!", "success");
            };

            return (
                <div className="max-w-md mx-auto bg-white p-4 rounded-xl border border-[var(--c-line)] text-xxs space-y-3">
                    <h3 className="font-bold border-b pb-2 text-xs uppercase"><i className="fa-solid fa-gears text-[var(--c-primary-light)]"></i> Cấu hình tham số API & Hệ thống</h3>
                    
                    <form onSubmit={handleSave} className="space-y-3.5">
                        <div>
                            <label className="block text-[var(--c-ink)] font-bold mb-1">GEMINI API KEY (GOOGLE AI)</label>
                            <input 
                                type="password"
                                placeholder="Dán Gemini API Key của bạn..."
                                value={geminiApiKey}
                                onChange={(e) => setGeminiApiKey(e.target.value)}
                                className="w-full rounded-xl border p-2.5 font-mono text-[var(--c-ink)]"
                            />
                            <p className="text-sm text-[var(--c-muted)] mt-1">Yêu cầu để chạy AI Tư vấn báo giá, bóc tách địa chỉ, nhắc nợ và chạy Command Bar tại POS.</p>
                        </div>

                        <div className="grid grid-cols-2 gap-2.5">
                            <div>
                                <label className="block text-[var(--c-ink)] font-bold mb-1">GHN TOKEN</label>
                                <input 
                                    type="password"
                                    placeholder="Token API GHN"
                                    value={ghnToken}
                                    onChange={(e) => setGhnToken(e.target.value)}
                                    className="w-full rounded-xl border p-2.5 font-mono text-[var(--c-ink)]"
                                />
                            </div>
                            <div>
                                <label className="block text-[var(--c-ink)] font-bold mb-1">GHN SHOP ID</label>
                                <input 
                                    type="text"
                                    placeholder="Mã cửa hàng GHN"
                                    value={ghnShopId}
                                    onChange={(e) => setGhnShopId(e.target.value)}
                                    className="w-full rounded-xl border p-2.5 font-mono text-[var(--c-ink)]"
                                />
                            </div>
                        </div>

                        <div>
                            <label className="block text-[var(--c-ink)] font-bold mb-1">SPX EXPRESS / SHOPEE OPEN PLATFORM SECRET KEY</label>
                            <input 
                                type="password"
                                placeholder="Dán mã Secret Key của SPX lấy từ trang hồ sơ shop..."
                                value={spxToken}
                                onChange={(e) => setSpxToken(e.target.value)}
                                className="w-full rounded-xl border p-2.5 font-mono text-[var(--c-ink)]"
                            />
                        </div>

                        <div className="border-t border-dashed pt-2.5 space-y-2.5">
                            <span className="font-bold text-[var(--c-ink)]">📍 THÔNG TIN BƯU CỤC GỬI HÀNG (SHOP):</span>
                            <div>
                                <label className="block text-[var(--c-muted)] mb-1">Địa chỉ gửi</label>
                                <input type="text" value={shopAddress} onChange={(e) => setShopAddress(e.target.value)} className="w-full rounded-xl border p-2 text-[var(--c-ink)] font-medium" />
                            </div>
                            <div>
                                <label className="block text-[var(--c-muted)] mb-1">Số điện thoại gửi</label>
                                <input type="text" value={shopPhone} onChange={(e) => setShopPhone(e.target.value)} className="w-full rounded-xl border p-2 text-[var(--c-ink)] font-medium" />
                            </div>
                        </div>

                        <button type="submit" className="w-full bg-[var(--c-primary-dark)] hover:bg-[#072B4A] text-white font-bold py-2.5 rounded-xl text-xs shadow">Lưu toàn bộ thiết lập</button>
                    </form>

                    <div className="border-t border-[#F6D2D2] pt-3 mt-2 space-y-1.5">
                        <span className="font-bold text-[#B23A3A] block">DỌN DẸP HỆ THỐNG / RESET DATABASE:</span>
                        <p className="text-sm text-[var(--c-muted)]">Mọi hành động ở đây sẽ tác động trực tiếp và ghi đè toàn bộ dữ liệu lưu trữ LocalStorage.</p>
                        <div className="flex gap-2.5">
                            <button onClick={() => askConfirm("CẢNH BÁO", "Bạn có chắc chắn muốn xóa sạch hoàn toàn cơ sở dữ liệu về trắng 0? (Dữ liệu cũ sẽ được lưu vết trong Thùng Rác)", () => resetDatabase("empty"))} className="bg-[#FDEDED] hover:bg-[#F6D2D2] text-[#B23A3A] font-bold py-2 px-4 rounded-xl">Xóa toàn bộ dữ liệu</button>
                            <button onClick={() => setShowTrashModal(true)} className="bg-[#F1F5F9] hover:bg-[#E7ECF2] text-[var(--c-ink)] font-bold py-2 px-4 rounded-xl flex items-center gap-2">
                                <i className="fa-solid fa-trash-can-arrow-up"></i> Xem Lịch sử khôi phục ({trashBin.length})
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
