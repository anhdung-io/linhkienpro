                        {/* PANEL ĐỀ XUẤT THỰC THI (AI DRAFT PRE-CONFIRM FORM) */}
                        <div className="md:col-span-4 bg-[var(--c-bg)] p-3.5 border rounded-xl flex flex-col justify-between">
                            <div>
                                <h4 className="font-bold text-[var(--c-ink)] border-b pb-2 flex justify-between items-center text-sm uppercase">
                                    <span>Hành Động Chờ Xác Nhận</span>
                                    {pendingAction && <button onClick={() => setPendingAction(null)} className="text-[var(--c-danger)] hover:underline font-bold">Hủy</button>}
                                </h4>
                                
                                {pendingAction ? (
                                    <form onSubmit={handleConfirmPendingAction} className="mt-2 space-y-1.5">
                                        <p className="font-semibold text-[var(--c-muted)] bg-[#FBF0E1] border border-[#F0DCB8] rounded-xl px-2.5 py-1 text-xs">
                                            ⚠️ Phát hiện thiếu thông tin! Vui lòng hoàn tất biểu mẫu dưới để lưu:
                                        </p>
                                        <div>
                                            <label className="text-[var(--c-muted)] block">Tên linh kiện:</label>
                                            <input 
                                                type="text" 
                                                value={pendingAction.data.name}
                                                onChange={(e) => setPendingAction({ ...pendingAction, data: { ...pendingAction.data, name: e.target.value }})}
                                                className="w-full bg-white border rounded-xl p-2 font-bold text-[var(--c-ink)]" 
                                            />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[var(--c-muted)] block">Giá vốn (cost):</label>
                                                <input 
                                                    type="number" 
                                                    value={pendingAction.data.costPrice}
                                                    onChange={(e) => setPendingAction({ ...pendingAction, data: { ...pendingAction.data, costPrice: e.target.value }})}
                                                    onFocus={(e) => e.target.select()}
                                                    className="w-full bg-white border rounded-xl p-2 font-bold" 
                                                    placeholder="Nhập giá vốn"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[var(--c-muted)] block">Giá bán (sell):</label>
                                                <input 
                                                    type="number" 
                                                    value={pendingAction.data.sellPrice}
                                                    onChange={(e) => setPendingAction({ ...pendingAction, data: { ...pendingAction.data, sellPrice: e.target.value }})}
                                                    onFocus={(e) => e.target.select()}
                                                    className="w-full bg-white border rounded-xl p-2 font-bold text-[var(--c-primary)]" 
                                                />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[var(--c-muted)] block">Số lượng tồn:</label>
                                                <input 
                                                    type="number" 
                                                    value={pendingAction.data.stock}
                                                    onChange={(e) => setPendingAction({ ...pendingAction, data: { ...pendingAction.data, stock: e.target.value }})}
                                                    onFocus={(e) => e.target.select()}
                                                    className="w-full bg-white border rounded-xl p-2 font-bold text-[var(--c-danger)]" 
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[var(--c-muted)] block">Danh mục:</label>
                                                <select
                                                    value={pendingAction.data.category}
                                                    onChange={(e) => setPendingAction({ ...pendingAction, data: { ...pendingAction.data, category: e.target.value }})}
                                                    className="w-full bg-white border rounded-xl p-2"
                                                >
                                                    <option value="Màn hình">Màn hình</option>
                                                    <option value="Pin">Pin</option>
                                                    <option value="Kính lưng">Kính lưng</option>
                                                    <option value="Phụ kiện">Phụ kiện</option>
                                                    <option value="Camera">Camera</option>
                                                    <option value="Dụng cụ">Dụng cụ</option>
                                                </select>
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-[var(--c-accent)] hover:bg-[var(--c-accent-dark)] text-white font-bold py-2 rounded-xl shadow">
                                            Lưu vào kho hàng ngay
                                        </button>
                                    </form>
                                ) : (
                                    <p className="text-[var(--c-muted)] text-center py-10 italic">Không có hành động nào chờ duyệt.</p>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Cảnh báo kho và đơn hàng gần đây */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div className="rounded-xl bg-white p-3.5 border border-[var(--c-line)]">
                            <h3 className="font-bold text-[var(--c-ink)] mb-2 border-b pb-2 text-xxs uppercase text-[var(--c-muted)]">⚠️ Danh mục cần nhập (Dưới 5)</h3>
                            <div className="overflow-x-auto max-h-44">
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="bg-[var(--c-bg)] text-[var(--c-muted)] text-xs uppercase">
                                            <th className="p-2">Mã</th>
                                            <th className="p-2">Tên</th>
                                            <th className="p-2 text-right">Lượng tồn</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-[var(--c-line)]">
                                        {products.filter(p => p.stock < 5).map(p => (
                                            <tr key={p.id}>
                                                <td className="p-2 font-bold">{p.id}</td>
                                                <td className="p-2">{p.name}</td>
                                                <td className="p-2 text-right text-[var(--c-danger)] font-bold">{p.stock}</td>
                                            </tr>
                                        ))}
                                        {products.filter(p => p.stock < 5).length === 0 && (
                                            <tr>
                                                <td colSpan="3" className="text-center py-4 text-[var(--c-muted)]">Không có cảnh báo. Tồn kho ổn định!</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="rounded-xl bg-white p-3.5 border border-[var(--c-line)]">
                            <h3 className="font-bold text-[var(--c-ink)] mb-2 border-b pb-2 text-xxs uppercase text-[var(--c-muted)]">🔄 Giao dịch gần đây</h3>
                            <div className="space-y-1.5 max-h-44 overflow-y-auto">
                                {orders.slice(-4).reverse().map(o => (
                                    <div key={o.id} className="flex justify-between items-center text-xxs border-b border-[var(--c-line)] pb-2">
                                        <div>
                                            <span className="font-bold">{o.id}</span> • {o.customerName}
                                            <p className="text-sm text-[var(--c-muted)]">{o.date}</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="font-bold">{o.finalTotal.toLocaleString()}đ</span>
                                            <p className="text-[var(--c-accent)] text-sm font-bold">+{o.profit.toLocaleString()}đ</p>
                                        </div>
                                    </div>
                                ))}
                                {orders.length === 0 && (
                                    <p className="text-center py-4 text-[var(--c-muted)]">Chưa có hóa đơn nào.</p>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Wipe Data Sandbox block */}
                    <div className="rounded-xl bg-[#FDEDED] border border-[#F6D2D2] p-3.5">
                        <div className="flex items-center justify-between">
                            <div>
                                <h4 className="font-bold text-[#B23A3A] text-xxs uppercase">⚙️ Bảng chuẩn đoán hệ thống (Wipe Database)</h4>
                                <p className="text-sm text-[var(--c-muted)]">Bạn muốn xóa sạch dữ liệu mẫu để tiến hành thử nghiệm ứng dụng 100% từ đầu?</p>
                            </div>
                            <div className="flex gap-2.5">
                                <button 
                                    onClick={() => askConfirm("CẢNH BÁO", "Bạn có chắc chắn muốn xóa sạch hoàn toàn cơ sở dữ liệu về trắng 0? (Dữ liệu hiện tại sẽ được tự động chuyển vào Thùng Rác)", () => resetDatabase("empty"))}
                                    className="bg-[var(--c-danger)] hover:bg-[#B23A3A] text-white font-bold px-4 py-2.5 rounded-xl text-sm"
                                >
                                    Xóa trắng hoàn toàn
                                </button>
                                <button 
                                    onClick={() => setShowTrashModal(true)}
                                    className="bg-[var(--c-primary-light)] hover:bg-[var(--c-primary)] text-white font-bold px-4 py-2.5 rounded-xl text-sm flex items-center gap-2"
                                >
                                    <i className="fa-solid fa-trash-can-arrow-up"></i> Xem Lịch sử & Khôi phục ({trashBin.length})
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // TAB 2: POS BÁN HÀNG (TẠO HÓA ĐƠN & VẬN ĐƠN)
        // ==========================================
        function POSTab({ products, setProducts, customers, setCustomers, orders, setOrders, shippings, setShippings, configs, showToast, aiOrderDraft, setAiOrderDraft, dbInsertOrder, dbUpsertProduct }) {
            const [cart, setCart] = useState([]);
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [discount, setDiscount] = useState(0);
            const [paymentMethod, setPaymentMethod] = useState("Tiền mặt");
            const [searchProduct, setSearchProduct] = useState("");
            const [searchCustomer, setSearchCustomer] = useState("");
            const [posCategory, setPosCategory] = useState("Tất cả");

            // Shipping state
            const [isShipping, setIsShipping] = useState(false);
            const [carrier, setCarrier] = useState("SPX");
            const [shippingFee, setShippingFee] = useState(30000);
            const [codAmount, setCodAmount] = useState(0);
            const [receiverName, setReceiverName] = useState("");
            const [receiverPhone, setReceiverPhone] = useState("");
            const [receiverAddress, setReceiverAddress] = useState("");
            const [shippingNote, setShippingNote] = useState("");

            // Quick customer modal
            const [showAddCustomerModal, setShowAddCustomerModal] = useState(false);
            const [quickCustName, setQuickCustName] = useState("");
            const [quickCustPhone, setQuickCustPhone] = useState("");
            const [quickCustAddr, setQuickCustAddr] = useState("");

            // Preview modal
            const [createdInvoice, setCreatedInvoice] = useState(null);

            // Ghi nhận bản nháp đơn hàng chuyển giao từ AI Messenger sang POS
            useEffect(() => {
                if (aiOrderDraft) {
                    setReceiverName(aiOrderDraft.name || "");
                    setReceiverPhone(aiOrderDraft.phone || "");
                    setReceiverAddress(aiOrderDraft.address || "");
                    setIsShipping(true);

                    // Tìm khách hàng tương đồng để chọn luôn
                    const matched = customers.find(c => c.phone === aiOrderDraft.phone);
                    if (matched) {
                        setSelectedCustomer(matched);
                    } else if (aiOrderDraft.name) {
                        // Thêm nhanh khách hàng mới
                        const newCust = {
                            id: "KH" + (1001 + customers.length),
                            name: aiOrderDraft.name,
                            phone: aiOrderDraft.phone || "0900000000",
                            address: aiOrderDraft.address || "Chưa có địa chỉ",
                            debt: 0,
                            notes: "Tự động tạo từ Messenger AI"
                        };
                        setCustomers(prev => [...prev, newCust]);
                        setSelectedCustomer(newCust);
                    }

                    // Tự động tìm kiếm linh kiện khớp để add vào giỏ hàng
                    if (aiOrderDraft.requestedItem) {
                        const matchedProd = products.find(p => p.name.toLowerCase().includes(aiOrderDraft.requestedItem.toLowerCase()));
                        if (matchedProd) {
                            addToCart(matchedProd);
                        }
                    }

                    // Reset nháp tránh vòng lặp
                    setAiOrderDraft(null);
                    showToast("Đã tải xong thông tin khách hàng từ AI sang POS!", "success");
                }
            }, [aiOrderDraft]);

            // Trích lọc kho linh kiện POS — tự suy ra từ danh mục thực tế đang có trong kho (luôn đồng bộ với
            // Kho Hàng Hóa, kể cả khi thêm/sửa/xóa danh mục ở đó), không còn dùng danh sách cứng cố định nữa.
            const categories = useMemo(() => ["Tất cả", ...new Set(products.map(p => p.category).filter(Boolean))], [products]);
            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchSearch = p.name.toLowerCase().includes(searchProduct.toLowerCase()) || p.id.toLowerCase().includes(searchProduct.toLowerCase());
                    const matchCat = posCategory === "Tất cả" || p.category === posCategory;
                    return matchSearch && matchCat;
                });
            }, [products, searchProduct, posCategory]);

            const filteredCustomers = customers.filter(c => 
                c.name.toLowerCase().includes(searchCustomer.toLowerCase()) || c.phone.includes(searchCustomer)
            );

            const addToCart = (product) => {
                if (product.stock <= 0) {
                    showToast(`Linh kiện [${product.name}] đã hết hàng!`, "error");
                    return;
                }
                setCart(prevCart => {
                    const exist = prevCart.find(i => i.productId === product.id);
                    if (exist) {
                        if (exist.quantity >= product.stock) {
                            showToast(`Sản phẩm này chỉ còn tồn tối đa: ${product.stock}!`, "error");
                            return prevCart;
                        }
                        return prevCart.map(i => i.productId === product.id ? { ...i, quantity: i.quantity + 1 } : i);
                    } else {
                        return [...prevCart, { productId: product.id, name: product.name, price: product.sellPrice, cost: product.costPrice, quantity: 1 }];
                    }
                });
                showToast(`Đã thêm ${product.name}`);
            };

            const updateCartQuantity = (productId, val) => {
                const prod = products.find(p => p.id === productId);
                setCart(prevCart => prevCart.map(i => {
                    if (i.productId === productId) {
                        const nextVal = i.quantity + val;
                        if (nextVal <= 0) return null;
                        if (nextVal > prod.stock) {
                            showToast(`Vượt quá số lượng tồn tối đa (${prod.stock})!`, "error");
                            return i;
                        }
                        return { ...i, quantity: nextVal };
                    }
                    return i;
                }).filter(Boolean));
            };

            const handleUpdateCartPrice = (productId, newPrice) => {
                setCart(prevCart => prevCart.map(i => i.productId === productId ? { ...i, price: Number(newPrice) } : i));
            };

            const handleSelectCustomer = (c) => {
                setSelectedCustomer(c);
                setReceiverName(c.name);
                setReceiverPhone(c.phone);
                setReceiverAddress(c.address);
                setSearchCustomer("");
            };

            const handleQuickAddCustomer = (e) => {
                e.preventDefault();
                if (!quickCustName || !quickCustPhone) {
                    showToast("Điền tên và sđt để thêm nhanh!", "error");
                    return;
                }
                const newC = {
                    id: "KH" + (1001 + customers.length),
                    name: quickCustName,
                    phone: quickCustPhone,
                    address: quickCustAddr,
                    debt: 0,
                    notes: "Tạo trực tiếp tại POS"
                };
                setCustomers([...customers, newC]);
                setSelectedCustomer(newC);
                setReceiverName(quickCustName);
                setReceiverPhone(quickCustPhone);
                setReceiverAddress(quickCustAddr);
                
                setQuickCustName("");
                setQuickCustPhone("");
                setQuickCustAddr("");
                setShowAddCustomerModal(false);
                showToast("Đã tạo nhanh khách hàng!", "success");
            };

            const cartTotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const finalTotal = Math.max(0, cartTotal - discount);
            const cartCost = cart.reduce((sum, i) => sum + (i.cost * i.quantity), 0);
            const profit = Math.max(0, finalTotal - cartCost);

            useEffect(() => {
                if (isShipping) {
                    setCodAmount(finalTotal);
                }
            }, [finalTotal, isShipping]);

            const handleCheckout = () => {
                if (cart.length === 0) {
                    showToast("Chọn linh kiện để xuất hóa đơn!", "error");
                    return;
                }

                // ma_don_hang là UNIQUE trên TOÀN BẢNG (mọi tài khoản dùng chung 1 bảng đơn hàng), nên KHÔNG thể
                // sinh mã kiểu "HD" + (1001 + orders.length) — vì orders.length giờ chỉ đếm đơn của riêng tài
                // khoản này, tài khoản khác cũng ra trùng số thứ tự -> trùng khóa (lỗi duplicate key). Dùng
                // thời gian thực (mili-giây) làm mã đơn để đảm bảo không bao giờ trùng giữa các tài khoản.
                const orderId = "HD" + Date.now();
                const orderDate = new Date().toISOString().replace('T', ' ').substring(0, 16);
                const randomTracking = isShipping ? `${carrier}-VN-${Math.floor(1000000 + Math.random() * 9000000)}` : "";

                // Đơn hàng hợp nhất: nếu có ship, toàn bộ thông tin vận đơn được nhúng ngay vào CHÍNH đơn hàng này
                // (không tạo dòng/bảng riêng) — sẽ được dbInsertOrder gom vào cột chi_tiet_don_hang khi lưu Supabase.
                const newOrder = {
                    id: orderId,
                    date: orderDate,
                    customerId: selectedCustomer ? selectedCustomer.id : "KH_LE",
                    customerName: selectedCustomer ? selectedCustomer.name : "Khách bán lẻ tại quầy",
                    // SĐT của khách đã chọn (nếu có hồ sơ) — cần thiết để cột so_dien_thoai trên Supabase không bị
                    // để trống với các đơn bán tại quầy (trước đây chỉ đơn có ship mới lưu SĐT).
                    customerPhone: selectedCustomer ? selectedCustomer.phone : "",
                    items: cart,
                    total: cartTotal,
                    discount: discount,
                    finalTotal: finalTotal,
                    profit: profit,
                    paymentMethod: paymentMethod,
                    status: "Thành công",
                    note: paymentMethod,
                    // Không ship -> HoanThanh (xong ngay tại quầy). Có ship -> ChoLayHang (vào luồng Quản lý Vận đơn).
                    trangThai: isShipping ? ORDER_STATUS.CHO_LAY_HANG : ORDER_STATUS.HOAN_THANH,
                    isShipping: isShipping,
                    carrier: isShipping ? carrier : "",
                    trackingCode: randomTracking,
                    receiverName: isShipping ? (receiverName || "Khách hàng lẻ") : "",
                    receiverPhone: isShipping ? (receiverPhone || "0900000000") : "",
                    receiverAddress: isShipping ? (receiverAddress || "Lấy trực tiếp") : "",
                    codAmount: isShipping ? Number(codAmount) : 0,
                    shippingFee: isShipping ? Number(shippingFee) : 0,
                    shipNote: isShipping ? shippingNote : ""
                };

                const updatedProducts = products.map(p => {
                    const cartItem = cart.find(it => it.productId === p.id);
                    if (cartItem) {
                        return { ...p, stock: p.stock - cartItem.quantity };
                    }
                    return p;
                });
                setProducts(updatedProducts);
                setOrders([...orders, newOrder]);

                // Đồng bộ Supabase: INSERT đơn hàng mới vào bảng "đơn_hang_dang_chờ" + cập nhật tồn kho
                dbInsertOrder(newOrder);
                updatedProducts.forEach(p => {
                    const cartItem = cart.find(it => it.productId === p.id);
                    if (cartItem) dbUpsertProduct(p);
                });

                // Chỉ dùng để hiển thị phần "PHẦN THÔNG TIN SHIP" trên phiếu in xem trước, không phải state riêng
                const shippingPreview = isShipping ? {
                    carrier: newOrder.carrier,
                    trackingCode: newOrder.trackingCode,
                    receiverName: newOrder.receiverName,
                    receiverPhone: newOrder.receiverPhone,
                    receiverAddress: newOrder.receiverAddress,
                    codAmount: newOrder.codAmount
                } : null;

                setCreatedInvoice({ order: newOrder, shipping: shippingPreview });
                showToast("Khởi tạo đơn hàng & Vận đơn hoàn tất!", "success");
            };

            const resetPOS = () => {
                setCart([]);
                setSelectedCustomer(null);
                setDiscount(0);
                setIsShipping(false);
                setReceiverName("");
                setReceiverPhone("");
                setReceiverAddress("");
                setCodAmount(0);
                setShippingNote("");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 h-full">
                    {/* Left: Product Selector */}
                    <div className="lg:col-span-7 bg-white p-3.5 rounded-xl border border-[var(--c-line)] flex flex-col overflow-hidden">
                        
                        {/* Categories Tab selector */}
                        <div className="flex gap-2 overflow-x-auto pb-2.5 border-b border-[var(--c-line)] mb-2">
                            {categories.map(c => (
                                <button 
                                    key={c}
                                    onClick={() => setPosCategory(c)}
                                    className={`px-3.5 py-2 rounded-xl text-sm font-bold ${posCategory === c ? 'bg-[var(--c-primary-dark)] text-white' : 'bg-[#F1F5F9] text-[var(--c-muted)] hover:bg-[#E7ECF2]'}`}
                                >
                                    {c}
                                </button>
                            ))}
                        </div>

                        <div className="relative mb-2">
                            <i className="fa-solid fa-magnifying-glass absolute left-2 top-2 text-[var(--c-muted)]"></i>
                            <input 
                                type="text"
                                placeholder="Tìm mã SKU hoặc tên linh kiện..."
                                value={searchProduct}
                                onChange={(e) => setSearchProduct(e.target.value)}
                                className="w-full rounded-xl border border-[var(--c-line)] pl-7 pr-2 py-2 text-xxs focus:border-[var(--c-primary-light)] focus:outline-none"
                            />
                        </div>

                        {/* Inventory list */}
                        <div className="flex-1 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 gap-2 align-content-start pr-1">
                            {filteredProducts.map(p => (
                                <div 
                                    key={p.id}
                                    onClick={() => addToCart(p)}
                                    className={`p-2.5 rounded-xl border text-left cursor-pointer transition-all ${p.stock <= 0 ? 'bg-[var(--c-bg)] border-[var(--c-line)] opacity-50' : 'bg-[var(--c-bg)] hover:bg-[#EAF2FA]/40 border-[var(--c-line)] hover:border-[var(--c-primary-light)]'}`}
                                >
                                    <div className="flex justify-between font-bold text-[var(--c-muted)] text-xxs">
                                        <span>{p.id}</span>
                                        <span className={`px-2 rounded-xl ${p.stock < 5 ? 'bg-[#FDEDED] text-[var(--c-danger)]' : 'bg-[#E7ECF2] text-[var(--c-ink)]'}`}>{p.stock} {p.unit}</span>

        // ==========================================
        // TAB 3: KHO LINH KIỆN (THÊM, SỬA, XÓA LƯU VẾT)
        // ==========================================
        function ProductsTab({ products, setProducts, configs, showToast, askConfirm, deleteToTrash, dbUpsertProduct, dbDeleteProduct, categories, setCategories, dbUpsertCategory, dbDeleteCategory }) {
            const [search, setSearch] = useState("");
            const [filterCat, setFilterCat] = useState("Tất cả");
            const [editingProduct, setEditingProduct] = useState(null);
            const [checkedIds, setCheckedIds] = useState([]); // Danh sách SKU đang được tick chọn để xóa hàng loạt
            const [showCatManager, setShowCatManager] = useState(false); // Bật/tắt khối quản lý danh mục
            const [newCatName, setNewCatName] = useState("");
            const [editingCatId, setEditingCatId] = useState(null); // dbId của danh mục đang sửa tên (null = không sửa)
            const [editingCatName, setEditingCatName] = useState("");

            // ============ NHẬP HÀNG LOẠT TỪ FILE EXCEL / CSV (Google Sheet tải về .xlsx hoặc .csv) ============
            const [showImportPanel, setShowImportPanel] = useState(false);
            const [importFileName, setImportFileName] = useState("");
            const [importParsing, setImportParsing] = useState(false);
            const [importRawRows, setImportRawRows] = useState([]); // Toàn bộ dữ liệu thô dạng mảng 2 chiều [dòng][cột]
            const [importDataStartRow, setImportDataStartRow] = useState(2); // Dòng dữ liệu đầu tiên (1-based), mặc định dòng 2 (bỏ qua dòng tiêu đề)
            const [importCol, setImportCol] = useState({ sku: "", name: "", category: "", costPrice: "", sellPrice: "", stock: "", unit: "" }); // Chỉ số cột (0-based) được gán cho mỗi trường, "" = không dùng
            const [importFixedCategory, setImportFixedCategory] = useState(""); // Danh mục mặc định áp dụng khi không map cột danh mục / ô danh mục trống
            const [importFixedUnit, setImportFixedUnit] = useState("Cái"); // Đơn vị mặc định áp dụng khi không map cột đơn vị
            const [importDuplicateMode, setImportDuplicateMode] = useState("skip"); // "skip" | "overwrite" | "addstock" — cách xử lý khi Mã SKU trùng với linh kiện đã có

            // Form state
            const [id, setId] = useState("");
            const [name, setName] = useState("");
            const [category, setCategory] = useState(() => (categories[0] && categories[0].name) || "Khác");
            const [costPrice, setCostPrice] = useState(0);
            const [sellPrice, setSellPrice] = useState(0);
            const [stock, setStock] = useState(0);
            const [unit, setUnit] = useState("Cái");

            const categoryNames = ["Tất cả", ...categories.map(c => c.name)];

            // Đặt danh mục mặc định cho khối Import = danh mục đầu tiên đang có, ngay khi danh sách danh mục sẵn sàng
            useEffect(() => {
                if (!importFixedCategory && categories.length > 0) setImportFixedCategory(categories[0].name);
            }, [categories]);

            // Đổi chỉ số cột (0-based) -> tên cột kiểu Excel (0->A, 1->B, ... 25->Z, 26->AA...)
            const colLetter = (idx) => {
                let s = "";
                let n = idx;
                do {
                    s = String.fromCharCode(65 + (n % 26)) + s;
                    n = Math.floor(n / 26) - 1;
                } while (n >= 0);
                return s;
            };
            const importColCount = useMemo(() => importRawRows.reduce((max, row) => Math.max(max, row.length), 0), [importRawRows]);

            // ============ QUẢN LÝ DANH MỤC: THÊM / SỬA / XÓA ============
            const handleAddCategory = (e) => {
                e.preventDefault();
                const trimmed = newCatName.trim();
                if (!trimmed) return;
                if (categories.some(c => c.name.toLowerCase() === trimmed.toLowerCase())) {
                    showToast("Danh mục này đã tồn tại!", "error");
                    return;
                }
                const newCat = { dbId: null, name: trimmed };
                setCategories(prev => [...prev, newCat]);
                dbUpsertCategory(newCat);
                setNewCatName("");
                showToast(`Đã thêm danh mục: ${trimmed}`);
            };

            const startEditCategory = (cat) => {
                setEditingCatId(cat.dbId ?? cat.name);
                setEditingCatName(cat.name);
            };

            const handleSaveCategoryName = (cat) => {
                const trimmed = editingCatName.trim();
                if (!trimmed) return;
                if (categories.some(c => c !== cat && c.name.toLowerCase() === trimmed.toLowerCase())) {
                    showToast("Tên danh mục này đã tồn tại!", "error");
                    return;
                }
                const oldName = cat.name;
                const updatedCat = { ...cat, name: trimmed };
                setCategories(prev => prev.map(c => c === cat ? updatedCat : c));
                dbUpsertCategory(updatedCat);
                // Cập nhật lại danh mục của MỌI sản phẩm đang dùng tên danh mục cũ, để không bị "mồ côi"
                if (oldName !== trimmed) {
                    setProducts(prev => prev.map(p => {
                        if (p.category !== oldName) return p;
                        const updatedProd = { ...p, category: trimmed };
                        dbUpsertProduct(updatedProd);
                        return updatedProd;
                    }));
                }
                setEditingCatId(null);
                setEditingCatName("");
                showToast("Đã đổi tên danh mục!");
            };

            const handleDeleteCategory = (cat) => {
                const usedCount = products.filter(p => p.category === cat.name).length;
                askConfirm(
                    "XÓA DANH MỤC",
                    usedCount > 0
                        ? `Danh mục "${cat.name}" đang được ${usedCount} linh kiện sử dụng. Xóa danh mục sẽ KHÔNG xóa linh kiện, nhưng bạn nên đổi danh mục cho chúng sau. Vẫn muốn xóa?`
                        : `Bạn có chắc chắn muốn xóa danh mục "${cat.name}"?`,
                    () => {
                        setCategories(prev => prev.filter(c => c !== cat));
                        if (cat.dbId) dbDeleteCategory(cat.dbId);
                        showToast(`Đã xóa danh mục: ${cat.name}`);
                    }
                );
            };

            // ============ ĐỌC FILE EXCEL (.xlsx/.xls) HOẶC CSV -> DỮ LIỆU THÔ DẠNG MẢNG 2 CHIỀU ============
            const handleImportFileChange = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const isCsv = /\.csv$/i.test(file.name);
                setImportParsing(true);
                setImportFileName(file.name);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const workbook = isCsv
                            ? XLSX.read(evt.target.result, { type: "string" })
                            : XLSX.read(new Uint8Array(evt.target.result), { type: "array" });
                        const firstSheetName = workbook.SheetNames[0];
                        const sheet = workbook.Sheets[firstSheetName];
                        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", raw: false });
                        const normalized = rows.map(row => row.map(cell => (cell === null || cell === undefined) ? "" : String(cell).trim()));
                        setImportRawRows(normalized);
                        setImportDataStartRow(2);
                        setImportCol({ sku: "", name: "", category: "", costPrice: "", sellPrice: "", stock: "", unit: "" });
                        showToast(`Đã đọc file "${file.name}": ${normalized.length} dòng, sheet "${firstSheetName}".`, "success");
                    } catch (err) {
                        console.error(err);
                        showToast("Không đọc được file. Hãy kiểm tra đây có đúng là file Excel (.xlsx/.xls) hoặc CSV không.", "error");
                        setImportRawRows([]);
                    } finally {
                        setImportParsing(false);
                    }
                };
                reader.onerror = () => {
                    setImportParsing(false);
                    showToast("Lỗi khi đọc file!", "error");
                };
                if (isCsv) reader.readAsText(file, "UTF-8");
                else reader.readAsArrayBuffer(file);
                e.target.value = ""; // reset input để chọn lại đúng file cũ vẫn kích hoạt onChange
            };

            const handleCancelImport = () => {
                setShowImportPanel(false);
                setImportRawRows([]);
                setImportFileName("");
                setImportCol({ sku: "", name: "", category: "", costPrice: "", sellPrice: "", stock: "", unit: "" });
            };

            // Từ dữ liệu thô + cấu hình cột đã chọn -> danh sách linh kiện SẼ được nhập (đã tính SKU, phát hiện trùng)
            const importCandidates = useMemo(() => {
                if (!importRawRows.length || importCol.name === "" || importCol.sellPrice === "") return [];
                const startIdx = Math.max(0, (Number(importDataStartRow) || 1) - 1);
                const existingSkuSet = new Set(products.map(p => p.id));
                let maxAuto = products.reduce((max, p) => {
                    const m = /^SP(\d+)$/i.exec(p.id);
                    return m ? Math.max(max, parseInt(m[1], 10)) : max;
                }, 0);
                const parseNum = (str) => parseFloat(String(str).replace(/[^\d.-]/g, "")) || 0;
                const results = [];
                for (let r = startIdx; r < importRawRows.length; r++) {
                    const row = importRawRows[r];
                    if (!row || row.every(c => !c)) continue; // dòng trắng hoàn toàn -> bỏ qua
                    const getCell = (colIdx) => (colIdx === "" || colIdx === null || colIdx === undefined) ? "" : (row[Number(colIdx)] || "").toString().trim();
                    const rawName = getCell(importCol.name);
                    const rawSell = getCell(importCol.sellPrice);
                    if (!rawName || !rawSell) continue; // thiếu tên hoặc giá bán -> bỏ qua dòng này
                    const sellPrice = parseNum(rawSell);
                    if (sellPrice <= 0) continue;
                    const costPrice = importCol.costPrice !== "" ? parseNum(getCell(importCol.costPrice)) : 0;
                    const stock = importCol.stock !== "" ? parseNum(getCell(importCol.stock)) : 0;
                    const unit = (importCol.unit !== "" ? getCell(importCol.unit) : "") || importFixedUnit || "Cái";
                    const category = (importCol.category !== "" ? getCell(importCol.category) : "") || importFixedCategory || "Khác";
                    let sku = importCol.sku !== "" ? getCell(importCol.sku).toUpperCase() : "";
                    let isDuplicate = false;
                    if (sku) {
                        isDuplicate = existingSkuSet.has(sku);
                    } else {
                        do {
                            maxAuto += 1;
                            sku = "SP" + String(maxAuto).padStart(3, "0");
                        } while (existingSkuSet.has(sku));
                    }
                    existingSkuSet.add(sku); // tránh sinh trùng mã tự động ngay trong cùng 1 lần nhập
                    results.push({ rowNumber: r + 1, id: sku, name: rawName, category, costPrice, sellPrice, stock, unit, isDuplicate });
                }
                return results;
            }, [importRawRows, importCol, importDataStartRow, importFixedCategory, importFixedUnit, products]);

            const handleConfirmImport = () => {
                if (importCandidates.length === 0) {
                    showToast("Chưa có dòng hợp lệ nào để nhập (thiếu Tên sản phẩm hoặc Giá bán ở cột đã chọn).", "error");
                    return;
                }
                const toInsert = [];
                const toUpdate = [];
                let skippedCount = 0;
                importCandidates.forEach(cand => {
                    if (cand.isDuplicate) {
                        if (importDuplicateMode === "skip") { skippedCount++; return; }
                        const existing = products.find(p => p.id === cand.id);
                        if (!existing) return;
                        if (importDuplicateMode === "overwrite") {
                            toUpdate.push({ ...existing, name: cand.name, category: cand.category, costPrice: cand.costPrice, sellPrice: cand.sellPrice, stock: cand.stock, unit: cand.unit });
                        } else if (importDuplicateMode === "addstock") {
                            toUpdate.push({ ...existing, stock: (Number(existing.stock) || 0) + cand.stock });
                        }
                    } else {
                        toInsert.push({ id: cand.id, name: cand.name, category: cand.category, costPrice: cand.costPrice, sellPrice: cand.sellPrice, stock: cand.stock, unit: cand.unit, dbId: undefined });
                    }
                });

                // Tự động tạo mới các danh mục xuất hiện trong file mà cửa hàng chưa có sẵn
                const newCatNames = [...new Set(importCandidates.map(c => c.category))]
                    .filter(catName => catName && !categories.some(c => c.name.toLowerCase() === catName.toLowerCase()));
                newCatNames.forEach(catName => {
                    const newCat = { dbId: null, name: catName };
                    setCategories(prev => [...prev, newCat]);
                    dbUpsertCategory(newCat);
                });

                if (toInsert.length > 0) {
                    setProducts(prev => [...prev, ...toInsert]);
                    toInsert.forEach(p => dbUpsertProduct(p));
                }
                if (toUpdate.length > 0) {
                    setProducts(prev => prev.map(p => toUpdate.find(u => u.id === p.id) || p));
                    toUpdate.forEach(p => dbUpsertProduct(p));
                }

                showToast(
                    `Đã nhập ${toInsert.length} linh kiện mới` +
                    (toUpdate.length ? `, cập nhật ${toUpdate.length} linh kiện trùng SKU` : "") +
                    (skippedCount ? `, bỏ qua ${skippedCount} dòng trùng SKU` : "") + "!",
                    "success"
                );
                handleCancelImport();
            };

            const filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.id.toLowerCase().includes(search.toLowerCase());
                const matchCat = filterCat === "Tất cả" || p.category === filterCat;
                return matchSearch && matchCat;
            });

            // ============ KÉO THỨ TỰ ƯU TIÊN HIỂN THỊ LÊN/XUỐNG ============
            // Thứ tự trong mảng "products" chính là thứ tự hiển thị xuyên suốt cả app (bảng Kho hàng hóa
            // LẪN lưới chọn hàng ở màn Bán hàng - POS) nên chỉ cần đổi chỗ trong mảng gốc rồi lưu lại số
            // thứ tự (sortOrder) lên Supabase để lần tải trang sau vẫn giữ đúng thứ tự đã sắp xếp.
            const moveProduct = (skuId, direction) => {
                const idx = filtered.findIndex(p => p.id === skuId);
                if (idx === -1) return;
                const swapIdx = direction === "up" ? idx - 1 : idx + 1;
                if (swapIdx < 0 || swapIdx >= filtered.length) return; // đã ở đầu/cuối danh sách đang lọc

                const currentSku = filtered[idx].id;
                const neighborSku = filtered[swapIdx].id;

                const fullIdxA = products.findIndex(p => p.id === currentSku);
                const fullIdxB = products.findIndex(p => p.id === neighborSku);
                if (fullIdxA === -1 || fullIdxB === -1) return;

                const newProducts = [...products];
                [newProducts[fullIdxA], newProducts[fullIdxB]] = [newProducts[fullIdxB], newProducts[fullIdxA]];

                // Đánh lại số thứ tự tuần tự theo vị trí mới rồi lưu toàn bộ lên Supabase để đảm bảo
                // nhất quán khi tải lại trang (không chỉ 2 dòng vừa đổi chỗ).
                const reindexed = newProducts.map((p, i) => ({ ...p, sortOrder: i }));
                setProducts(reindexed);
                reindexed.forEach(p => dbUpsertProduct(p));
            };

            const handleSave = (e) => {
                e.preventDefault();
                if (!id || !name || costPrice <= 0 || sellPrice <= 0) {
                    showToast("Vui lòng nhập đầy đủ giá và thông tin linh kiện!", "error");
                    return;
                }

                const updated = {
                    id: id.trim().toUpperCase(),
                    name: name.trim(),
                    category,
                    costPrice: Number(costPrice),
                    sellPrice: Number(sellPrice),
                    stock: Number(stock),
                    unit,
                    // Giữ lại dbId (uuid thật của Supabase) khi sửa sản phẩm đã tồn tại, để UPDATE đúng dòng
                    // thay vì vô tình tạo dòng mới. Sản phẩm hoàn toàn mới sẽ không có dbId (undefined).
                    dbId: editingProduct ? editingProduct.dbId : undefined
                };

                if (editingProduct) {
                    setProducts(prev => prev.map(p => p.id === editingProduct.id ? updated : p));
                    dbUpsertProduct(updated);
                    showToast(`Đã lưu thay đổi linh kiện: ${name}`);
                } else {
                    if (products.some(p => p.id === updated.id)) {
                        showToast("Mã SKU này đã tồn tại trong hệ thống!", "error");
                        return;
                    }
                    setProducts(prev => [...prev, updated]);
                    dbUpsertProduct(updated);
                    showToast(`Đã thêm linh kiện: ${name}`);
                }

                resetForm();
            };

            const handleEdit = (p) => {
                setEditingProduct(p);
                setId(p.id);
                setName(p.name);
                setCategory(p.category);
                setCostPrice(p.costPrice);
                setSellPrice(p.sellPrice);
                setStock(p.stock);
                setUnit(p.unit);
            };

            const handleDelete = (prodId) => {
                const target = products.find(p => p.id === prodId);
                askConfirm(
                    "XÁC NHẬN XÓA",
                    `Bạn có chắc chắn muốn xóa linh kiện mã [${prodId}] khỏi kho? Sản phẩm này sẽ được đưa vào Thùng Rác để khôi phục khi cần.`,
                    () => {
                        if (target) deleteToTrash("Sản phẩm", target);
                        setProducts(prev => prev.filter(p => p.id !== prodId));
                        // Cột "id" thật trên Supabase là kiểu uuid, KHÔNG phải mã SKU -> phải xóa theo target.dbId
                        if (target && target.dbId) dbDeleteProduct(target.dbId);
                        showToast("Đã xóa linh kiện (Chuyển vào Thùng Rác)!");
                    }
                );
            };

            // ============ CHỌN NHIỀU & XÓA HÀNG LOẠT ============
            const allChecked = filtered.length > 0 && filtered.every(p => checkedIds.includes(p.id));
            const toggleCheckAll = () => {
                if (allChecked) setCheckedIds(prev => prev.filter(id => !filtered.some(p => p.id === id)));
                else setCheckedIds(prev => [...new Set([...prev, ...filtered.map(p => p.id)])]);
            };
            const toggleCheckOne = (id) => {
                setCheckedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };
            const handleDeleteSelected = () => {
                if (checkedIds.length === 0) return;
                askConfirm(
                    "XÁC NHẬN XÓA HÀNG LOẠT",
                    `Xóa ${checkedIds.length} linh kiện đã chọn khỏi kho? Tất cả sẽ được đưa vào Thùng Rác để khôi phục nếu cần.`,
                    () => {
                        const targets = products.filter(p => checkedIds.includes(p.id));
                        targets.forEach(target => {
                            deleteToTrash("Sản phẩm", target);
                            if (target.dbId) dbDeleteProduct(target.dbId);
                        });
                        setProducts(prev => prev.filter(p => !checkedIds.includes(p.id)));
                        setCheckedIds([]);
                        showToast(`Đã xóa ${targets.length} linh kiện (Chuyển vào Thùng Rác)!`);
                    }
                );
            };

            const resetForm = () => {
                setEditingProduct(null);
                setId("");
                setName("");
                setCategory((categories[0] && categories[0].name) || "Khác");
                setCostPrice(0);
                setSellPrice(0);
                setStock(0);
                setUnit("Cái");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3">
                    {/* Form Editor */}
                    <div className="lg:col-span-4 bg-white p-3.5 rounded-xl border border-[var(--c-line)] text-xxs flex flex-col gap-3">
                        <div>
                            <h3 className="font-bold text-[var(--c-ink)] mb-2 border-b pb-2 flex justify-between items-center text-xs">
                                <span>{editingProduct ? "✍️ CẬP NHẬT LINH KIỆN" : "➕ THÊM LINH KIỆN MỚI"}</span>
                                {editingProduct && <button onClick={resetForm} className="text-[var(--c-danger)] font-bold hover:underline">Hủy sửa</button>}
                            </h3>

                            <form onSubmit={handleSave} className="space-y-2.5">
                                <div className="grid grid-cols-2 gap-2.5">
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Mã SKU linh kiện *</label>
                                        <input 
                                            type="text"
                                            required
                                            disabled={!!editingProduct}
                                            value={id}
                                            onChange={(e) => setId(e.target.value)}
                                            className="w-full rounded-xl border border-[var(--c-line)] p-2 uppercase font-bold disabled:bg-[var(--c-bg)]"
                                            placeholder="Ví dụ: SP001"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1 flex justify-between items-center">
                                            <span>Phân loại danh mục</span>
                                            <button type="button" onClick={() => setShowCatManager(v => !v)} className="text-[var(--c-primary-light)] font-bold hover:underline normal-case">
                                                <i className="fa-solid fa-gears"></i> Quản lý danh mục
                                            </button>
                                        </label>
                                        <select 
                                            value={category}
                                            onChange={(e) => setCategory(e.target.value)}
                                            className="w-full rounded-xl border border-[var(--c-line)] p-2"
                                        >
                                            {categories.length === 0 && <option value="">-- Chưa có danh mục --</option>}
                                            {categories.map(c => <option key={c.dbId ?? c.name} value={c.name}>{c.name}</option>)}
                                        </select>
                                    </div>
                                </div>

                                {showCatManager && (
                                    <div className="border border-dashed border-[var(--c-line)] rounded-xl p-2.5 space-y-2 bg-[var(--c-bg)]">
                                        <span className="font-bold text-[var(--c-ink)] block">📂 Chỉnh sửa danh mục</span>
                                        {/* Lưu ý: KHÔNG được dùng thẻ <form> ở đây vì nó đã nằm lồng bên trong <form onSubmit={handleSave}>
                                            của khối "Thêm linh kiện mới" phía trên — HTML không cho phép <form> lồng <form>, nếu lồng thì
                                            trình duyệt sẽ bỏ qua form con và bấm nút sẽ submit nhầm ra form cha ngoài cùng, gây tải lại
                                            trang. Vì vậy dùng <div> + xử lý phím Enter thủ công + nút type="button" gọi thẳng hàm. */}
                                        <div className="flex gap-1.5">
                                            <input
                                                type="text"
                                                value={newCatName}
                                                onChange={(e) => setNewCatName(e.target.value)}
                                                onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); handleAddCategory(e); } }}
                                                placeholder="Tên danh mục mới..."
                                                className="flex-1 rounded-xl border border-[var(--c-line)] p-2"
                                            />
                                            <button type="button" onClick={handleAddCategory} className="bg-[var(--c-accent)] hover:bg-[var(--c-accent-dark)] text-white font-bold px-3 rounded-xl">
                                                <i className="fa-solid fa-plus"></i>
                                            </button>
                                        </div>
                                        <div className="max-h-40 overflow-y-auto space-y-1.5">
                                            {categories.map(cat => (
                                                <div key={cat.dbId ?? cat.name} className="flex items-center gap-1.5 bg-white rounded-xl border border-[var(--c-line)] p-1.5">
                                                    {editingCatId === (cat.dbId ?? cat.name) ? (
                                                        <React.Fragment>
                                                            <input
                                                                type="text"
                                                                value={editingCatName}
                                                                onChange={(e) => setEditingCatName(e.target.value)}
                                                                className="flex-1 rounded-lg border border-[var(--c-line)] p-1.5"
                                                                autoFocus
                                                            />
                                                            <button type="button" onClick={() => handleSaveCategoryName(cat)} className="text-[var(--c-accent)] px-1.5"><i className="fa-solid fa-check"></i></button>
                                                            <button type="button" onClick={() => { setEditingCatId(null); setEditingCatName(""); }} className="text-[var(--c-muted)] px-1.5"><i className="fa-solid fa-xmark"></i></button>
                                                        </React.Fragment>
                                                    ) : (
                                                        <React.Fragment>
                                                            <span className="flex-1 font-semibold text-[var(--c-ink)]">{cat.name}</span>
                                                            <button type="button" onClick={() => startEditCategory(cat)} className="text-[var(--c-primary-light)] px-1.5"><i className="fa-regular fa-pen-to-square"></i></button>
                                                            <button type="button" onClick={() => handleDeleteCategory(cat)} className="text-[var(--c-danger)] px-1.5"><i className="fa-regular fa-trash-can"></i></button>
                                                        </React.Fragment>
                                                    )}
                                                </div>
                                            ))}
                                            {categories.length === 0 && <p className="text-center text-[var(--c-muted)] py-2">Chưa có danh mục nào, hãy thêm mới ở trên.</p>}
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block text-[var(--c-muted)] mb-1">Tên hiển thị linh kiện *</label>
                                    <input 
                                        type="text"
                                        required
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        className="w-full rounded-xl border border-[var(--c-line)] p-2 font-semibold"
                                        placeholder="Ví dụ: Màn hình iPhone 11 Pro"
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-2.5">
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Giá vốn nhập vào (đ)</label>
                                        <input 
                                            type="number"
                                            required
                                            value={costPrice}
                                            onChange={(e) => setCostPrice(Number(e.target.value))}
                                            onFocus={(e) => e.target.select()}
                                            className="w-full rounded-xl border border-[var(--c-line)] p-2 font-bold text-[var(--c-ink)]"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Giá niêm yết bán ra (đ)</label>
                                        <input 
                                            type="number"
                                            required
                                            value={sellPrice}
                                            onChange={(e) => setSellPrice(Number(e.target.value))}
                                            onFocus={(e) => e.target.select()}
                                            className="w-full rounded-xl border border-[var(--c-line)] p-2 font-bold text-[var(--c-primary)]"
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-2.5">
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Số lượng nhập kho</label>
                                        <input 
                                            type="number"
                                            required
                                            value={stock}
                                            onChange={(e) => setStock(Number(e.target.value))}
                                            onFocus={(e) => e.target.select()}
                                            className="w-full rounded-xl border border-[var(--c-line)] p-2 font-bold text-[var(--c-danger)]"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[var(--c-muted)] mb-1">Đơn vị đo lường</label>
                                        <input 
                                            type="text"
                                            value={unit}
                                            onChange={(e) => setUnit(e.target.value)}
                                            className="w-full rounded-xl border border-[var(--c-line)] p-2"
                                            placeholder="Cái, Cục, Sợi..."
                                        />
                                    </div>
                                </div>

                                <button type="submit" className="w-full bg-[var(--c-primary-dark)] hover:bg-[#072B4A] font-bold text-white py-2.5 rounded-xl mt-3">
                                    <i className="fa-regular fa-floppy-disk"></i> {editingProduct ? "Lưu thay đổi" : "Lưu vào kho hàng"}
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Database List */}
                    <div className="lg:col-span-8 bg-white p-3.5 rounded-xl border border-[var(--c-line)]">
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2.5 mb-3">
