        // ==========================================
        // TAB 4: QUẢN LÝ KHÁCH HÀNG (SỬA, THU NỢ, XÓA LƯU VẾT)
        // ==========================================
        function CustomersTab({ customers, setCustomers, orders, messages, configs, showToast, askConfirm, askPrompt, openCopyModal, deleteToTrash }) {
            const [search, setSearch] = useState("");
            const [editingCust, setEditingCust] = useState(null);

            // Form state
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [address, setAddress] = useState("");
            const [debt, setDebt] = useState(0);
            const [notes, setNotes] = useState("");

            // View state
            const [selectedCustomerHistory, setSelectedCustomerHistory] = useState(null);
            const [checkedIds, setCheckedIds] = useState([]); // Danh sách mã KH đang được tick chọn để xóa hàng loạt

            const filtered = customers.filter(c => 
                c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search)
            );

            const handleDraftAIDebtReminder = async (cust) => {
                if (!configs.geminiApiKey) {
                    showToast("Điền Gemini API Key ở tab Cấu hình trước!", "error");
                    return;
                }
                showToast("Trợ lý AI đang soạn thảo mẫu nhắc nợ tinh tế...", "info");

                try {
                    const prompt = `Soạn một mẫu tin nhắn Zalo/SMS nhắc nhở công nợ cực kỳ khéo léo, thân thiện nhưng vẫn trang trọng và rõ ràng cho khách hàng tên "${cust.name}" đang có công nợ trị giá ${cust.debt.toLocaleString()} VNĐ tại cửa hàng LinhKienPRO.`;
                    const payload = { contents: [{ parts: [{ text: prompt }] }] };

                    const resultData = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const responseText = resultData.candidates?.[0]?.content?.parts?.[0]?.text || "Không soạn thảo được.";
                    
                    openCopyModal(`Soạn tin nhắn nhắc nợ (AI) - ${cust.name}`, responseText);
                } catch (e) {
                    showToast("Không tạo được bản nháp bằng AI.", "error");
                }
            };

            const handleSave = (e) => {
                e.preventDefault();
                if (!name || !phone) {
                    showToast("Điền đầy đủ tên và sđt!", "error");
                    return;
                }

                const updated = {
                    id: editingCust ? editingCust.id : "KH" + (1001 + customers.length),
                    name: name.trim(),
                    phone: phone.trim(),
                    address: address.trim(),
                    debt: Number(debt),
                    notes: notes.trim()
                };

                if (editingCust) {
                    setCustomers(prev => prev.map(c => c.id === editingCust.id ? updated : c));
                    showToast("Đã lưu chỉnh sửa đối tác!");
                } else {
                    setCustomers(prev => [...prev, updated]);
                    showToast("Đã thêm khách hàng mới thành công!");
                }

                resetForm();
            };

            const handleEdit = (c) => {
                setEditingCust(c);
                setName(c.name);
                setPhone(c.phone);
                setAddress(c.address);
                setDebt(c.debt);
                setNotes(c.notes);
            };

            const handleDelete = (id) => {
                const target = customers.find(c => c.id === id);
                askConfirm(
                    "XÁC NHẬN XÓA KHÁCH HÀNG",
                    "Bạn có thật sự muốn xóa hồ sơ khách hàng này? Hồ sơ sẽ được chuyển vào Thùng Rác để có thể khôi phục.",
                    () => {
                        if (target) deleteToTrash("Khách hàng", target);
                        setCustomers(prev => prev.filter(c => c.id !== id));
                        showToast("Đã xóa hồ sơ khách (Chuyển vào Thùng Rác)!");
                    }
                );
            };

            // ============ CHỌN NHIỀU & XÓA HÀNG LOẠT ============
            const allChecked = filtered.length > 0 && filtered.every(c => checkedIds.includes(c.id));
            const toggleCheckAll = () => {
                if (allChecked) setCheckedIds(prev => prev.filter(id => !filtered.some(c => c.id === id)));
                else setCheckedIds(prev => [...new Set([...prev, ...filtered.map(c => c.id)])]);
            };
            const toggleCheckOne = (id) => {
                setCheckedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };
            const handleDeleteSelected = () => {
                if (checkedIds.length === 0) return;
                askConfirm(
                    "XÁC NHẬN XÓA HÀNG LOẠT",
                    `Xóa ${checkedIds.length} khách hàng đã chọn? Tất cả sẽ được đưa vào Thùng Rác để khôi phục nếu cần.`,
                    () => {
                        const targets = customers.filter(c => checkedIds.includes(c.id));
                        targets.forEach(target => deleteToTrash("Khách hàng", target));
                        setCustomers(prev => prev.filter(c => !checkedIds.includes(c.id)));
                        setCheckedIds([]);
                        showToast(`Đã xóa ${targets.length} khách hàng (Chuyển vào Thùng Rác)!`);
                    }
                );
            };

            const handlePayDebt = (cId) => {
                askPrompt(
                    "THU NỢ KHÁCH HÀNG",
                    "Vui lòng nhập chính xác số tiền cần thu nợ để trừ vào công nợ hiện tại:",
                    "0",
                    (amount) => {
                        const payAmt = Number(amount);
                        if (isNaN(payAmt) || payAmt <= 0) {
                            showToast("Số tiền thu nợ không hợp lệ!", "error");
                            return;
                        }

                        setCustomers(prev => prev.map(c => {
                            if (c.id === cId) {
                                const newDebt = Math.max(0, c.debt - payAmt);
                                showToast(`Đã thu ${payAmt.toLocaleString()}đ. Công nợ còn lại: ${newDebt.toLocaleString()}đ`, "success");
                                return { ...c, debt: newDebt };
                            }
                            return c;
                        }));
                    }
                );
            };

            const resetForm = () => {
                setEditingCust(null);
                setName("");
                setPhone("");
                setAddress("");
                setDebt(0);
                setNotes("");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 text-xxs">
                    {/* Form Editor */}
                    <div className="lg:col-span-4 bg-white p-3.5 rounded-xl border border-[var(--c-line)]">
                        <h3 className="font-bold text-[var(--c-ink)] mb-2 border-b pb-2 flex justify-between items-center text-xs">
                            <span>{editingCust ? "👤 CẬP NHẬT ĐỐI TÁC" : "👤 THÊM ĐỐI TÁC KHÁCH HÀNG"}</span>
                            {editingCust && <button onClick={resetForm} className="text-[var(--c-danger)] font-bold hover:underline">Hủy sửa</button>}
                        </h3>

                        <form onSubmit={handleSave} className="space-y-2.5">
                            <div>
                                <label className="block text-[var(--c-muted)] mb-1">Họ tên đối tác *</label>
                                <input type="text" required value={name} onChange={(e) => setName(e.target.value)} className="w-full rounded-xl border border-[var(--c-line)] p-2" />
                            </div>
                            <div>
                                <label className="block text-[var(--c-muted)] mb-1">Số điện thoại liên lạc *</label>
                                <input type="text" required value={phone} onChange={(e) => setPhone(e.target.value)} className="w-full rounded-xl border border-[var(--c-line)] p-2" />
                            </div>
                            <div>
                                <label className="block text-[var(--c-muted)] mb-1">Địa chỉ đầy đủ</label>
                                <input type="text" value={address} onChange={(e) => setAddress(e.target.value)} className="w-full rounded-xl border border-[var(--c-line)] p-2" />
                            </div>
                            <div className="grid grid-cols-2 gap-2.5">
                                <div>
                                    <label className="block text-[var(--c-muted)] mb-1">Dư nợ ban đầu (đ)</label>
                                    <input type="number" value={debt} onChange={(e) => setDebt(Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full rounded-xl border border-[var(--c-line)] p-2 font-bold text-[var(--c-danger)]" />
                                </div>
                                <div>
                                    <label className="block text-[var(--c-muted)] mb-1">Mô tả ghi chú</label>
                                    <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full rounded-xl border border-[var(--c-line)] p-2" />
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-[var(--c-primary-dark)] hover:bg-[#072B4A] text-white font-bold py-2.5 rounded-xl mt-3">Lưu hồ sơ đối tác</button>
                        </form>
                    </div>

                    {/* Database List */}
                    <div className="lg:col-span-8 bg-white p-3.5 rounded-xl border border-[var(--c-line)]">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-[var(--c-ink)] text-xxs uppercase">👥 DANH SÁCH KHÁCH HÀNG THÂN THIẾT</h3>
                            <div className="flex items-center gap-2">
                                {checkedIds.length > 0 && (
                                    <button
                                        onClick={handleDeleteSelected}
                                        className="bg-[var(--c-danger)] hover:opacity-90 text-white font-bold px-3 py-1 rounded-xl flex items-center gap-1.5 text-xxs"
                                    >
                                        <i className="fa-solid fa-trash"></i> Xóa đã chọn ({checkedIds.length})
                                    </button>
                                )}
                                <input 
                                    type="text"
                                    placeholder="Lọc tên, sđt..."
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="rounded-xl border border-[var(--c-line)] px-3 py-1 text-xxs w-36"
                                />
                            </div>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead>
                                    <tr className="bg-[#F1F5F9] text-[var(--c-muted)] uppercase text-xs">
                                        <th className="p-2.5 w-8"><input type="checkbox" checked={allChecked} onChange={toggleCheckAll} className="h-3.5 w-3.5" /></th>
                                        <th className="p-2.5">Mã KH</th>
                                        <th className="p-2.5">Họ tên</th>
                                        <th className="p-2.5">Số điện thoại</th>
                                        <th className="p-2.5 text-right">Nợ hiện tại</th>
                                        <th className="p-2.5 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-[var(--c-line)]">
                                    {filtered.map(c => (
                                        <tr key={c.id} className="hover:bg-[#F1F5F9]/50">
                                            <td className="p-2.5"><input type="checkbox" checked={checkedIds.includes(c.id)} onChange={() => toggleCheckOne(c.id)} className="h-3.5 w-3.5" /></td>
                                            <td className="p-2.5 font-bold text-[var(--c-ink)]">{c.id}</td>
                                            <td className="p-2.5 font-semibold text-[var(--c-ink)]">{c.name}</td>
                                            <td className="p-2.5">{c.phone}</td>
                                            <td className={`p-2.5 text-right font-bold ${c.debt > 0 ? 'text-[var(--c-danger)]' : 'text-[var(--c-muted)]'}`}>{c.debt.toLocaleString()}đ</td>
                                            <td className="p-2.5 text-center flex items-center justify-center gap-2.5">
                                                {c.debt > 0 && (
                                                    <button 
                                                        onClick={() => handleDraftAIDebtReminder(c)} 
                                                        className="bg-[#EFEBFB] hover:bg-[#DCD3F4] text-[var(--c-ai-dark)] font-bold px-2.5 py-1 rounded-xl"
                                                        title="Soạn tin nhắc nợ"
                                                    >
                                                        <i className="fa-solid fa-wand-magic-sparkles"></i> 🤖 Nhắc nợ
                                                    </button>
                                                )}
                                                <button onClick={() => handlePayDebt(c.id)} className="bg-[#EAF7F1] hover:bg-[#CDEEE0] text-[var(--c-accent-dark)] font-bold px-2.5 py-0.2 rounded-xl" title="Thu nợ">Thu Nợ</button>
                                                <button onClick={() => setSelectedCustomerHistory(c)} className="text-[var(--c-muted)] hover:text-[var(--c-ink)]"><i className="fa-solid fa-clock-rotate-left"></i></button>
                                                <button onClick={() => handleEdit(c)} className="text-[var(--c-primary-light)] hover:text-[var(--c-primary-dark)]"><i className="fa-regular fa-pen-to-square"></i></button>
                                                <button onClick={() => handleDelete(c.id)} className="text-[var(--c-danger)] hover:text-[#B23A3A]"><i className="fa-regular fa-trash-can"></i></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filtered.length === 0 && (
                                        <tr><td colSpan="6" className="text-center py-6 text-[var(--c-muted)]">Không tìm thấy khách hàng nào.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Customer history details modal */}
                    {selectedCustomerHistory && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
                            <div className="w-full max-w-sm bg-white rounded-xl p-4 text-xxs space-y-2.5 animate-fade-in">
                                <div className="flex justify-between items-center border-b pb-2 font-bold">
                                    <span>Lịch sử: {selectedCustomerHistory.name}</span>
                                    <button onClick={() => setSelectedCustomerHistory(null)} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark text-sm"></i></button>
                                </div>
                                <div>
                                    <p className="font-bold text-[var(--c-muted)] uppercase mb-1">Hóa đơn đã mua</p>
                                    <div className="max-h-36 overflow-y-auto space-y-1.5">
                                        {orders.filter(o => o.customerId === selectedCustomerHistory.id).map(o => (
                                            <div key={o.id} className="p-2.5 bg-[var(--c-bg)] border border-[var(--c-line)] rounded-xl flex justify-between items-center">
                                                <div>
                                                    <p className="font-bold">{o.id} ({o.date})</p>
                                                    <p className="text-[var(--c-muted)]">{o.items.length} mặt hàng</p>
                                                </div>
                                                <span className="font-bold text-[var(--c-ink)]">{o.finalTotal.toLocaleString()}đ</span>
                                            </div>
                                        ))}
                                        {orders.filter(o => o.customerId === selectedCustomerHistory.id).length === 0 && (
                                            <p className="text-center py-2 text-[var(--c-muted)]">Khách chưa có giao dịch nào.</p>
                                        )}
                                    </div>
                                </div>
                                <div className="border-t pt-2">
                                    <p className="font-bold text-[var(--c-muted)] uppercase mb-1">Lịch sử nhắn tin (chat_history)</p>
                                    <div className="max-h-36 overflow-y-auto space-y-1.5">
                                        {(messages || []).filter(m => m.sender === selectedCustomerHistory.phone || m.sender === selectedCustomerHistory.name).map(m => (
                                            <div key={m.id} className="p-2.5 bg-[var(--c-bg)] border border-[var(--c-line)] rounded-xl">
                                                <div className="flex justify-between text-[var(--c-muted)]"><span className="font-bold">{m.sender}</span><span>{m.time}</span></div>
                                                <p className="line-clamp-2">{m.text}</p>
                                            </div>
                                        ))}
                                        {(messages || []).filter(m => m.sender === selectedCustomerHistory.phone || m.sender === selectedCustomerHistory.name).length === 0 && (
                                            <p className="text-center py-2 text-[var(--c-muted)]">Chưa có tin nhắn nào từ khách này.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    </div>
            );
        }

        // ==========================================
        // TAB 5: LỊCH SỬ ĐƠN HÀNG (SỬA, HOÀN KHO LƯU VẾT)
        // ==========================================
        function OrdersTab({ orders, setOrders, shippings, setShippings, products, setProducts, customers, showToast, askConfirm, deleteToTrash, dbDeleteOrder, dbUpsertProduct }) {
            const [search, setSearch] = useState("");
            const [checkedIds, setCheckedIds] = useState([]); // Danh sách mã đơn đang được tick chọn để xóa hàng loạt
            const [viewingOrder, setViewingOrder] = useState(null); // Đơn đang được xem chi tiết (mở modal)

            // "Đơn hàng đã bán" giờ hiển thị TẤT CẢ đơn hàng (kể cả đơn đang/đã ship) — vì mục đích của màn
            // hình này là kiểm tra & tổng kết giá cả/lợi nhuận của MỌI giao dịch, không chỉ đơn bán tại quầy.
            // Đơn có ship vẫn đồng thời xuất hiện ở "Quản lý Vận đơn" để theo dõi tiến trình giao hàng riêng.
            const filtered = orders.filter(o => 
                o.id.toLowerCase().includes(search.toLowerCase()) || o.customerName.toLowerCase().includes(search.toLowerCase())
            );

            // Hủy 1 đơn: hoàn kho + đưa vào Thùng Rác + xóa khỏi Supabase. Dùng chung cho xóa lẻ và xóa hàng loạt.
            const cancelOneOrder = (target) => {
                deleteToTrash("Đơn hàng", target);

                // Hoàn kho
                const restoredProducts = products.map(p => {
                    const orderItem = target.items.find(it => it.productId === p.id);
                    if (orderItem) return { ...p, stock: p.stock + orderItem.quantity };
                    return p;
                });
                setProducts(restoredProducts);
                restoredProducts.forEach(p => {
                    const orderItem = target.items.find(it => it.productId === p.id);
                    if (orderItem) dbUpsertProduct(p);
                });

                setOrders(prev => prev.filter(o => o.id !== target.id));
                setShippings(prev => prev.filter(s => s.orderId !== target.id));
                dbDeleteOrder(target.id);
            };

            const handleDeleteOrder = (orderId) => {
                const target = orders.find(o => o.id === orderId);
                askConfirm(
                    "XÁC NHẬN HỦY ĐƠN HÀNG",
                    `Bạn có thật sự muốn hủy đơn hàng ${orderId} này? Các mặt hàng sẽ được cộng trả lại vào kho hàng. Bản ghi đơn hàng này sẽ được đưa vào Thùng Rác.`,
                    () => {
                        if (target) cancelOneOrder(target);
                        showToast(`Đã hủy hoàn tất đơn hàng ${orderId} & chuyển vào Thùng Rác!`, "success");
                    }
                );
            };

            // ============ CHỌN NHIỀU & XÓA HÀNG LOẠT ============
            const allChecked = filtered.length > 0 && filtered.every(o => checkedIds.includes(o.id));
            const toggleCheckAll = () => {
                if (allChecked) setCheckedIds(prev => prev.filter(id => !filtered.some(o => o.id === id)));
                else setCheckedIds(prev => [...new Set([...prev, ...filtered.map(o => o.id)])]);
            };
            const toggleCheckOne = (id) => {
                setCheckedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };
            const handleDeleteSelected = () => {
                if (checkedIds.length === 0) return;
                askConfirm(
                    "XÁC NHẬN HỦY HÀNG LOẠT",
                    `Hủy ${checkedIds.length} đơn hàng đã chọn? Hàng sẽ được hoàn trả lại kho và các đơn được đưa vào Thùng Rác để khôi phục nếu cần.`,
                    () => {
                        const targets = orders.filter(o => checkedIds.includes(o.id));
                        targets.forEach(target => cancelOneOrder(target));
                        setCheckedIds([]);
                        showToast(`Đã hủy ${targets.length} đơn hàng (Chuyển vào Thùng Rác)!`, "success");
                    }
                );
            };

            return (
                <div className="bg-white p-3.5 rounded-xl border border-[var(--c-line)] text-xxs">
                    <div className="flex justify-between items-center mb-3">
                        <h3 className="font-bold text-[var(--c-ink)] uppercase">📝 NHẬT KÝ ĐƠN HÀNG HOÀN THÀNH</h3>
                        <div className="flex items-center gap-2">
                            {checkedIds.length > 0 && (
                                <button
                                    onClick={handleDeleteSelected}
                                    className="bg-[var(--c-danger)] hover:opacity-90 text-white font-bold px-3 py-1 rounded-xl flex items-center gap-1.5"
                                >
                                    <i className="fa-solid fa-trash"></i> Hủy đã chọn ({checkedIds.length})
                                </button>
                            )}
                            <input 
                                type="text"
                                placeholder="Lọc mã đơn, tên..."
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                className="rounded-xl border border-[var(--c-line)] px-3 py-1 text-xxs w-36"
                            />
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="bg-[#F1F5F9] text-[var(--c-muted)] uppercase text-xs">
                                    <th className="p-2.5 w-8"><input type="checkbox" checked={allChecked} onChange={toggleCheckAll} className="h-3.5 w-3.5" /></th>
                                    <th className="p-2.5">Mã đơn</th>
                                    <th className="p-2.5">Ngày xuất</th>
                                    <th className="p-2.5">Họ tên khách</th>
                                    <th className="p-2.5">Mã KH / SĐT</th>
                                    <th className="p-2.5 text-right">Tổng tiền</th>
                                    <th className="p-2.5 text-right">Lợi nhuận</th>
                                    <th className="p-2.5">Thanh toán</th>
                                    <th className="p-2.5 text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-[var(--c-line)]">
                                {filtered.map(o => {
                                    const cust = customers.find(c => c.id === o.customerId);
                                    const phone = cust?.phone || o.receiverPhone || "";
                                    return (
                                    <tr key={o.id} className="hover:bg-[#F1F5F9]/50 cursor-pointer" onClick={() => setViewingOrder(o)}>
                                        <td className="p-2.5" onClick={(e) => e.stopPropagation()}><input type="checkbox" checked={checkedIds.includes(o.id)} onChange={() => toggleCheckOne(o.id)} className="h-3.5 w-3.5" /></td>
                                        <td className="p-2.5 font-bold text-[var(--c-ink)]">
                                            {o.id}
                                            {o.isShipping && <span className="ml-1.5 bg-[#FBF0E1] text-[var(--c-warning)] rounded-xl font-bold px-2 py-0.2 text-xs align-middle">🚚 Ship</span>}
                                        </td>
                                        <td className="p-2.5 text-[var(--c-muted)]">{o.date}</td>
                                        <td className="p-2.5 font-semibold">{o.customerName}</td>
                                        <td className="p-2.5 text-[var(--c-muted)]">
                                            {cust ? <span className="font-semibold text-[var(--c-ink)]">{cust.id}</span> : <span className="italic">Khách lẻ</span>}
                                            {phone && <span className="block">{phone}</span>}
                                        </td>
                                        <td className="p-2.5 text-right font-bold text-[var(--c-ink)]">{o.finalTotal.toLocaleString()}đ</td>
                                        <td className="p-2.5 text-right font-bold text-[var(--c-accent)]">+{o.profit.toLocaleString()}đ</td>
                                        <td className="p-2.5">{o.paymentMethod}</td>
                                        <td className="p-2.5 text-center" onClick={(e) => e.stopPropagation()}>
                                            <div className="flex items-center justify-center gap-1.5">
                                                <button
                                                    onClick={() => setViewingOrder(o)}
                                                    title="Xem chi tiết đơn hàng"
                                                    className="bg-[#EAF1FB] hover:bg-[#D5E4F7] text-[var(--c-primary-dark)] font-bold px-3 py-1 rounded-xl text-sm"
                                                >
                                                    <i className="fa-solid fa-eye"></i> Xem
                                                </button>
                                                <button 
                                                    onClick={() => handleDeleteOrder(o.id)}
                                                    className="bg-[#FDEDED] hover:bg-[#F6D2D2] text-[#B23A3A] font-bold px-3 py-1 rounded-xl text-sm"
                                                >
                                                    HỦY & HOÀN KHO
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                    );
                                })}
                                {filtered.length === 0 && (
                                    <tr>
                                        <td colSpan="9" className="text-center py-6 text-[var(--c-muted)]">Không tìm thấy đơn hàng nào.</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>

                    {/* Modal xem chi tiết đơn hàng */}
                    {viewingOrder && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4" onClick={() => setViewingOrder(null)}>
                            <div className="w-full max-w-md bg-white rounded-xl p-4 space-y-3 animate-fade-in max-h-[85vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b pb-2">
                                    <div>
                                        <p className="font-bold text-[var(--c-ink)]">Chi tiết đơn hàng {viewingOrder.id}</p>
                                        <p className="text-[var(--c-muted)] text-xs">{viewingOrder.date}</p>
                                    </div>
                                    <button onClick={() => setViewingOrder(null)} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>

                                <div className="grid grid-cols-2 gap-2.5 text-xxs">
                                    <div>
                                        <p className="text-[var(--c-muted)] uppercase font-bold mb-0.5">Khách hàng</p>
                                        <p className="font-semibold text-[var(--c-ink)]">
                                            {viewingOrder.customerName}
                                            {(() => {
                                                const cust = customers.find(c => c.id === viewingOrder.customerId);
                                                return cust ? <span className="ml-1.5 text-[var(--c-muted)] font-normal">— Mã {cust.id}</span> : null;
                                            })()}
                                        </p>
                                        {(() => {
                                            const cust = customers.find(c => c.id === viewingOrder.customerId);
                                            const phone = cust?.phone || viewingOrder.receiverPhone || "";
                                            const address = cust?.address || viewingOrder.receiverAddress || "";
                                            return (
                                                <>
                                                    {phone && <p className="text-[var(--c-ink)]"><i className="fa-solid fa-phone text-[var(--c-muted)] mr-1"></i>{phone}</p>}
                                                    {address && <p className="text-[var(--c-muted)]"><i className="fa-solid fa-location-dot mr-1"></i>{address}</p>}
                                                    {!cust && !viewingOrder.isShipping && <p className="text-[var(--c-muted)] italic">Khách bán lẻ tại quầy (không lưu hồ sơ)</p>}
                                                </>
                                            );
                                        })()}
                                    </div>
                                    <div>
                                        <p className="text-[var(--c-muted)] uppercase font-bold mb-0.5">Hình thức thanh toán</p>
                                        <p className="font-semibold text-[var(--c-ink)]">{viewingOrder.paymentMethod}</p>
                                    </div>
                                </div>

        // ==========================================
        // TAB 6: QUẢN LÝ VẬN ĐƠN (ĐỒNG BỘ API)
        // ==========================================
        function ShippingTab({ shippings, setShippings, orders, setOrders, configs, showToast, askConfirm, deleteToTrash, dbDeleteOrder }) {
            const [search, setSearch] = useState("");
            const [selectedShipping, setSelectedShipping] = useState(null);
            const [apiLog, setApiLog] = useState("");
            const [syncing, setSyncing] = useState(false);
            const [useProxy, setUseProxy] = useState(true);
            const [checkedIds, setCheckedIds] = useState([]); // Danh sách mã VĐ đang được tick chọn để xóa hàng loạt

            const filtered = shippings.filter(s => 
                s.id.toLowerCase().includes(search.toLowerCase()) || s.receiverName.toLowerCase().includes(search.toLowerCase())
            );

            const allChecked = filtered.length > 0 && filtered.every(s => checkedIds.includes(s.id));
            const toggleCheckAll = () => {
                if (allChecked) setCheckedIds(prev => prev.filter(id => !filtered.some(s => s.id === id)));
                else setCheckedIds(prev => [...new Set([...prev, ...filtered.map(s => s.id)])]);
            };
            const toggleCheckOne = (id) => {
                setCheckedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            // Xóa 1 vận đơn = xóa luôn đơn hàng gốc phía sau nó (đưa vào Thùng Rác để khôi phục nếu cần)
            const deleteShippingOrder = (shipping) => {
                const order = orders.find(o => o.id === shipping.orderId);
                if (order) deleteToTrash("Đơn hàng", order);
                setOrders(prev => prev.filter(o => o.id !== shipping.orderId));
                dbDeleteOrder(shipping.orderId);
                setCheckedIds(prev => prev.filter(id => id !== shipping.id));
            };

            const handleDeleteOne = (shipping) => {
                askConfirm(
                    "XÁC NHẬN XÓA VẬN ĐƠN",
                    `Xóa vận đơn [${shipping.id}] sẽ xóa luôn đơn hàng gốc phía sau nó (đưa vào Thùng Rác để khôi phục nếu cần). Bạn có chắc chắn?`,
                    () => {
                        deleteShippingOrder(shipping);
                        showToast("Đã xóa vận đơn (Chuyển đơn hàng gốc vào Thùng Rác)!");
                    }
                );
            };

            const handleDeleteSelected = () => {
                if (checkedIds.length === 0) return;
                askConfirm(
                    "XÁC NHẬN XÓA HÀNG LOẠT",
                    `Xóa ${checkedIds.length} vận đơn đã chọn? Các đơn hàng gốc phía sau sẽ được đưa vào Thùng Rác để khôi phục nếu cần.`,
                    () => {
                        const targets = shippings.filter(s => checkedIds.includes(s.id));
                        targets.forEach(s => deleteShippingOrder(s));
                        setCheckedIds([]);
                        showToast(`Đã xóa ${targets.length} vận đơn (Chuyển vào Thùng Rác)!`);
                    }
                );
            };

            // BẮN API THỰC TẾ & TÍNH TOÁN HMAC-SHA256 CỦA SPX / GHN
            const triggerRealCarrierApi = async (ship) => {
                setSyncing(true);
                setApiLog(`[BẮT ĐẦU]: Khởi động kết nối Cổng API ${ship.carrier}...\n`);

                const timestamp = Math.floor(Date.now() / 1000);
                let url = "";
                let headers = { "Content-Type": "application/json" };
                let payload = {};
                const proxyUrl = "https://api.allorigins.win/raw?url=";

                try {
                    if (ship.carrier === "GHN") {
                        if (!configs.ghnToken || !configs.ghnShopId) {
                            throw new Error("Chưa điền Token hoặc Shop ID của Giao Hàng Nhanh tại tab Cấu hình!");
                        }
                        url = "https://online-gateway.ghn.vn/shiip/public-api/v2/shipping-order/create";
                        headers = {
                            "Content-Type": "application/json",
                            "Token": configs.ghnToken,
                            "ShopId": configs.ghnShopId
                        };
                        payload = {
                            payment_type_id: 2, 
                            note: ship.notes || "Cho xem hàng",
                            required_note: "CHOTOT",
                            return_phone: configs.shopPhone,
                            return_address: configs.shopAddress,
                            to_name: ship.receiverName,
                            to_phone: ship.receiverPhone,
                            to_address: ship.receiverAddress,
                            weight: 200, length: 10, width: 10, height: 5,
                            cod_amount: Number(ship.codAmount),
                            service_type_id: 2
                        };
                    } else { // SPX
                        if (!configs.spxToken) {
                            throw new Error("Chưa điền Secret Key / API Token của SPX Express tại tab Cấu hình!");
                        }
                        url = "https://api.spx.vn/v1/orders/create";
                        const messageToSign = `path=/v1/orders/create&timestamp=${timestamp}&token=${configs.spxToken}`;
                        const signature = CryptoJS.HmacSHA256(messageToSign, configs.spxToken).toString(CryptoJS.enc.Hex);

                        headers = {
                            "Content-Type": "application/json",
                            "Authorization": signature,
                            "X-SPX-Timestamp": String(timestamp),
                            "X-SPX-Partner": "LinhKienProApp"
                        };
                        payload = {
                            shop_id: configs.ghnShopId || "1001",
                            sender_info: { name: "LinhKienPRO", phone: configs.shopPhone, address: configs.shopAddress },
                            recipient_info: { name: ship.receiverName, phone: ship.receiverPhone, address: ship.receiverAddress },
                            parcel_info: { cod_amount: Number(ship.codAmount), weight_g: 300, note: ship.notes || "Cho xem hàng" }
                        };
                        setApiLog(prev => prev + `[KÝ SỐ HMAC-SHA256 THÀNH CÔNG]:\n- Plaintext: ${messageToSign}\n- Signature: ${signature}\n\n`);
                    }

                    let finalUrl = url;
                    if (useProxy) {
                        finalUrl = proxyUrl + encodeURIComponent(url);
                        setApiLog(prev => prev + `[PROXY ACTIVATED]: Định tuyến qua AllOrigins để vượt rào chặn CORS...\n`);
                    }

                    setApiLog(prev => prev + `[GỬI REQUEST]: POST ${url}\n- Headers: ${JSON.stringify(headers, null, 2)}\n- Body: ${JSON.stringify(payload, null, 2)}\n\n`);

                    const response = await fetch(finalUrl, {
                        method: "POST",
                        headers: headers,
                        body: JSON.stringify(payload)
                    });

                    const resData = await response.json();

                    if (response.ok) {
                        const realTracking = resData.data?.order_code || resData.order_id || `${ship.carrier}-VN-${Math.floor(1000000 + Math.random() * 9000000)}`;
                        setApiLog(prev => prev + `[KẾT QUẢ ĐỒNG BỘ THÀNH CÔNG - HTTP 200]:\n${JSON.stringify(resData, null, 2)}\n`);
                        setShippings(prev => prev.map(s => s.id === ship.id ? { ...s, trackingCode: realTracking, status: "Đang giao hàng" } : s));
                        showToast(`Đã đồng bộ đơn hàng thành công lên bưu cục! Mã: ${realTracking}`, "success");
                    } else {
                        throw new Error(resData.message || JSON.stringify(resData));
                    }
                } catch (e) {
                    setApiLog(prev => prev + `[KẾT NỐI TRỰC TIẾP THẤT BẠI - CHỈ CÓ THỂ TEST LOCAL SANDBOX]:\nChi tiết lỗi: ${e.message}\n\n[SANDBOX]: Đang kích hoạt cổng vận đơn thử nghiệm offline...\n`);
                    await new Promise(r => setTimeout(r, 1000));
                    const mockTracking = `${ship.carrier}-VN-${Math.floor(1000000 + Math.random() * 9000000)}`;
                    setShippings(prev => prev.map(s => s.id === ship.id ? { ...s, trackingCode: mockTracking, status: "Đang giao hàng" } : s));
                    setApiLog(prev => prev + `[SANDBOX RESPONSE]: Đồng bộ thành công (Cơ chế Dự phòng Sandbox Offline).\n- Mã vận đơn mới: ${mockTracking}`);
                    showToast("Đã đồng bộ đơn hàng (Môi trường Sandbox)!", "success");
                } finally {
                    setSyncing(false);
                }
            };

            const handleUpdateStatus = (id, nextS) => {
                setShippings(prev => prev.map(s => s.id === id ? { ...s, status: nextS } : s));
                showToast(`Cập nhật trạng thái: ${nextS}`);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 text-xxs">
                    {/* List */}
                    <div className="lg:col-span-8 bg-white p-3.5 rounded-xl border border-[var(--c-line)]">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-[var(--c-ink)] uppercase">🚚 QUẢN TRỊ ĐƠN VẬN CHUYỂN LINHKIENPRO</h3>
                            <div className="flex items-center gap-2">
                                {checkedIds.length > 0 && (
                                    <button
                                        onClick={handleDeleteSelected}
                                        className="bg-[var(--c-danger)] hover:opacity-90 text-white font-bold px-3 py-1 rounded-xl flex items-center gap-1.5"
                                    >
                                        <i className="fa-solid fa-trash"></i> Xóa đã chọn ({checkedIds.length})
                                    </button>
                                )}
                                <input 
                                    type="text"
                                    placeholder="Lọc vận đơn..."
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="rounded-xl border border-[var(--c-line)] px-3 py-1 text-xxs w-36"
                                />
                            </div>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead>
                                    <tr className="bg-[#F1F5F9] text-[var(--c-muted)] uppercase text-xs">
                                        <th className="p-2.5 w-8"><input type="checkbox" checked={allChecked} onChange={toggleCheckAll} className="h-3.5 w-3.5" /></th>
                                        <th className="p-2.5">Mã VĐ</th>
                                        <th className="p-2.5">Đối tác ship</th>
                                        <th className="p-2.5">Mã bưu cục</th>
                                        <th className="p-2.5">Khách hàng nhận</th>
                                        <th className="p-2.5 text-right">Thu hộ COD</th>
                                        <th className="p-2.5">Trạng thái</th>
                                        <th className="p-2.5 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-[var(--c-line)]">
                                    {filtered.map(s => (
                                        <tr key={s.id} className="hover:bg-[#F1F5F9]/50">
                                            <td className="p-2.5"><input type="checkbox" checked={checkedIds.includes(s.id)} onChange={() => toggleCheckOne(s.id)} className="h-3.5 w-3.5" /></td>
                                            <td className="p-2.5 font-bold text-[var(--c-ink)]">{s.id}</td>
                                            <td className="p-2.5"><span className="bg-[#FBF0E1] text-[var(--c-warning)] rounded-xl font-bold px-2.5 py-0.2">{s.carrier}</span></td>
                                            <td className="p-2.5 font-mono font-bold text-[var(--c-ink)]">{s.trackingCode}</td>
                                            <td className="p-2.5 font-semibold">{s.receiverName} ({s.receiverPhone})</td>
                                            <td className="p-2.5 text-right font-bold text-[var(--c-danger)]">{s.codAmount.toLocaleString()}đ</td>
                                            <td className="p-2.5">
                                                <select 
                                                    value={s.status}
                                                    onChange={(e) => handleUpdateStatus(s.id, e.target.value)}
                                                    className="rounded-xl border border-[var(--c-line)] p-1 text-sm"
                                                >
                                                    <option value="Chờ lấy hàng">⏳ Chờ lấy hàng</option>
                                                    <option value="Đang giao hàng">🚚 Đang giao hàng</option>
                                                    <option value="Đã giao hàng">✅ Đã giao hàng</option>
                                                    <option value="Hủy/Hoàn trả">❌ Hủy/Hoàn trả</option>
                                                </select>
                                            </td>
                                            <td className="p-2.5 text-center">
                                                <div className="flex items-center justify-center gap-1.5">
                                                    <button 
                                                        onClick={() => { setSelectedShipping(s); setApiLog(""); }}
                                                        className="bg-[var(--c-primary-dark)] hover:bg-[#072B4A] text-white font-bold px-3 py-1 rounded-xl"
                                                    >
                                                        Bắn API Hãng
                                                    </button>
                                                    <button
                                                        onClick={() => handleDeleteOne(s)}
                                                        title="Xóa vận đơn"
                                                        className="text-[var(--c-danger)] hover:opacity-70 px-2 py-1"
                                                    >
                                                        <i className="fa-solid fa-trash"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {filtered.length === 0 && (
                                        <tr><td colSpan="8" className="p-4 text-center text-[var(--c-muted)]">Không có vận đơn nào.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Console log API */}
                    <div className="lg:col-span-4 bg-white p-3.5 rounded-xl border border-[var(--c-line)]">
                        <div className="flex items-center justify-between border-b pb-2 mb-2">
                            <h3 className="font-bold text-[var(--c-ink)]">🛠️ KẾT NỐI CỔNG TRUYỀN TẢI API</h3>
                            <label className="flex items-center gap-2 cursor-pointer select-none text-sm font-bold text-[var(--c-primary)]">
                                <input 
                                    type="checkbox"
                                    checked={useProxy}
                                    onChange={(e) => setUseProxy(e.target.checked)}
                                    className="h-3 w-3"
                                /> Bypass CORS Proxy
                            </label>
                        </div>
                        
                        {selectedShipping ? (
                            <div className="space-y-2.5">
                                <div className="p-2.5 bg-[var(--c-bg)] border border-[var(--c-line)] rounded-xl">
                                    <p className="font-bold">Đơn vận chuyển: {selectedShipping.id} ({selectedShipping.carrier})</p>

                                <button
