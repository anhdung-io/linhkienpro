    <!-- React, ReactDOM & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Crypto JS for HMAC calculations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- SheetJS (xlsx): đọc file Excel (.xlsx/.xls) & CSV để nhập hàng loạt vào Kho Hàng Hóa -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ============================================================================
        // HÀM HELPER AN TOÀN: bóc tách giá vốn từ chuỗi hinh_anh (KHÔNG BAO GIỜ ĐƯỢC PHÉP CRASH)
        // Dùng DUY NHẤT hàm này ở MỌI nơi cần đọc giá vốn từ cột hinh_anh — tuyệt đối không gọi
        // .split(':') trực tiếp lên p.hinh_anh ở bất kỳ chỗ nào khác trong toàn bộ file.
        // ============================================================================
        function parseGiaVonAnToan(hinhAnhStr) {
            if (!hinhAnhStr || typeof hinhAnhStr !== 'string') return 0;
            if (!hinhAnhStr.includes('gia_von:')) return 0;
            const parts = hinhAnhStr.split(':');
            return parseFloat(parts[1]) || 0;
        }

        // --- CORE LOCAL STORAGE WRAPPERS ---
        const getLocalStorage = (key, initialValue) => {
            const saved = localStorage.getItem(key);
            if (saved) {
                try { return JSON.parse(saved); } catch(e) { console.error(e); }
            }
            return initialValue;
        };

        const setLocalStorage = (key, value) => {
            localStorage.setItem(key, JSON.stringify(value));
        };

        // ============================================================================
        // KHU VỰC CẤU HÌNH SUPABASE
        // Điền đúng URL dự án và ANON KEY của bạn vào 2 dòng bên dưới.
        // Lấy tại: Supabase Dashboard > Project Settings > API
        // ============================================================================
        const SUPABASE_URL = "https://yjjeftropcspnbpgrwzz.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqamVmdHJvcGNzcG5icGdyd3p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMjk5ODgsImV4cCI6MjA5MTgwNTk4OH0.Lp5QCTEXQUj17d2cLUw_vKkOczT2ytMOZX-esadIxcY";

        // Tên các bảng dữ liệu tương ứng đã tạo trên Supabase (chỉnh lại đây nếu bạn đổi tên bảng)
        const TABLE_STAFF = "người dùng nhân viên";
        const TABLE_PRODUCTS = "các sản phẩm";
        const TABLE_PENDING_ORDERS = "đơn_hang_dang_chờ";
        const TABLE_CHAT_HISTORY = "chat_history";
        // --- 3 BẢNG MỚI (cần tạo trên Supabase trước khi dùng, xem hướng dẫn SQL đi kèm) ---
        const TABLE_CONFIGS = "cau_hinh_he_thong";       // Lưu cấu hình API & hệ thống (RIÊNG cho từng tài khoản, cột user_id)
        const TABLE_AI_MANAGER_LOGS = "ai_manager_logs"; // Lưu lịch sử chat với Siêu trợ lý AI (App Manager), TÁCH RIÊNG khỏi chat_history
        const TABLE_CATEGORIES = "danh_muc_san_pham";    // Lưu danh sách danh mục linh kiện (RIÊNG cho từng tài khoản, cột user_id)

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // ============================================================================

        // ============================================================================
        // LỚP ÁNH XẠ DỮ LIỆU (MAPPING LAYER) - KHÔNG TẠO/SỬA BẢNG SUPABASE
        // Toàn bộ logic dưới đây chỉ dùng ĐÚNG các cột đã có sẵn trên 2 bảng:
        // "đơn_hang_dang_chờ" (ma_don_hang, ten_khach_hang, so_dien_thoai, tong_tien,
        //  trang_thai, chi_tiet_don_hang, nguyen_nhan, user_id) và "chat_history".
        // ============================================================================

        // Các mã trạng thái (trang_thai) dùng chung cho MỌI đơn hàng trong bảng
        // "đơn_hang_dang_chờ". "Đơn hàng đã bán" chỉ hiển thị HOAN_THANH; "Quản lý
        // Vận đơn" hiển thị mọi trạng thái còn lại (đang trong luồng giao vận).
        const ORDER_STATUS = {
            HOAN_THANH: "HoanThanh",       // Bán tại quầy / đã xong, không cần ship
            CHO_LAY_HANG: "ChoLayHang",    // Vừa tạo đơn ship, chờ shipper lấy hàng
            DANG_GIAO: "DangGiaoHang",     // Đang giao hàng
            DA_GIAO: "DaGiaoHang",         // Đã giao hàng thành công
            HUY_HOAN: "HuyHoanTra"         // Huỷ / hoàn trả
        };

        // Ánh xạ trạng thái hiển thị (tiếng Việt, dùng trong UI Quản lý Vận đơn) <-> mã trang_thai lưu Supabase
        const SHIP_LABEL_TO_STATUS = {
            "Chờ lấy hàng": ORDER_STATUS.CHO_LAY_HANG,
            "Đang giao hàng": ORDER_STATUS.DANG_GIAO,
            "Đã giao hàng": ORDER_STATUS.DA_GIAO,
            "Hủy/Hoàn trả": ORDER_STATUS.HUY_HOAN
        };
        const STATUS_TO_SHIP_LABEL = Object.fromEntries(Object.entries(SHIP_LABEL_TO_STATUS).map(([k, v]) => [v, k]));

        // ============================================================================
        // ÁNH XẠ SẢN PHẨM <-> BẢNG "các sản phẩm" (KHÔNG CÓ CỘT category / gia_von / costPrice)
        // Bảng thật chỉ có: id (kiểu UUID, KHÔNG PHẢI text!), ten_san_pham, gia_ban, so_luong_kho, hinh_anh
        // -> Cột "id" là uuid tự sinh của Supabase nên KHÔNG được gửi mã SKU ("SP001", "21"...) vào đó
        //    (lỗi "invalid input syntax for type uuid" chính là do gửi nhầm SKU vào cột uuid này).
        // -> Mã SKU do người dùng đặt (dùng xuyên suốt trong app: giỏ hàng, đơn hàng, kho...) được gói
        //    chung vào ten_san_pham: "[Loại - SKU] Tên". Mỗi sản phẩm JS còn có thêm "dbId" (ẩn, chính là
        //    uuid thật của Supabase) để biết chính xác cần UPDATE/DELETE dòng nào — KHÔNG hiển thị dbId ra UI.
        // -> Giá vốn + Đơn vị tính được gói vào hinh_anh (dạng chuỗi mã hoá) vì bảng không có cột riêng.
        // ============================================================================
        const encodeProductName = (p) => `[${(p && p.category) || "Khác"} - ${(p && p.id) || ""}] ${(p && p.name) || ""}`;
        // Bóc tách "ten_san_pham" -> { category, sku, name } — LUÔN kiểm tra kiểu chuỗi trước khi split()
        // để tránh crash với dữ liệu cũ (ten_san_pham null/undefined hoặc không đúng định dạng).
        const decodeProductName = (ten, fallbackSku) => {
            if (ten && typeof ten === "string" && ten.startsWith("[") && ten.includes("]")) {
                const closeIdx = ten.indexOf("]");
                const bracketContent = ten.slice(1, closeIdx); // "Loại - SKU"
                const restName = ten.slice(closeIdx + 1).trim(); // "Tên sản phẩm"
                let category = "Khác";
                let sku = fallbackSku || "";
                if (bracketContent && typeof bracketContent === "string" && bracketContent.includes(" - ")) {
                    const bracketParts = bracketContent.split(" - ");
                    category = (bracketParts[0] || "Khác").trim();
                    sku = (bracketParts.slice(1).join(" - ").trim()) || fallbackSku || "";
                } else if (bracketContent) {
                    category = bracketContent.trim() || "Khác";
                }
                return { category, sku: sku || fallbackSku || "", name: restName || fallbackSku || "" };
            }
            // Dữ liệu cũ / không đúng định dạng -> dùng tạm nguyên chuỗi làm tên, không crash
            return { category: "Khác", sku: fallbackSku || "", name: (ten && typeof ten === "string") ? ten : (fallbackSku || "") };
        };
        const encodeHinhAnh = (p) => `gia_von:${Number(p && p.costPrice) || 0}|unit:${(p && p.unit) || "Cái"}|order:${(p && p.sortOrder !== null && p.sortOrder !== undefined) ? p.sortOrder : 999999}`;
        // Bóc tách "hinh_anh" -> { costPrice, unit, sortOrder } — giá vốn LUÔN đi qua parseGiaVonAnToan() (đầu file),
        // tuyệt đối không tự gọi .split(':') trực tiếp ở đây nữa.
        const decodeHinhAnh = (str) => {
            const giaVonGoc = parseGiaVonAnToan(str);
            let donViTinh = "Cái";
            let thuTu = null;
            if (str && typeof str === "string" && str.includes("unit:")) {
                const unitPart = str.split("unit:")[1];
                if (unitPart && typeof unitPart === "string") {
                    donViTinh = unitPart.split("|")[0].trim() || "Cái";
                }
            }
            if (str && typeof str === "string" && str.includes("order:")) {
                const orderPart = str.split("order:")[1];
                if (orderPart && typeof orderPart === "string") {
                    const num = parseInt(orderPart.split("|")[0].trim(), 10);
                    if (!isNaN(num)) thuTu = num;
                }
            }
            return { costPrice: giaVonGoc, unit: donViTinh, sortOrder: thuTu };
        };
        // JS nội bộ (id [=SKU], dbId [=uuid Supabase, ẩn], name, category, costPrice, sellPrice, stock, unit)
        // -> dòng để INSERT/UPDATE Supabase. TUYỆT ĐỐI không gửi 'category', 'gia_von'/'costPrice', hay SKU
        // vào cột "id" (vì "id" là uuid do Supabase tự sinh, không phải mã SKU của shop).
        // user_id là uuid REFERENCES "người dùng nhân viên"("id") -> chỉ được truyền uuid thật hoặc null,
        // TUYỆT ĐỐI không truyền tai_khoan (text) vào đây.
        const mapProductToRow = (p, userId) => ({
            ten_san_pham: encodeProductName(p),
            gia_ban: Number(p.sellPrice) || 0,
            so_luong_kho: Number(p.stock) || 0,
            hinh_anh: encodeHinhAnh(p),
            user_id: userId ?? null
        });
        // Dòng lấy về từ Supabase -> object sản phẩm JS nội bộ (giải mã ngược lại)
        const mapRowToProduct = (row) => {
            if (!row) return { id: "", dbId: null, name: "", category: "Khác", costPrice: 0, sellPrice: 0, stock: 0, unit: "Cái" };
            // SKU dự phòng nếu vì lý do gì đó ten_san_pham không chứa SKU hợp lệ (VD dữ liệu tạo tay trên Supabase)
            const fallbackSku = row.id ? ("SP" + String(row.id).replace(/-/g, "").slice(0, 6).toUpperCase()) : "";
            const { category, sku, name } = decodeProductName(row.ten_san_pham, fallbackSku);
            const { costPrice, unit, sortOrder } = decodeHinhAnh(row.hinh_anh);
            return {
                id: sku || fallbackSku,   // Mã SKU dùng xuyên suốt trong app (giỏ hàng, đơn hàng, kho...)
                dbId: row.id,             // uuid thật của Supabase — CHỈ dùng để UPDATE/DELETE đúng dòng, không hiển thị
                name: name,
                category: category,
                costPrice: costPrice,
                sellPrice: Number(row.gia_ban) || 0,
                stock: Number(row.so_luong_kho) || 0,
                unit: unit,
                sortOrder: sortOrder      // Thứ tự ưu tiên hiển thị (Kho hàng hóa + lưới POS) — null nếu chưa từng sắp xếp
            };
        };

        // Chuyển 1 order (dạng JS nội bộ, camelCase) -> 1 dòng để INSERT/UPDATE vào bảng "đơn_hang_dang_chờ"
        // Mọi thông tin không có cột riêng (sản phẩm, ngày giờ, ship...) được gom vào chi_tiet_don_hang (JSONB)
        const mapOrderToRow = (order, userId) => ({
            ma_don_hang: order.id,
            ten_khach_hang: order.customerName || "",
            so_dien_thoai: order.receiverPhone || order.customerPhone || "",
            tong_tien: order.finalTotal || 0,
            trang_thai: order.trangThai || ORDER_STATUS.HOAN_THANH,
            // nguyen_nhan: tận dụng làm cột "Hình thức TT / Ghi chú" vì bảng không có cột riêng cho việc này
            nguyen_nhan: order.note || order.paymentMethod || "",
            user_id: userId ?? null,
            chi_tiet_don_hang: JSON.stringify({
                date: order.date,
                customerId: order.customerId,
                items: order.items,
                total: order.total,
                discount: order.discount,
                finalTotal: order.finalTotal,
                profit: order.profit,
                paymentMethod: order.paymentMethod,
                status: order.status,
                // Thông tin vận đơn (nếu có) được gom chung vào đây theo yêu cầu, không tạo bảng riêng
                shipping: order.isShipping ? {
                    carrier: order.carrier,
                    trackingCode: order.trackingCode,
                    receiverName: order.receiverName,
                    receiverPhone: order.receiverPhone,
                    receiverAddress: order.receiverAddress,
                    codAmount: order.codAmount,
                    shippingFee: order.shippingFee,
                    shipStatus: order.shipStatus,
                    shipNote: order.shipNote
                } : null
            })
        });

        // Chuyển 1 dòng lấy về từ Supabase (bảng "đơn_hang_dang_chờ") -> order dạng JS nội bộ (camelCase)
        const mapRowToOrder = (row) => {
            let detail = {};
            try { detail = row.chi_tiet_don_hang ? (typeof row.chi_tiet_don_hang === "string" ? JSON.parse(row.chi_tiet_don_hang) : row.chi_tiet_don_hang) : {}; } catch (e) { detail = {}; }
            const shipping = detail.shipping || null;
            return {
                id: row.ma_don_hang,
                date: detail.date || "",
                customerId: detail.customerId || "KH_LE",
                customerName: row.ten_khach_hang || "",
                items: detail.items || [],
                total: detail.total ?? row.tong_tien ?? 0,
                discount: detail.discount || 0,
                finalTotal: detail.finalTotal ?? row.tong_tien ?? 0,
                profit: detail.profit || 0,
                paymentMethod: detail.paymentMethod || row.nguyen_nhan || "Tiền mặt",
                status: detail.status || "Thành công",
                note: row.nguyen_nhan || "",
                trangThai: row.trang_thai || ORDER_STATUS.HOAN_THANH,
                userId: row.user_id,
                isShipping: !!shipping,
                carrier: shipping?.carrier || "SPX",
                trackingCode: shipping?.trackingCode || "",
                receiverName: shipping?.receiverName || row.ten_khach_hang || "",
                receiverPhone: shipping?.receiverPhone || row.so_dien_thoai || "",
                receiverAddress: shipping?.receiverAddress || "",
                codAmount: shipping?.codAmount || 0,
                shippingFee: shipping?.shippingFee || 0,
                shipStatus: shipping?.shipStatus || "Chờ lấy hàng",
                shipNote: shipping?.shipNote || ""
            };
        };

        // Chuyển 1 order (đã có shipping) -> object dạng "shipping" để hiển thị lại y hệt giao diện Quản lý Vận đơn cũ
        const orderToShippingView = (o) => ({
            id: o.id + "-SH",
            orderId: o.id,
            carrier: o.carrier,
            trackingCode: o.trackingCode,
            receiverName: o.receiverName,
            receiverPhone: o.receiverPhone,
            receiverAddress: o.receiverAddress,
            codAmount: o.codAmount,
            shippingFee: o.shippingFee,
            status: STATUS_TO_SHIP_LABEL[o.trangThai] || o.shipStatus || "Chờ lấy hàng",
            notes: o.shipNote || ""
        });

        // ============================================================================
        // ÁNH XẠ TIN NHẮN / HỒ SƠ KHÁCH HÀNG <-> BẢNG "chat_history" THẬT
        // Cột thật (đã xác nhận qua information_schema): id (bigint, tự tăng), session_id (text),
        // role (text), content (text), created_at (timestamptz). KHÔNG có cột sender/text/time.
        // -> "session_id" đóng vai trò định danh khách (số điện thoại / tên khách).
        // -> "content" là nội dung tin nhắn (hoặc JSON hồ sơ khách hàng nếu là dòng hồ sơ).
        // -> "role" phân biệt: "customer" (tin nhắn khách) hay CUSTOMER_PROFILE_ROLE (dòng hồ sơ khách hàng,
        //    dùng để lưu tạm thông tin khách vì không có bảng "khách hàng" riêng).
        // ============================================================================
        const CUSTOMER_PROFILE_ROLE = "profile_khach_hang"; // role đặc biệt đánh dấu đây là hồ sơ khách, KHÔNG phải tin nhắn thật
        // GHI CHÚ: Lịch sử chat với "Siêu trợ lý quản trị AI" (App Manager) TRƯỚC ĐÂY dùng chung bảng chat_history
        // (qua AI_MANAGER_SESSION_ID), NAY ĐÃ TÁCH RIÊNG hẳn sang bảng "ai_manager_logs" (xem TABLE_AI_MANAGER_LOGS).
        const LOCAL_DEBT_KEY = "lk_customer_debts"; // Lưu "Nợ hiện tại" của khách CHỈ ở localStorage theo đúng yêu cầu

        const getDebtMap = () => getLocalStorage(LOCAL_DEBT_KEY, {});
        const setDebtFor = (phone, debt) => {
            const map = getDebtMap();
            map[phone] = debt;
            setLocalStorage(LOCAL_DEBT_KEY, map);
        };
        const removeDebtFor = (phone) => {
            const map = getDebtMap();
            delete map[phone];
            setLocalStorage(LOCAL_DEBT_KEY, map);
        };

        // JS nội bộ {id, sender, text, time, role?} -> dòng để INSERT vào bảng chat_history thật.
        // KHÔNG gửi "id" (bigint tự tăng, để Supabase tự sinh) và KHÔNG gửi "created_at" (có default now()).
        const mapMessageToRow = (msg) => ({
            session_id: msg.sender || "",
            role: msg.role || "customer",
            content: msg.text || ""
        });
        // Dòng lấy về từ Supabase -> object JS nội bộ {id, sender, text, time, role}
        const mapRowToMessage = (row) => {
            if (!row) return { id: Date.now(), sender: "", text: "", time: "", role: "customer" };
            let timeStr = "";
            if (row.created_at && typeof row.created_at === "string") {
                const d = new Date(row.created_at);

        function App() {
            // State chính
            const [activeTab, setActiveTab] = useState("dashboard");

            const [orders, setOrders] = useState(() => getLocalStorage("lk_orders", DEFAULT_ORDERS));
            const [configs, setConfigs] = useState(() => getLocalStorage("lk_configs", DEFAULT_CONFIGS));
            // Danh mục linh kiện: có thể thêm/sửa/xóa, đồng bộ với bảng "danh_muc_san_pham" trên Supabase
            const [categories, setCategories] = useState(() => getLocalStorage("lk_categories", DEFAULT_CATEGORIES));
            // Lịch sử chat "Siêu trợ lý AI" (App Manager): dữ liệu thô lấy từ bảng "ai_manager_logs" riêng biệt
            const [aiManagerRows, setAiManagerRows] = useState(() => getLocalStorage("lk_ai_manager_rows", []));

            // Khai báo SỚM để các phần suy ra (derive) dữ liệu theo tài khoản bên dưới (customers/messages...)
            // có thể dùng ngay currentUser.tai_khoan để phân vùng dữ liệu riêng cho từng nhân viên.
            const [currentUser, setCurrentUser] = useState(() => getLocalStorage("lk_current_user", null));

            // ================== KHÁCH HÀNG & TIN NHẮN: DÙNG CHUNG BẢNG "chat_history" ==================
            // "chatRows" là dữ liệu thô của bảng chat_history (tin nhắn thật + hàng hồ sơ khách hàng đã gắn thẻ).
            // "customers" và "messages" đều được TÍNH TOÁN (derive) lại từ chatRows, không lưu riêng.
            const [chatRows, setChatRows] = useState(() => getLocalStorage("lk_chat_rows", DEFAULT_CHAT_ROWS));

            // Tiền tố session_id riêng cho TÀI KHOẢN ĐANG ĐĂNG NHẬP — mọi tin nhắn/hồ sơ khách hàng của tài khoản
            // này đều lưu session_id dạng "<tai_khoan>::<định danh khách>" để KHÔNG lẫn với tài khoản khác,
            // vì bảng chat_history không có cột user_id riêng như 2 bảng sản phẩm/đơn hàng.
            const myAcctPrefix = (currentUser?.tai_khoan || "chung") + "::";

            // Tin nhắn Messenger thật = CHỈ những dòng role = "customer" VÀ thuộc đúng tài khoản đang đăng nhập
            const messages = useMemo(() => chatRows
                .filter(r => (r.role || "customer") === "customer" && typeof r.sender === "string" && r.sender.startsWith(myAcctPrefix))
                .map(r => ({ ...r, sender: r.sender.slice(myAcctPrefix.length) }))
            , [chatRows, myAcctPrefix]);

            // Lịch sử chat với "Siêu trợ lý quản trị AI" (App Manager) — GIỜ ĐÃ TÁCH RIÊNG hẳn khỏi chat_history,
            // lưu ở bảng "ai_manager_logs" của riêng nó (cột tai_khoan để phân biệt từng nhân viên).
            // "rawSender" giữ lại = tai_khoan gốc để DashboardTab tự lọc đúng theo tài khoản đang đăng nhập.
            const aiManagerLogs = useMemo(() => aiManagerRows
                .slice()
                .sort((a, b) => Number(a.id) - Number(b.id))
                .map(r => ({ id: r.id, sender: r.sender, rawSender: r.taiKhoan, text: r.text }))
            , [aiManagerRows]);

            // Khách hàng = các dòng có role = CUSTOMER_PROFILE_ROLE VÀ thuộc đúng tài khoản đang đăng nhập,
            // gộp theo SĐT (sender), lấy bản ghi mới nhất (id lớn nhất), bỏ qua hồ sơ đã đánh dấu deleted:true.
            // "Nợ hiện tại" luôn đọc từ localStorage.
            const customers = useMemo(() => {
                const profileRows = chatRows.filter(r => (r.role || "customer") === CUSTOMER_PROFILE_ROLE && typeof r.sender === "string" && r.sender.startsWith(myAcctPrefix));
                const latestBySender = {};
                profileRows.forEach(r => {
                    const prevRow = latestBySender[r.sender];
                    if (!prevRow || Number(r.id) >= Number(prevRow.id)) latestBySender[r.sender] = r;
                });
                const debtMap = getDebtMap();
                return Object.values(latestBySender)
                    .map(r => {
                        let profile = {};
                        try { profile = (r.text && typeof r.text === "string") ? JSON.parse(r.text) : {}; } catch (e) { profile = {}; }
                        if (profile.deleted) return null;
                        const phone = r.sender.slice(myAcctPrefix.length); // Bỏ tiền tố tài khoản, chỉ giữ SĐT thật
                        return {
                            id: profile.id || phone,
                            name: profile.name || phone,
                            phone,
                            address: profile.address || "",
                            notes: profile.notes || "",
                            debt: debtMap[phone] || 0,
                            _rowId: r.id
                        };
                    })
                    .filter(Boolean);
            }, [chatRows, myAcctPrefix]);

            // "setMessages": các tab con (Messenger) gọi setMessages(prev => [...prev, newMsg]) như cũ.
            // Ở đây ta chỉ cần append trực tiếp vào chatRows (gắn lại tiền tố tài khoản trước khi lưu).
            const setMessages = (updater) => {
                setChatRows(prevRows => {
                    const prevMsgs = prevRows
                        .filter(r => (r.role || "customer") === "customer" && typeof r.sender === "string" && r.sender.startsWith(myAcctPrefix))
                        .map(r => ({ ...r, sender: r.sender.slice(myAcctPrefix.length) }));
                    const nextMsgs = typeof updater === "function" ? updater(prevMsgs) : updater;
                    const otherRows = prevRows.filter(r => !((r.role || "customer") === "customer" && typeof r.sender === "string" && r.sender.startsWith(myAcctPrefix)));
                    const reprefixed = nextMsgs.map(m => ({ ...m, sender: myAcctPrefix + m.sender }));
                    return [...otherRows, ...reprefixed];
                });
            };

            // "setCustomers": các tab con (Customers) gọi setCustomers(prev => ...) như cũ. Ở đây ta so sánh
            // với danh sách khách hàng hiện tại để suy ra: thêm mới (INSERT 1 dòng), sửa hồ sơ (UPDATE ĐÈ lên
            // đúng dòng cũ theo _rowId — KHÔNG tạo dòng mới), đổi nợ (chỉ ghi localStorage), hoặc xoá (DELETE
            // thật đúng dòng đó khỏi chat_history). session_id luôn gắn tiền tố tài khoản (myAcctPrefix + SĐT).
            const setCustomers = (updater) => {
                const prevCustomers = customers;
                const nextCustomers = typeof updater === "function" ? updater(prevCustomers) : updater;

                nextCustomers.forEach(c => {
                    const prev = prevCustomers.find(p => p.id === c.id);
                    if (!prev) {
                        // Khách hàng mới -> INSERT 1 dòng duy nhất, tạm hiển thị ngay bằng id giả rồi thay
                        // bằng id thật (rowId) khi Supabase trả về, để lần sửa sau UPDATE đúng dòng này.
                        const tempId = Date.now() + Math.floor(Math.random() * 1000);
                        const localRow = { id: tempId, sender: myAcctPrefix + c.phone, text: JSON.stringify({ id: c.id, name: c.name, address: c.address, notes: c.notes, deleted: false }), role: CUSTOMER_PROFILE_ROLE, time: new Date().toLocaleTimeString().substring(0, 5) };
                        setChatRows(rows => [...rows, localRow]);
                        setDebtFor(c.phone, c.debt || 0);
                        (async () => {
                            const newRowId = await dbSaveCustomerProfile({ ...c, phone: myAcctPrefix + c.phone }, null);
                            if (newRowId) setChatRows(rows => rows.map(r => r.id === tempId ? { ...r, id: newRowId } : r));
                        })();
                    } else {
                        const profileChanged = prev.name !== c.name || prev.address !== c.address || prev.notes !== c.notes || prev.phone !== c.phone;
                        if (profileChanged) {
                            // Sửa hồ sơ -> UPDATE ĐÈ lên đúng dòng cũ (_rowId), không tạo dòng mới -> không phình bảng
                            setChatRows(rows => rows.map(r => r.id === prev._rowId ? { ...r, sender: myAcctPrefix + c.phone, text: JSON.stringify({ id: c.id, name: c.name, address: c.address, notes: c.notes, deleted: false }) } : r));
                            dbSaveCustomerProfile({ ...c, phone: myAcctPrefix + c.phone }, prev._rowId);
                        }
                        if (prev.debt !== c.debt) {
                            setDebtFor(c.phone, c.debt); // Chỉ lưu localStorage, KHÔNG đụng tới Supabase
                        }
                    }
                });

                // Khách hàng bị xoá khỏi danh sách -> XÓA THẬT dòng hồ sơ đó khỏi chat_history + xoá nợ localStorage
                prevCustomers.forEach(p => {
                    if (!nextCustomers.find(c => c.id === p.id)) {
                        setChatRows(rows => rows.filter(r => r.id !== p._rowId));
                        dbDeleteCustomerProfile(p._rowId);
                        removeDebtFor(p.phone);
                    }
                });
            };

            // ================== VẬN ĐƠN: SUY RA TỪ CHÍNH BẢNG "đơn_hang_dang_chờ" (KHÔNG TÁCH BẢNG RIÊNG) ==================
            // Chỉ những đơn có trang_thai KHÁC "HoanThanh" mới thuộc luồng vận chuyển và hiện ở tab "Quản lý Vận đơn".
            // "Quản lý Vận đơn" hiển thị MỌI đơn có gắn cờ ship (isShipping), bất kể trạng thái giao hàng hiện
            // tại là gì — để liên kết chặt với "Đơn hàng đã bán" (đơn ship vẫn phải xuất hiện ở CẢ HAI nơi:
            // vừa để theo dõi tiến trình giao hàng, vừa để tổng kết doanh thu/lợi nhuận).
            const shippings = useMemo(() => orders.filter(o => o.isShipping).map(orderToShippingView), [orders]);

            // "setShippings": ShippingTab gọi setShippings(prev => prev.map(...)) để đổi trạng thái / mã vận đơn.
            // Ta áp thay đổi đó ngược lại vào ĐÚNG đơn hàng gốc trong "orders" rồi đẩy UPDATE lên Supabase.
            const setShippings = (updater) => {
                const prevShippings = shippings;
                const nextShippings = typeof updater === "function" ? updater(prevShippings) : updater;

                setOrders(prevOrders => {
                    const updatedOrders = prevOrders.map(o => {
                        const match = nextShippings.find(s => s.orderId === o.id);
                        if (!match) return o;
                        const changed = {
                            ...o,
                            carrier: match.carrier,
                            trackingCode: match.trackingCode,
                            receiverName: match.receiverName,
                            receiverPhone: match.receiverPhone,
                            receiverAddress: match.receiverAddress,
                            codAmount: match.codAmount,
                            shippingFee: match.shippingFee,
                            shipNote: match.notes,
                            trangThai: SHIP_LABEL_TO_STATUS[match.status] || o.trangThai
                        };
                        dbUpsertOrder(changed);
                        return changed;
                    });
                    return updatedOrders;
                });
            };
            
            // THÙNG RÁC HỆ THỐNG - LƯU TRỮ LỊCH SỬ DỮ LIỆU VỪA XÓA THẬT
            const [trashBin, setTrashBin] = useState(() => getLocalStorage("lk_trash_bin", []));

            const [aiOrderDraft, setAiOrderDraft] = useState(null);

            // UI states
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [showPwaModal, setShowPwaModal] = useState(false);
            const [showTrashModal, setShowTrashModal] = useState(false);
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            // ============ ĐIỀU HƯỚNG RIÊNG CHO GIAO DIỆN MOBILE (< 768px) ============
            // Tách biệt hoàn toàn khỏi "activeTab" (biến điều khiển sidebar/nội dung bản Desktop, GIỮ NGUYÊN
            // không đổi) để tuyệt đối không ảnh hưởng tới luồng dữ liệu/logic gốc của bản Desktop.
            const [mobileTab, setMobileTab] = useState("dashboard"); // 'dashboard'|'products'|'sales'|'customers'|'menu'
            const [mobileMenuSection, setMobileMenuSection] = useState(null); // null | 'configs'|'messenger'|'shipping'|'history'
            const [showMobileSearch, setShowMobileSearch] = useState(false);
            const [mobileSearchQuery, setMobileSearchQuery] = useState("");
            const [showMobileNotif, setShowMobileNotif] = useState(false);

            // "Sao lưu dữ liệu" (Menu di động) — chỉ ĐỌC dữ liệu hiện có và xuất ra 1 file .json để tải về máy,
            // KHÔNG đụng chạm gì tới luồng ghi/đồng bộ Supabase hiện tại.
            // Cầu nối điều hướng: bên trong <MessengerTab> có nút "Mở ở POS" gọi setActiveTab("pos") — ở bản
            // Desktop việc này tự chuyển tab bình thường, nhưng bản Mobile dùng "mobileTab" riêng nên cần
            // ánh xạ thêm sang mobileTab để nút đó cũng điều hướng đúng khi Messenger AI được mở từ Menu di động.
            const setActiveTabFromMobileMenu = (tab) => {

            const handleBackupData = () => {

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `linhkienpro-backup-${new Date().toISOString().slice(0, 10)}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    showToast("Đã tải file sao lưu dữ liệu về máy!", "success");

            // CUSTOM DIALOG MODALS STATES

            const [promptModal, setPromptModal] = useState({ show: false, title: "", message: "", defaultValue: "", onConfirm: null, value: "" });

            const handleLogin = async (username, password) => {

            const [regLoading, setRegLoading] = useState(false);

            const handleRegister = async (fullName, username, password, onSuccess) => {

                    const { data: existing, error: checkError } = await supabase

                    showToast("Đăng ký thất bại: " + err.message, "error");

            const handleLogout = () => {

            // ================== ĐỒNG BỘ THỜI GIAN THỰC VỚI SUPABASE ==================
            // Các hàm helper gọi Supabase cho Sản phẩm / Đơn hàng đang chờ / Lịch sử chat.
            // State cục bộ (products/orders/messages) vẫn được cập nhật lạc quan (optimistic)
            // ngay khi người dùng thao tác; kênh Realtime bên dưới sẽ tự đối chiếu (idempotent theo "id")
            // để đồng bộ với các thiết bị/trình duyệt khác đang mở cùng lúc.
            const dbUpsertProduct = async (product) => {
                try {
                    const row = mapProductToRow(product, currentUser?.id ?? null);
                    // Chốt chặn cuối cùng: TUYỆT ĐỐI không để hinh_anh là undefined/null khi gửi lên Supabase
                    if (!row.hinh_anh || typeof row.hinh_anh !== "string") {
                        row.hinh_anh = `gia_von:${Number(product && product.costPrice) || 0}`;
                    }
                    if (product.dbId) {
                        // Đã có uuid thật (sản phẩm đã từng lưu lên Supabase) -> UPDATE đúng dòng đó
                        const { error } = await supabase.from(TABLE_PRODUCTS).update(row).eq("id", product.dbId);
                        if (error) throw error;
                    } else {
                        // Sản phẩm hoàn toàn mới -> INSERT, KHÔNG tự gửi "id" (SKU) vì cột id là uuid do
                        // Supabase tự sinh. Sau khi insert xong, lấy uuid vừa sinh và lưu lại vào state cục bộ
                        // (product.dbId) để những lần sửa/xóa sau khớp đúng dòng.
                        const { data, error } = await supabase.from(TABLE_PRODUCTS).insert([row]).select().single();
                        if (error) throw error;
                        if (data && data.id) {
                            setProducts(prev => prev.map(p => p.id === product.id ? { ...p, dbId: data.id } : p));
                        }
                    }
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (sản phẩm): " + err.message, "error");
                }
            };

            // dbId ở đây LUÔN là uuid thật của Supabase (không phải mã SKU) — gọi eq("id", dbId) mới đúng
            const dbDeleteProduct = async (dbId) => {
                if (!dbId) return; // Sản phẩm này chưa từng được lưu lên Supabase -> không có gì để xóa từ xa
                try {
                    const { error } = await supabase.from(TABLE_PRODUCTS).delete().eq("id", dbId);
                    if (error) throw error;
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (xóa sản phẩm): " + err.message, "error");
                }
            };

            // INSERT đơn hàng mới vào bảng "đơn_hang_dang_chờ" — map đúng các cột:
            // ma_don_hang, ten_khach_hang, so_dien_thoai, tong_tien, trang_thai, chi_tiet_don_hang, nguyen_nhan, user_id
            const dbInsertOrder = async (order) => {
                try {
                    const row = mapOrderToRow(order, currentUser?.id ?? null); // user_id là uuid FK -> KHÔNG được fallback sang tai_khoan (text)
                    const { error } = await supabase.from(TABLE_PENDING_ORDERS).insert([row]);
                    if (error) throw error;
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (đơn hàng): " + err.message, "error");
                }
            };

            // UPDATE đơn hàng đã tồn tại (đổi trạng thái vận đơn, mã vận đơn...) — khớp theo ma_don_hang
            const dbUpsertOrder = async (order) => {
                try {
                    const row = mapOrderToRow(order, currentUser?.id ?? null); // user_id là uuid FK -> KHÔNG được fallback sang tai_khoan (text)
                    const { error } = await supabase.from(TABLE_PENDING_ORDERS).update(row).eq("ma_don_hang", order.id);
                    if (error) throw error;
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (cập nhật đơn hàng): " + err.message, "error");
                }
            };

            const dbDeleteOrder = async (id) => {
                try {
                    const { error } = await supabase.from(TABLE_PENDING_ORDERS).delete().eq("ma_don_hang", id);
                    if (error) throw error;
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (hủy đơn hàng): " + err.message, "error");
                }
            };

            // msg (JS nội bộ: {id tạm, sender, text, time, role?}) -> map đúng cột thật của chat_history
            // (session_id, role, content) trước khi gửi. KHÔNG gửi "id" (bigint tự tăng) hay "created_at"
            // (có default now()) — để Supabase tự sinh, sau đó đồng bộ lại id thật vào state cục bộ.
            const dbInsertMessage = async (msg) => {
                try {
                    const row = mapMessageToRow(msg);
                    const { data, error } = await supabase.from(TABLE_CHAT_HISTORY).insert([row]).select().single();
                    if (error) throw error;
                    if (data) {
                        const saved = mapRowToMessage(data);
                        // Thay id tạm (Date.now()) bằng id thật (bigint) từ Supabase để tránh trùng lặp sau này
                        setChatRows(prev => prev.map(r => r.id === msg.id ? saved : r));
                    }
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (tin nhắn): " + err.message, "error");
                }
            };

            // Lưu hồ sơ khách hàng vào ĐÚNG 1 dòng duy nhất trong chat_history:
            // - Nếu đã có rowId (dòng hồ sơ cũ) -> UPDATE đè lên đúng dòng đó, KHÔNG tạo dòng mới.
            // - Nếu chưa có (khách hoàn toàn mới) -> INSERT 1 lần, trả về id thật để lưu lại làm rowId sau này.
            // Nhờ vậy sửa hồ sơ bao nhiêu lần cũng chỉ có đúng 1 dòng trên Supabase, không phình bảng.
            const dbSaveCustomerProfile = async (customer, rowId) => {
                const row = {
                    session_id: customer.phone,
                    role: CUSTOMER_PROFILE_ROLE,
                    content: JSON.stringify({ id: customer.id, name: customer.name, address: customer.address, notes: customer.notes, deleted: false })
                };
                try {
                    if (rowId) {
                        const { error } = await supabase.from(TABLE_CHAT_HISTORY).update(row).eq("id", rowId);
                        if (error) throw error;
                        return rowId;
                    } else {
                        const { data, error } = await supabase.from(TABLE_CHAT_HISTORY).insert([row]).select().single();
                        if (error) throw error;
                        return data ? data.id : null;
                    }
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (hồ sơ khách hàng): " + err.message, "error");
                    return rowId || null;
                }
            };

            // Xóa thật dòng hồ sơ khách hàng khỏi chat_history (không còn dùng kiểu đánh dấu "deleted" nữa)
            const dbDeleteCustomerProfile = async (rowId) => {
                if (!rowId) return;
                try {
                    const { error } = await supabase.from(TABLE_CHAT_HISTORY).delete().eq("id", rowId);
                    if (error) throw error;
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (xóa hồ sơ khách hàng): " + err.message, "error");
                }
            };

            // ================== CẤU HÌNH HỆ THỐNG: LƯU RIÊNG VÀO BẢNG "cau_hinh_he_thong" ==================
            // MỖI TÀI KHOẢN có ĐÚNG 1 dòng riêng (khóa theo user_id) — API keys, token vận chuyển, địa chỉ/SĐT
            // gửi hàng... của tài khoản này không còn ảnh hưởng tới tài khoản khác. Dùng upsert theo user_id
            // để vừa tạo mới vừa cập nhật đè lên đúng dòng của tài khoản đang đăng nhập.
            const dbSaveConfigs = async (cfg) => {
                if (!currentUser?.id) return; // Chưa đăng nhập thì chưa xác định được cấu hình của ai
                try {
                    const row = mapConfigsToRow(cfg, currentUser.id);

                    showToast("Lỗi đồng bộ Supabase (cấu hình hệ thống): " + err.message, "error");

            // ================== LOG "SIÊU TRỢ LÝ AI": LƯU RIÊNG VÀO BẢNG "ai_manager_logs" ==================
            const dbInsertAiLog = async (taiKhoan, role, text) => {
                try {

                    const { data, error } = await supabase.from(TABLE_AI_MANAGER_LOGS).insert([row]).select().single();

            // ================== DANH MỤC LINH KIỆN: LƯU RIÊNG VÀO BẢNG "danh_muc_san_pham" ==================
            // MỖI TÀI KHOẢN có bộ danh mục riêng (cột user_id) — tài khoản này thêm/sửa/xóa danh mục sẽ
            // không còn ảnh hưởng tới danh mục của tài khoản khác.
            const dbUpsertCategory = async (cat) => {
                if (!currentUser?.id) return; // Chưa đăng nhập thì chưa xác định được danh mục của ai
                try {
                    if (cat.dbId) {
                        const { error } = await supabase.from(TABLE_CATEGORIES).update({ ten_danh_muc: cat.name }).eq("id", cat.dbId);
                        if (error) throw error;
                    } else {
                        const { data, error } = await supabase.from(TABLE_CATEGORIES).insert([{ ten_danh_muc: cat.name, user_id: currentUser.id }]).select().single();
                        if (error) throw error;
                        if (data && data.id) {
                            setCategories(prev => prev.map(c => (c === cat || (c.name === cat.name && !c.dbId)) ? { ...c, dbId: data.id } : c));
                        }
                    }
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi đồng bộ Supabase (danh mục): " + err.message, "error");
                }
            };
            const dbDeleteCategory = async (dbId) => {

                try {
                    const { error } = await supabase.from(TABLE_CATEGORIES).delete().eq("id", dbId);

            };

            // Nạp dữ liệu ban đầu từ Supabase (thay thế dữ liệu mẫu/LocalStorage cũ nếu kết nối thành công)
            // và mở các kênh Realtime lắng nghe thay đổi (Insert/Update/Delete) để đồng bộ tức thời.
            useEffect(() => {
                let isMounted = true;

                // Chưa đăng nhập -> chưa có gì để tải theo tài khoản, dọn trống và dừng ở đây
                if (!currentUser?.id) {
                    setProducts([]);
                    setOrders([]);
                    setChatRows([]);
                    setSyncStatus("connecting");
                    return;
                }

                const loadFromSupabase = async () => {
                    try {
                        const [prodRes, orderRes, chatRes, configRes, catRes, aiLogRes] = await Promise.all([
                            // Chỉ lấy đúng sản phẩm/đơn hàng thuộc về TÀI KHOẢN ĐANG ĐĂNG NHẬP (cột user_id thật)
                            // -> mỗi tài khoản có kho hàng và đơn hàng RIÊNG, không còn dùng chung/lẫn nhau.
                            supabase.from(TABLE_PRODUCTS).select("*").eq("user_id", currentUser.id),
                            supabase.from(TABLE_PENDING_ORDERS).select("*").eq("user_id", currentUser.id),
                            supabase.from(TABLE_CHAT_HISTORY).select("*"),
                            // Cấu hình hệ thống: RIÊNG cho từng tài khoản, lấy đúng dòng của user_id đang đăng nhập
                            supabase.from(TABLE_CONFIGS).select("*").eq("user_id", currentUser.id).maybeSingle(),
                            // Danh mục linh kiện: RIÊNG cho từng tài khoản, lọc theo user_id đang đăng nhập
                            supabase.from(TABLE_CATEGORIES).select("*").eq("user_id", currentUser.id).order("id", { ascending: true }),
                            // Log AI Manager: chỉ lấy đúng của tài khoản đang đăng nhập
                            supabase.from(TABLE_AI_MANAGER_LOGS).select("*").eq("tai_khoan", currentUser.tai_khoan || "chung").order("id", { ascending: true }),
                        ]);

                        if (!isMounted) return;

                        if (!prodRes.error && prodRes.data) {
                            const mappedProducts = prodRes.data.map(mapRowToProduct);
                            // Sắp theo thứ tự ưu tiên đã lưu (sortOrder) — sản phẩm chưa từng sắp xếp (null)
                            // rơi xuống cuối, giữ nguyên thứ tự Supabase trả về giữa các sản phẩm bằng nhau
                            mappedProducts.sort((a, b) => {
                                const oa = (a.sortOrder === null || a.sortOrder === undefined) ? Number.MAX_SAFE_INTEGER : a.sortOrder;
                                const ob = (b.sortOrder === null || b.sortOrder === undefined) ? Number.MAX_SAFE_INTEGER : b.sortOrder;
                                return oa - ob;
                            });
                            setProducts(mappedProducts);
                        }
                        // Map ngược từ schema Supabase (ma_don_hang, chi_tiet_don_hang...) -> order camelCase nội bộ
                        if (!orderRes.error && orderRes.data) setOrders(orderRes.data.map(mapRowToOrder));
                        // chat_history: map ngược từ schema thật (session_id/role/content) -> {sender/text/time} nội bộ
                        // (lọc theo tài khoản được thực hiện ở tầng customers/messages derive bên dưới,
                        // vì bảng này không có cột user_id riêng, phải phân biệt bằng tiền tố trong session_id)
                        if (!chatRes.error && chatRes.data) setChatRows(chatRes.data.map(mapRowToMessage));

                        // Cấu hình hệ thống: nếu Supabase đã có dòng cấu hình CỦA TÀI KHOẢN NÀY -> dùng nó;
                        // nếu tài khoản này chưa có dòng nào (mới tạo, chưa từng lưu cấu hình) -> giữ nguyên
                        // bản cục bộ hiện tại (localStorage/mặc định) cho tới khi tài khoản này tự lưu lần đầu.
                        if (!configRes.error && configRes.data) {
                            const loadedCfg = mapRowToConfigs(configRes.data);
                            if (loadedCfg) setConfigs(loadedCfg);
                        }

                        // Danh mục: nếu Supabase đã có danh mục CỦA TÀI KHOẢN NÀY -> dùng nó; nếu tài khoản
                        // này chưa có danh mục nào -> giữ mặc định cục bộ
                        if (!catRes.error && catRes.data && catRes.data.length > 0) {
                            setCategories(catRes.data.map(mapRowToCategory));
                        }

                        // Log AI Manager của tài khoản đang đăng nhập
                        if (!aiLogRes.error && aiLogRes.data) {
                            setAiManagerRows(aiLogRes.data.map(mapRowToAiLog));
                        }

                        setSyncStatus("online");
                    } catch (err) {
                        console.error(err);
                        if (isMounted) setSyncStatus("offline");
                    }
                };

                loadFromSupabase();

                const productsChannel = supabase.channel("realtime-products-channel")
                    .on("postgres_changes", { event: "*", schema: "public", table: TABLE_PRODUCTS }, (payload) => {
                        // Bỏ qua thay đổi của sản phẩm KHÔNG thuộc tài khoản đang đăng nhập
                        const ownerId = payload.new?.user_id ?? payload.old?.user_id;
                        if (ownerId && ownerId !== currentUser.id) return;
                        if (payload.eventType === "INSERT") {
                            const p = mapRowToProduct(payload.new);
                            // Khớp theo dbId (uuid) trước, rồi mới tới SKU — vì sản phẩm vừa tạo cục bộ có thể
                            // chưa kịp gán dbId lúc Realtime báo về (tránh tạo trùng 1 sản phẩm thành 2 dòng).
                            setProducts(prev => prev.some(x => x.dbId === p.dbId || x.id === p.id) ? prev.map(x => (x.dbId === p.dbId || x.id === p.id) ? p : x) : [...prev, p]);
                        } else if (payload.eventType === "UPDATE") {
                            const p = mapRowToProduct(payload.new);
                            setProducts(prev => prev.map(x => (x.dbId === p.dbId || x.id === p.id) ? p : x));
                        } else if (payload.eventType === "DELETE") {
                            // Cột "id" trên Supabase là uuid -> phải lọc theo dbId, KHÔNG phải theo mã SKU
                            setProducts(prev => prev.filter(x => x.dbId !== payload.old.id));
                        }
                    })
                    .subscribe();

                // Realtime cho bảng "đơn_hang_dang_chờ": khớp theo ma_don_hang (không dùng cột id nội bộ của Supabase)
                const ordersChannel = supabase.channel("realtime-orders-channel")
                    .on("postgres_changes", { event: "*", schema: "public", table: TABLE_PENDING_ORDERS }, (payload) => {
                        // Bỏ qua thay đổi của đơn hàng KHÔNG thuộc tài khoản đang đăng nhập
                        const ownerId = payload.new?.user_id ?? payload.old?.user_id;
                        if (ownerId && ownerId !== currentUser.id) return;
                        if (payload.eventType === "INSERT") {
                            const o = mapRowToOrder(payload.new);
                            setOrders(prev => prev.some(x => x.id === o.id) ? prev.map(x => x.id === o.id ? o : x) : [...prev, o]);
                        } else if (payload.eventType === "UPDATE") {
                            const o = mapRowToOrder(payload.new);
                            setOrders(prev => prev.map(x => x.id === o.id ? o : x));
                        } else if (payload.eventType === "DELETE") {
                            setOrders(prev => prev.filter(x => x.id !== payload.old.ma_don_hang));
                        }
                    })
                    .subscribe();

                // Realtime cho bảng "chat_history": map ngược schema thật rồi cập nhật vào chatRows
                const chatChannel = supabase.channel("realtime-chat-channel")
                    .on("postgres_changes", { event: "*", schema: "public", table: TABLE_CHAT_HISTORY }, (payload) => {
                        if (payload.eventType === "INSERT") {
                            const m = mapRowToMessage(payload.new);
                            setChatRows(prev => prev.some(x => x.id === m.id) ? prev : [...prev, m]);
                        } else if (payload.eventType === "DELETE") {
                            setChatRows(prev => prev.filter(x => x.id !== payload.old.id));
                        }
                    })
                    .subscribe();

                // Realtime cho bảng "cau_hinh_he_thong": chỉ nhận cập nhật ĐÚNG dòng của tài khoản đang đăng
                // nhập (để 1 tài khoản mở nhiều thiết bị vẫn đồng bộ ngay), bỏ qua cấu hình của tài khoản khác
                const configsChannel = supabase.channel("realtime-configs-channel")
                    .on("postgres_changes", { event: "*", schema: "public", table: TABLE_CONFIGS }, (payload) => {
                        if (payload.eventType === "DELETE") return;
                        if (payload.new?.user_id !== currentUser.id) return;
                        const loadedCfg = mapRowToConfigs(payload.new);
                        if (loadedCfg) setConfigs(loadedCfg);
                    })
                    .subscribe();

                // Realtime cho bảng "danh_muc_san_pham": chỉ nhận thêm/sửa/xóa danh mục CỦA TÀI KHOẢN đang
                // đăng nhập, đồng bộ ngay giữa các thiết bị của cùng tài khoản đó, bỏ qua tài khoản khác
                const categoriesChannel = supabase.channel("realtime-categories-channel")
                    .on("postgres_changes", { event: "*", schema: "public", table: TABLE_CATEGORIES }, (payload) => {
                        const ownerId = payload.new?.user_id ?? payload.old?.user_id;
                        if (ownerId && ownerId !== currentUser.id) return;
                        if (payload.eventType === "INSERT") {
                            const c = mapRowToCategory(payload.new);
                            setCategories(prev => prev.some(x => x.dbId === c.dbId) ? prev : [...prev, c]);
                        } else if (payload.eventType === "UPDATE") {
                            const c = mapRowToCategory(payload.new);
                            setCategories(prev => prev.map(x => x.dbId === c.dbId ? c : x));
                        } else if (payload.eventType === "DELETE") {
                            setCategories(prev => prev.filter(x => x.dbId !== payload.old.id));
                        }
                    })
                    .subscribe();

                // Realtime cho bảng "ai_manager_logs": chỉ nhận đúng dòng của tài khoản đang đăng nhập
                const aiLogsChannel = supabase.channel("realtime-ai-manager-logs-channel")
                    .on("postgres_changes", { event: "*", schema: "public", table: TABLE_AI_MANAGER_LOGS }, (payload) => {
                        const row = payload.new || payload.old;
                        if (!row || row.tai_khoan !== (currentUser.tai_khoan || "chung")) return;
                        if (payload.eventType === "INSERT") {
                            const l = mapRowToAiLog(payload.new);
                            setAiManagerRows(prev => prev.some(x => x.id === l.id) ? prev : [...prev, l]);
                        } else if (payload.eventType === "DELETE") {
                            setAiManagerRows(prev => prev.filter(x => x.id !== payload.old.id));
                        }
                    })
                    .subscribe();

                return () => {
                    isMounted = false;
                    supabase.removeChannel(productsChannel);
                    supabase.removeChannel(ordersChannel);
                    supabase.removeChannel(chatChannel);
                    supabase.removeChannel(configsChannel);
                    supabase.removeChannel(categoriesChannel);
                    supabase.removeChannel(aiLogsChannel);
                };
            }, [currentUser?.id]);

            // Sync database LocalStorage (vẫn giữ làm lớp dự phòng ngoại tuyến - offline fallback)
            useEffect(() => { setLocalStorage("lk_products", products); }, [products]);
            useEffect(() => { setLocalStorage("lk_orders", orders); }, [orders]);
            useEffect(() => { setLocalStorage("lk_chat_rows", chatRows); }, [chatRows]);
            useEffect(() => { setLocalStorage("lk_configs", configs); }, [configs]);
            useEffect(() => { setLocalStorage("lk_trash_bin", trashBin); }, [trashBin]);
            useEffect(() => { setLocalStorage("lk_categories", categories); }, [categories]);
            useEffect(() => { setLocalStorage("lk_ai_manager_rows", aiManagerRows); }, [aiManagerRows]);

            // Custom Dialog Triggers
            const askConfirm = (title, message, callback) => {
                setConfirmModal({ show: true, title, message, onConfirm: () => { callback(); setConfirmModal({ show: false }); } });
            };

            const askPrompt = (title, message, defaultValue, callback) => {
                setPromptModal({ show: true, title, message, defaultValue, value: defaultValue, onConfirm: (val) => { callback(val); setPromptModal({ show: false }); } });
            };

            const openCopyModal = (title, content) => {
                setCopyModal({ show: true, title, content });
            };

            const handleCopyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Đã sao chép văn bản vào khay nhớ tạm!", "success");
                } catch (err) {
                    showToast("Không thể tự động sao chép.", "error");
                }
                document.body.removeChild(textArea);
            };

            // Reset/Wipe Database Helper (Sửa đổi: Chỉ xóa sạch, loại bỏ nạp dữ liệu mẫu khỏi đây)
            const resetDatabase = (type) => {
                if (type === "empty") {
                    // Backup dữ liệu hiện tại vào Thùng rác trước khi xóa trắng
                    const backupItems = [];
                    products.forEach(p => backupItems.push({ deleteId: Date.now() + Math.random(), type: "Sản phẩm", date: new Date().toLocaleString(), originalData: p }));
                    customers.forEach(c => backupItems.push({ deleteId: Date.now() + Math.random(), type: "Khách hàng", date: new Date().toLocaleString(), originalData: c }));
                    orders.forEach(o => backupItems.push({ deleteId: Date.now() + Math.random(), type: "Đơn hàng", date: new Date().toLocaleString(), originalData: o }));
                    
                    if (backupItems.length > 0) {
                        setTrashBin(prev => [...prev, ...backupItems]);
                    }

                    setProducts([]);
                    setOrders([]); // shippings tự rỗng theo vì được suy ra (derive) từ orders
                    setChatRows([]); // customers & messages tự rỗng theo vì được suy ra (derive) từ chatRows
                    setLocalStorage(LOCAL_DEBT_KEY, {}); // Xóa luôn "Nợ hiện tại" đang lưu cục bộ

                    // Đồng bộ Supabase: xóa sạch dữ liệu tương ứng trên các bảng đã kết nối
                    // (Khách hàng + Vận đơn nằm chung trong chat_history / đơn_hang_dang_chờ nên đã được xóa cùng)
                    (async () => {
                        try {
                            await supabase.from(TABLE_PRODUCTS).delete().not("id", "is", null);
                            await supabase.from(TABLE_PENDING_ORDERS).delete().not("ma_don_hang", "is", null);
                            await supabase.from(TABLE_CHAT_HISTORY).delete().not("id", "is", null);
                        } catch (err) {
                            console.error(err);
                            showToast("Đã xóa cục bộ, nhưng có lỗi khi xóa trên Supabase: " + err.message, "error");
                        }
                    })();

                    showToast("Đã dọn dẹp hệ thống về trắng! Dữ liệu cũ đã được sao lưu vào Thùng Rác.", "success");
                }
            };

            // Hàm lưu vết thùng rác khi xóa lẻ tẻ
            const deleteToTrash = (type, originalData) => {
                const trashItem = {
                    deleteId: Date.now() + Math.random(),
                    type: type, // "Sản phẩm", "Khách hàng", "Đơn hàng"
                    date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString().substring(0, 5),
                    originalData: originalData
                };
                setTrashBin(prev => [...prev, trashItem]);
            };

            // Khôi phục một mục cụ thể từ Thùng rác
            const restoreFromTrash = (item) => {
                const data = item.originalData;
                if (item.type === "Sản phẩm") {
                    if (products.some(p => p.id === data.id)) {
                        showToast(`Sản phẩm với mã SKU ${data.id} đã tồn tại trong kho hiện tại!`, "error");
                        return;
                    }
                    setProducts(prev => [...prev, data]);
                    dbUpsertProduct(data);
                } else if (item.type === "Khách hàng") {
                    if (customers.some(c => c.id === data.id)) {
                        showToast(`Khách hàng với mã ${data.id} đã tồn tại!`, "error");
                        return;
                    }
                    setCustomers(prev => [...prev, data]); // adapter tự ghi hồ sơ vào chat_history + nợ vào localStorage
                } else if (item.type === "Đơn hàng") {
                    if (orders.some(o => o.id === data.id)) {
                        showToast(`Hóa đơn với mã ${data.id} đã tồn tại!`, "error");
                        return;
                    }
                    setOrders(prev => [...prev, data]);
                    dbInsertOrder(data);
                }
                setTrashBin(prev => prev.filter(t => t.deleteId !== item.deleteId));
                showToast(`Đã khôi phục thành công ${item.type}: ${data.name || data.id}!`, "success");
            };

            const handleCopyLink = () => {
                const currentUrl = window.location.href;
                navigator.clipboard.writeText(currentUrl).then(() => {
                    showToast("Đã copy liên kết ứng dụng!", "success");
                }).catch(() => {
                    handleCopyToClipboard(currentUrl);
                });
            };

            // Cổng đăng nhập: chưa đăng nhập thì chỉ hiển thị màn hình đăng nhập / đăng ký nhân viên
            if (!currentUser) {
                return <LoginScreen onLogin={handleLogin} onRegister={handleRegister} loading={loginLoading} regLoading={regLoading} />;
            }

            return (
                <div className="flex h-screen overflow-hidden bg-[var(--c-bg)] text-[var(--c-ink)] text-sm">
                    {/* Toast */}
                    {toast.show && (
                        <div className="fixed top-4 right-4 z-50 flex items-center gap-2.5 rounded-xl px-4 py-2.5 text-white shadow-lg text-sm animate-bounce"
                             style={{ backgroundColor: toast.type === 'error' ? 'var(--c-danger)' : 'var(--c-accent)' }}>
                            <i className={`fas ${toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}`}></i>
                            <span>{toast.message}</span>
                        </div>
                    )}

                    {/* CONFIRM MODAL */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
                            <div className="w-full max-w-xs rounded-xl bg-white p-4 shadow-2xl border border-[var(--c-line)] animate-fade-in">
                                <h4 className="font-bold text-[var(--c-ink)] text-xs border-b pb-2 flex items-center gap-2 uppercase">
                                    <i className="fa-solid fa-circle-question text-[var(--c-primary-light)]"></i> {confirmModal.title}
                                </h4>
                                <p className="text-[var(--c-muted)] my-3 text-xxs leading-normal">{confirmModal.message}</p>
                                <div className="flex justify-end gap-2.5 border-t pt-3">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false })}
                                        className="rounded-xl bg-[#F1F5F9] hover:bg-[#E7ECF2] px-4 py-2 text-[var(--c-muted)] font-semibold text-xxs"
                                    >
                                        Hủy bỏ
                                    </button>
                                    <button 
                                        onClick={confirmModal.onConfirm}
                                        className="rounded-xl bg-[var(--c-danger)] hover:bg-[#B23A3A] px-4 py-2 text-white font-bold text-xxs"
                                    >
                                        Đồng ý
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PROMPT MODAL */}
                    {promptModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
                            <div className="w-full max-w-xs rounded-xl bg-white p-4 shadow-2xl border border-[var(--c-line)]">
                                <h4 className="font-bold text-[var(--c-ink)] text-xs border-b pb-2 flex items-center gap-2 uppercase">
                                    <i className="fa-solid fa-pen-to-square text-[var(--c-accent)]"></i> {promptModal.title}
                                </h4>
                                <p className="text-[var(--c-muted)] mt-2 mb-2 text-xxs">{promptModal.message}</p>
                                <input 
                                    type="text"
                                    value={promptModal.value}
                                    onChange={(e) => setPromptModal({ ...promptModal, value: e.target.value })}
                                    className="w-full rounded-xl border border-[var(--c-line)] p-2.5 font-bold text-[var(--c-ink)] focus:outline-none focus:border-[var(--c-primary-light)] text-xs"
                                />
                                <div className="flex justify-end gap-2.5 border-t pt-3 mt-3">
                                    <button 
                                        onClick={() => setPromptModal({ show: false })}
                                        className="rounded-xl bg-[#F1F5F9] hover:bg-[#E7ECF2] px-4 py-2 text-[var(--c-muted)] font-semibold text-xxs"
                                    >
                                        Hủy
                                    </button>
                                    <button 
                                        onClick={() => promptModal.onConfirm(promptModal.value)}
                                        className="rounded-xl bg-[var(--c-accent)] hover:bg-[var(--c-accent-dark)] px-4 py-2 text-white font-bold text-xxs"
                                    >
                                        Xác nhận
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* COPY & VIEW MODAL FOR AI DRAFTS */}
                    {copyModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
                            <div className="w-full max-w-sm rounded-xl bg-white p-4 shadow-2xl border border-[var(--c-line)] text-xxs">
                                <h4 className="font-bold text-[var(--c-ink)] text-xs border-b pb-2 flex items-center gap-2 uppercase">
                                    <i className="fa-solid fa-wand-magic-sparkles text-[var(--c-ai)] animate-pulse"></i> {copyModal.title}
                                </h4>
                                <div className="my-3 bg-[var(--c-bg)] p-3.5 border rounded-xl text-[var(--c-ink)] leading-relaxed max-h-52 overflow-y-auto font-medium whitespace-pre-wrap">
                                    {copyModal.content}
                                </div>
                                <div className="flex justify-end gap-2.5 border-t pt-3">
                                    <button 
                                        onClick={() => setCopyModal({ show: false })}
                                        className="rounded-xl bg-[#F1F5F9] hover:bg-[#E7ECF2] px-4 py-2.5 text-[var(--c-muted)] font-semibold"
                                    >
                                        Đóng
                                    </button>
                                    <button 
                                        onClick={() => handleCopyToClipboard(copyModal.content)}
                                        className="rounded-xl bg-[var(--c-ai)] hover:bg-[var(--c-ai-dark)] px-4 py-2.5 text-white font-bold flex items-center gap-2"
                                    >
                                        <i className="fa-regular fa-copy"></i> Sao chép
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* THÙNG RÁC MODAL (Lịch sử đã xóa lưu vết thực tế) */}
                    {showTrashModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 p-4">
                            <div className="w-full max-w-md rounded-xl bg-white p-4 shadow-2xl border border-[var(--c-line)] flex flex-col max-h-[85vh]">

                        {/* ============ MODAL TÌM KIẾM NHANH (icon kính lúp header) — tìm trực tiếp trong
                            products/customers/orders đã có sẵn, bấm vào kết quả điều hướng đúng Tab ============ */}
                        {showMobileSearch && (
                            <div className="fixed inset-0 z-50 bg-white flex flex-col">
                                <div className="flex items-center gap-2.5 px-4 h-16 border-b border-gray-100 shrink-0">
                                    <button onClick={() => { setShowMobileSearch(false); setMobileSearchQuery(""); }} className="text-[var(--c-primary)]">
                                        <i className="fa-solid fa-arrow-left text-lg"></i>
                                    </button>
                                    <input 
                                        autoFocus
                                        type="text" 
                                        value={mobileSearchQuery} 
                                        onChange={(e) => setMobileSearchQuery(e.target.value)} 
                                        placeholder="Tìm linh kiện, khách hàng, đơn hàng..." 
                                        className="flex-1 bg-[#F1F5F9] rounded-xl px-3.5 py-2.5 text-sm focus:outline-none"
                                    />
                                </div>
                                <div className="flex-1 overflow-y-auto p-3 space-y-3">
                                    {mobileSearchQuery.trim() === "" && (
                                        <p className="text-center text-[var(--c-muted)] text-xs py-10">Nhập từ khóa để tìm linh kiện, khách hàng hoặc đơn hàng.</p>
                                    )}
                                    {mobileSearchQuery.trim() !== "" && (() => {
                                        const q = mobileSearchQuery.trim().toLowerCase();
                                        const matchedProducts = products.filter(p => p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)).slice(0, 8);
                                        const matchedCustomers = customers.filter(c => c.name.toLowerCase().includes(q) || (c.phone || "").includes(q)).slice(0, 8);
                                        const matchedOrders = orders.filter(o => o.id.toLowerCase().includes(q) || o.customerName.toLowerCase().includes(q)).slice(0, 8);
                                        const nothing = matchedProducts.length === 0 && matchedCustomers.length === 0 && matchedOrders.length === 0;
                                        return (
                                            <>
                                                {nothing && <p className="text-center text-[var(--c-muted)] text-xs py-10">Không tìm thấy kết quả nào khớp "{mobileSearchQuery}".</p>}
                                                {matchedProducts.length > 0 && (
                                                    <div>
                                                        <p className="text-[var(--c-muted)] font-bold text-xs uppercase mb-1.5 px-1">Linh kiện</p>
                                                        <div className="bg-white rounded-2xl border border-[var(--c-line)] divide-y divide-[var(--c-line)] overflow-hidden">
                                                            {matchedProducts.map(p => (
                                                                <button key={p.id} onClick={() => { setShowMobileSearch(false); setMobileSearchQuery(""); setMobileTab("products"); }} className="w-full flex justify-between items-center px-3.5 py-3 text-left hover:bg-[#F1F5F9]">
                                                                    <span>
                                                                        <p className="font-bold text-[var(--c-ink)] text-xs">{p.name}</p>
                                                                        <p className="text-[var(--c-muted)] text-xs">{p.id} · Tồn {p.stock}</p>
                                                                    </span>
                                                                    <span className="font-bold text-[var(--c-primary)] text-xs">{p.sellPrice.toLocaleString()}đ</span>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {matchedCustomers.length > 0 && (
                                                    <div>
                                                        <p className="text-[var(--c-muted)] font-bold text-xs uppercase mb-1.5 px-1">Khách hàng</p>
                                                        <div className="bg-white rounded-2xl border border-[var(--c-line)] divide-y divide-[var(--c-line)] overflow-hidden">
                                                            {matchedCustomers.map(c => (
                                                                <button key={c.id} onClick={() => { setShowMobileSearch(false); setMobileSearchQuery(""); setMobileTab("customers"); }} className="w-full flex justify-between items-center px-3.5 py-3 text-left hover:bg-[#F1F5F9]">
                                                                    <span>
                                                                        <p className="font-bold text-[var(--c-ink)] text-xs">{c.name}</p>
                                                                        <p className="text-[var(--c-muted)] text-xs">{c.phone}</p>
                                                                    </span>
                                                                    {c.debt > 0 && <span className="font-bold text-[var(--c-danger)] text-xs">Nợ {c.debt.toLocaleString()}đ</span>}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {matchedOrders.length > 0 && (
                                                    <div>
                                                        <p className="text-[var(--c-muted)] font-bold text-xs uppercase mb-1.5 px-1">Đơn hàng</p>
                                                        <div className="bg-white rounded-2xl border border-[var(--c-line)] divide-y divide-[var(--c-line)] overflow-hidden">
                                                            {matchedOrders.map(o => (
                                                                <button key={o.id} onClick={() => { setShowMobileSearch(false); setMobileSearchQuery(""); setMobileTab("sales"); }} className="w-full flex justify-between items-center px-3.5 py-3 text-left hover:bg-[#F1F5F9]">
                                                                    <span>
                                                                        <p className="font-bold text-[var(--c-ink)] text-xs">{o.id}</p>
                                                                        <p className="text-[var(--c-muted)] text-xs">{o.customerName}</p>
                                                                    </span>
                                                                    <span className="font-bold text-[var(--c-primary)] text-xs">{o.finalTotal.toLocaleString()}đ</span>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </>
                                        );
                                    })()}
                                </div>
                            </div>
                        )}

                        {/* ============ MODAL THÔNG BÁO (icon chuông header) — cảnh báo tồn kho thấp + công
                            nợ khách hàng, đọc trực tiếp từ products/customers hiện có ============ */}
                        {showMobileNotif && (
                            <div className="fixed inset-0 z-50 bg-black bg-opacity-50 flex items-end" onClick={() => setShowMobileNotif(false)}>
                                <div className="w-full bg-white rounded-t-2xl max-h-[80vh] flex flex-col" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex justify-between items-center px-4 py-3.5 border-b border-gray-100">
                                        <span className="font-bold text-[var(--c-ink)]">🔔 Thông báo</span>
                                        <button onClick={() => setShowMobileNotif(false)} className="text-[var(--c-muted)]"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                        {products.filter(p => p.stock < 5).length === 0 && customers.filter(c => c.debt > 0).length === 0 && (
                                            <p className="text-center text-[var(--c-muted)] text-xs py-10">Không có thông báo nào.</p>
                                        )}
                                        {products.filter(p => p.stock < 5).map(p => (
                                            <button key={p.id} onClick={() => { setShowMobileNotif(false); setMobileTab("products"); }} className="w-full flex items-center gap-2.5 bg-[#FDEDED] border border-[#F6D2D2] rounded-xl p-3 text-left">
                                                <span className="h-9 w-9 shrink-0 rounded-full bg-white flex items-center justify-center text-[var(--c-danger)]"><i className="fa-solid fa-triangle-exclamation"></i></span>
                                                <div className="text-xs">
                                                    <p className="font-bold text-[var(--c-ink)]">{p.name} sắp hết hàng</p>
